name: Build Windows Executable

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --onefile --name nsfocus-monitor --distpath dist --add-data "src/web/templates;src/web/templates" --add-data "src/web/static;src/web/static" --add-data "data/initial_sources.json;data" --hidden-import flask --hidden-import flask_cors --hidden-import apscheduler --hidden-import bs4 --hidden-import cryptography --hidden-import jwt --hidden-import bcrypt --collect-all jinja2 --collect-all markupsafe --clean run.py

      - name: Install UPX
        run: choco install upx -y

      - name: Compress with UPX
        run: |
          upx --best --lzma --force dist\nsfocus-monitor.exe

      - name: Build portable zip
        run: |
          powershell -Command "Compress-Archive -Path dist\nsfocus-monitor.exe -DestinationPath dist\nsfocus-monitor-win.zip -Force"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nsfocus-monitor-win
          path: |
            dist/nsfocus-monitor.exe
            dist/nsfocus-monitor-win.zip
          retention-days: 30

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          if gh release view "$tag" &>/dev/null; then
            echo "Release $tag already exists, skipping"
          else
            gh release create "$tag" --title "Windows Build $tag" --notes "Auto build from ${{ github.sha }}" dist/nsfocus-monitor.exe dist/nsfocus-monitor-win.zip
          fi