name: Build Windows Executable

on:
  # 不再 push 自动 build:避免每次 commit 都消耗 30MB artifact quota
  # (Free 套餐 monthly artifact quota = 100MB for private repo,2GB for public)
  # 改手动触发:GitHub UI → Actions → Build Windows Executable → Run workflow
  # Docker image build 仍在 push 时自动跑(docker.yml 独立配置,artifact 不冲突)
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Release tag (e.g. 1.2.3,自动加 v 前缀生成 v1.2.3),留空自动用 vYYYYMMDDTHHMM(精确到分钟,跟 docker 同步)'
        required: false
        type: string
        default: ''
      release_name:
        description: 'Release 显示名,留空自动用 YYYY-MM-DD HH:MM - <tag_name>'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Compute release tag and name
        # 跟 docker.yml 同步:bash 算日期 + tag_name/name 一起算好
        # 4 个分支:
        #   tag_version 输 + release_name 输 → tag=v1.2.3, name=YYYY-MM-DD HH:MM - <name>
        #   tag_version 输 + release_name 空 → tag=v1.2.3, name=YYYY-MM-DD HH:MM - v1.2.3
        #   tag_version 空 + release_name 输 → tag=vYYYYMMDDTHHMM, name=YYYY-MM-DD HH:MM - <name>
        #   tag_version 空 + release_name 空 → tag=vYYYYMMDDTHHMM, name=YYYY-MM-DD HH:MM - vYYYYMMDDTHHMM
        # shell: bash 显式指定 — windows-2022 runner 默认 shell 是 pwsh,
        #  pwsh 不认 [ -n \"$x\" ] 这种 bash test 语法 (报 Missing '(' after 'if')
        id: rel
        shell: bash
        run: |
          DATE_TAG=$(date -u +%Y%m%dT%H%M)
          DATE_DISP=$(date -u +'%Y-%m-%d %H:%M')
          if [ -n "${{ inputs.tag_version }}" ]; then
            TAG="v${{ inputs.tag_version }}"
          else
            TAG="v${DATE_TAG}"
          fi
          if [ -n "${{ inputs.release_name }}" ]; then
            NAME="${DATE_DISP} - ${{ inputs.release_name }}"
          else
            NAME="${DATE_DISP} - ${TAG}"
          fi
          echo "tag_name=${TAG}" >> "$GITHUB_ENV"
          echo "release_name=${NAME}" >> "$GITHUB_ENV"
          # zip/artifact 文件名统一跟 release tag 一致(带 v 前缀),用户一眼能对照版本
          ZIP_NAME="nsfocus-monitor-win-${TAG}.zip"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Computed: tag_name=${TAG} release_name=${NAME} zip_name=${ZIP_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --onefile --name nsfocus-monitor --distpath dist --add-data "src/web/templates;src/web/templates" --add-data "src/web/static;src/web/static" --add-data "data/initial_sources.json;data" --hidden-import flask --hidden-import flask_cors --hidden-import apscheduler --hidden-import bs4 --hidden-import cryptography --hidden-import jwt --hidden-import bcrypt --collect-all jinja2 --collect-all markupsafe --clean run.py

      - name: Install UPX
        run: choco install upx -y

      - name: Compress with UPX
        run: |
          upx --best --lzma --force dist\nsfocus-monitor.exe

      - name: Build portable zip
        # zip 文件名跟 artifact/release 保持一致(用 env.zip_name),便于一眼对照版本
        run: |
          powershell -Command "Compress-Archive -Path dist\nsfocus-monitor.exe -DestinationPath dist\${{ env.zip_name }} -Force"

      - name: Upload artifacts
        # artifact name 改用日期 tag(vYYYYMMDDTHHMM UTC,跟 docker image tag 同步):
        #   - 用户下载时一眼能看出"这是几号几点发的"
        #   - 跟 release tag 一致,GitHub Actions 列表里跟 Release 页面对得上
        # 副作用:同一次 commit re-run(分钟级)会撞名,但 GitHub 会自动加 -1/-2 后缀;
        # cleanup 脚本按前缀匹配,不影响
        # zip 仍保留在 dist/ 目录,供下方 Release 步骤(workflow_dispatch 触发)用
        uses: actions/upload-artifact@v4
        with:
          name: nsfocus-monitor-win-${{ env.tag_name }}
          path: dist\nsfocus-monitor.exe
          retention-days: 7

      # 自动清理：每次上传成功后，遍历仓库下 nsfocus-monitor-win-* 这类
      # 旧 artifact，只保留最新 10 个。避免 push 频繁时免费额度被打爆。
      # artifact name 用 commit short SHA 命名，所以 cleanup 按前缀匹配，
      # 覆盖 history 重写导致的多次 push（commit 不变 → name 不变 → 覆盖）。
      - name: Cleanup old Windows artifacts
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP_COUNT = 10;
            const ARTIFACT_PREFIX = 'nsfocus-monitor-win-';
            try {
              const opts = github.rest.actions.listArtifactsForRepo.endpoint.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              const allArtifacts = await github.paginate(opts);
              // 只清当前 workflow 产出的 artifact；其它 artifact（docker 等）
              // 不动，避免误删。
              const mine = allArtifacts.filter(a => a.name.startsWith(ARTIFACT_PREFIX));
              // 按创建时间从新到旧排序
              mine.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              if (mine.length > KEEP_COUNT) {
                const toDelete = mine.slice(KEEP_COUNT);
                console.log(`当前 ${ARTIFACT_PREFIX}* 共有 ${mine.length} 个，超出限制 ${KEEP_COUNT}，准备删除 ${toDelete.length} 个...`);
                for (const artifact of toDelete) {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id,
                  });
                  console.log(`🗑️ Deleted old artifact: ${artifact.name} (id=${artifact.id}, created=${artifact.created_at})`);
                }
              } else {
                console.log(`当前 ${ARTIFACT_PREFIX}* 共 ${mine.length} 个，未超出 ${KEEP_COUNT}，无需清理。`);
              }
            } catch (e) {
              console.warn(`Cleanup failed: ${e.message}`);
            }

      - name: Upload to GitHub Release
        if: github.event_name == 'workflow_dispatch'
        # tag_name / name / zip_name 由前面 'Compute release tag and name' step 算好,这里只引用
        # zip 文件名跟 artifact 保持一致,Release 页面下载下来能直接对照 tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag_name }}
          name: ${{ env.release_name }}
          files: dist/${{ env.zip_name }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
