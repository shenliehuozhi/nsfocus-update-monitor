name: Build Windows Executable

on:
  # 不再 push 自动 build:避免每次 commit 都消耗 30MB artifact quota
  # (Free 套餐 monthly artifact quota = 100MB for private repo,2GB for public)
  # 改手动触发:GitHub UI → Actions → Build Windows Executable → Run workflow
  # Docker image build 仍在 push 时自动跑(docker.yml 独立配置,artifact 不冲突)
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Release tag (e.g. v1.2.3),留空自动用 commit short SHA'
        required: false
        type: string
        default: ''
      release_name:
        description: 'Release 显示名,留空用 tag_version 或 build-<sha>'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.1
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --onefile --name nsfocus-monitor --distpath dist --add-data "src/web/templates;src/web/templates" --add-data "src/web/static;src/web/static" --add-data "data/initial_sources.json;data" --hidden-import flask --hidden-import flask_cors --hidden-import apscheduler --hidden-import bs4 --hidden-import cryptography --hidden-import jwt --hidden-import bcrypt --collect-all jinja2 --collect-all markupsafe --clean run.py

      - name: Install UPX
        run: choco install upx -y

      - name: Compress with UPX
        run: |
          upx --best --lzma --force dist\nsfocus-monitor.exe

      - name: Build portable zip
        run: |
          powershell -Command "Compress-Archive -Path dist\nsfocus-monitor.exe -DestinationPath dist\nsfocus-monitor-win.zip -Force"

      - name: Upload artifacts
        # 只传 exe 不传 zip:zip 是 exe 的 Compress-Archive 副本,内容重复,单独下 exe 即可
        # 节省 ~50% artifact size,降低 2GB quota 撞限概率
        # zip 仍保留在 dist/ 目录,供下方 Release 步骤(workflow_dispatch 触发)用
        uses: actions/upload-artifact@v4
        with:
          name: nsfocus-monitor-win-${{ github.sha }}
          path: dist/nsfocus-monitor.exe
          retention-days: 7

      # 自动清理：每次上传成功后，遍历仓库下 nsfocus-monitor-win-* 这类
      # 旧 artifact，只保留最新 10 个。避免 push 频繁时免费额度被打爆。
      # artifact name 用 commit short SHA 命名，所以 cleanup 按前缀匹配，
      # 覆盖 history 重写导致的多次 push（commit 不变 → name 不变 → 覆盖）。
      - name: Cleanup old Windows artifacts
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP_COUNT = 10;
            const ARTIFACT_PREFIX = 'nsfocus-monitor-win-';
            try {
              const opts = github.rest.actions.listArtifactsForRepo.endpoint.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              const allArtifacts = await github.paginate(opts);
              // 只清当前 workflow 产出的 artifact；其它 artifact（docker 等）
              // 不动，避免误删。
              const mine = allArtifacts.filter(a => a.name.startsWith(ARTIFACT_PREFIX));
              // 按创建时间从新到旧排序
              mine.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              if (mine.length > KEEP_COUNT) {
                const toDelete = mine.slice(KEEP_COUNT);
                console.log(`当前 ${ARTIFACT_PREFIX}* 共有 ${mine.length} 个，超出限制 ${KEEP_COUNT}，准备删除 ${toDelete.length} 个...`);
                for (const artifact of toDelete) {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id,
                  });
                  console.log(`🗑️ Deleted old artifact: ${artifact.name} (id=${artifact.id}, created=${artifact.created_at})`);
                }
              } else {
                console.log(`当前 ${ARTIFACT_PREFIX}* 共 ${mine.length} 个，未超出 ${KEEP_COUNT}，无需清理。`);
              }
            } catch (e) {
              console.warn(`Cleanup failed: ${e.message}`);
            }

      - name: Upload to GitHub Release
        if: github.event_name == 'workflow_dispatch'
        # softprops v2 强制要 tag_name(v1 不需要)
        # 用户在 UI 输 tag_version(如 v1.2.3),留空则 fallback 到 v-build-<7位 SHA>
        # 永远产出有效 tag(不能是空串)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_version != '' && format('v{0}', inputs.tag_version) || format('v-build-{0}', github.sha) }}
          name: ${{ inputs.release_name != '' && inputs.release_name || (inputs.tag_version != '' && inputs.tag_version || format('Build {0}', github.sha)) }}
          files: dist/nsfocus-monitor-win.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
