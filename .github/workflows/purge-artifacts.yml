name: 🧹 批量清理历史 artifacts (保留最近 10 个 run)

on:
  workflow_dispatch: # 允许在网页端手动点击触发
  schedule:
    # 每天 UTC 02:00 跑一次,自动清理堆积的 artifacts 和 buildkit cache
    - cron: '0 2 * * *'

# 必须赋予写权限,否则无法删除 artifacts
permissions:
  actions: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Old Workflow Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP_RUNS = 10; // 保留最近 10 个 workflow run
            // buildkit cache key 前缀(docker/build-push-action 写的 GHA cache)
            // 这些是 docker.yml 每次 push 累积的 buildkit blob,默认 7 天 retain
            // 但 GitHub GC 不及时,3 个月就能堆 100+ 个把 2GB 配额吃满
            // 主动每天清一次,防止再次撞 quota
            const BUILDKIT_PREFIXES = ['buildkit-blob-', 'buildkit-cache-', 'index-'];
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`正在获取 ${owner}/${repo} 的所有 workflow runs...`);

            // 1. 分页捞出所有 workflow runs
            const allRuns = [];
            let page = 1;
            let hasMore = true;

            while (hasMore) {
              const res = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });

              const runs = res.data.workflow_runs;
              if (runs.length === 0) {
                hasMore = false;
                break;
              }

              allRuns.push(...runs);

              if (runs.length < 100) {
                hasMore = false;
              } else {
                page++;
              }
            }

            // 过滤掉当前正在运行的 run,避免自己删自己的 artifact
            const currentRunId = context.runId;
            const otherRuns = allRuns.filter(run => run.id !== currentRunId);

            console.log(`当前除本次运行外,全仓库共有 ${otherRuns.length} 个 workflow run。`);

            // 2. 按创建时间从新到旧排序
            otherRuns.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // 3. 取要清理的 runs(除了最近 KEEP_RUNS 个)
            if (otherRuns.length <= KEEP_RUNS) {
              console.log(`✅ workflow run 总数未超过 ${KEEP_RUNS} 个,无需清理。`);
              return;
            }

            const runsToPurge = otherRuns.slice(KEEP_RUNS);
            console.log(`👉 保留最新 ${KEEP_RUNS} 个 run,准备清理 ${runsToPurge.length} 个老 run 的 artifacts。`);

            // 4. 遍历每个老 run,删它的 artifacts
            let totalArtifactsDeleted = 0;

            for (const run of runsToPurge) {
              try {
                const artifactsRes = await github.rest.actions.listWorkflowRunArtifacts({
                  owner,
                  repo,
                  run_id: run.id,
                });

                const artifacts = artifactsRes.data.artifacts;
                if (artifacts.length === 0) {
                  console.log(`  Run ${run.id} (${run.display_title || run.name}): 无 artifacts,跳过`);
                  continue;
                }

                for (const artifact of artifacts) {
                  try {
                    await github.rest.actions.deleteArtifact({
                      owner,
                      repo,
                      artifact_id: artifact.id,
                    });
                    totalArtifactsDeleted++;
                    console.log(`  🗑️ 删 Run ${run.id} 的 artifact: ${artifact.name} (${(artifact.size_in_bytes / 1024 / 1024).toFixed(2)} MB)`);
                  } catch (err) {
                    console.warn(`  ❌ 无法删 artifact ${artifact.id} (${artifact.name}): ${err.message}`);
                  }
                }
              } catch (err) {
                console.warn(`❌ 无法列 Run ${run.id} 的 artifacts: ${err.message}`);
              }
            }

            console.log(`\n✨ Artifact 清理完成!共删除 ${totalArtifactsDeleted} 个 artifact,共清理 ${runsToPurge.length} 个老 run。`);

            // ── 清理 buildkit cache ───────────────────────────────────
            // build-push-action 写的 GHA cache key 都是 buildkit-blob-* / index-*
            // 不分老 run,直接按 key 前缀清,任何时间的都清
            // (这些 cache 重新 build 一次就重建,留着没意义,只会占 2GB 配额)
            console.log(`\n🧹 开始清理 buildkit cache (key 前缀: ${BUILDKIT_PREFIXES.join(', ')})...`);
            let totalCacheDeleted = 0;
            let totalCacheSize = 0;
            let cachePage = 1;
            let cacheHasMore = true;

            while (cacheHasMore) {
              // github-script v7 的 Octokit 缓存 method 列表是固定的,新增的
              // actions/caches API 没有 typed method,只能用 github.request 走通用 REST。
              // 这跟 window.yml 的 endpoint.merge 模式思路一样 — 不依赖具体 method 名
              const cacheRes = await github.request('GET /repos/{owner}/{repo}/actions/caches', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page: cachePage,
              });
              const caches = cacheRes.data.actions_caches || [];
              if (caches.length === 0) {
                cacheHasMore = false;
                break;
              }
              for (const c of caches) {
                if (BUILDKIT_PREFIXES.some(p => c.key.startsWith(p))) {
                  try {
                    await github.request('DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}', {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      cache_id: c.id,
                    });
                    totalCacheDeleted++;
                    totalCacheSize += c.size_in_bytes || 0;
                  } catch (err) {
                    console.warn(`  ❌ 无法删 cache ${c.id} (${c.key}): ${err.message}`);
                  }
                }
              }
              if (caches.length < 100) {
                cacheHasMore = false;
              } else {
                cachePage++;
              }
            }
            console.log(`✨ Cache 清理完成!共删除 ${totalCacheDeleted} 个 buildkit cache,释放 ${(totalCacheSize / 1024 / 1024).toFixed(2)} MB。`);

            console.log(`\n💡 提示:workflow run 本身仍保留(用 .github/workflows/purge-history.yml 删 run)`);
