name: 🐳 清理 GHCR 老 Docker image tags (保留最近 10 个)

on:
  workflow_dispatch: # 允许在网页端手动点击触发
  schedule:
    # 每周 UTC 03:00 跑一次(配合 purge-artifacts 每天跑)
    - cron: '0 3 * * 0'

# 必须有 packages 写权限才能删 GHCR tags
permissions:
  packages: write
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Get repo info
        id: repo
        run: |
          # 从 github.repository 解析 owner/name
          echo "owner=$(echo ${{ github.repository }} | cut -d/ -f1)" >> $GITHUB_OUTPUT
          echo "name=$(echo ${{ github.repository }} | cut -d/ -f2)" >> $GITHUB_OUTPUT

      - name: Purge Old GHCR Tags
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP_VERSIONS = 10; // 保留最近 10 个 version(老 tag 全删)
            const packageType = 'container'; // GHCR 容器镜像 type
            const owner = '${{ steps.repo.outputs.owner }}';
            const repoName = '${{ steps.repo.outputs.name }}';
            // GHCR 包名 = repo 名(去掉 owner 前缀)
            const packageName = repoName.toLowerCase(); // GHCR 包名是小写

            console.log(`正在获取 ${owner}/${packageName} (type=${packageType}) 的所有 versions...`);

            // 1. 分页捞所有 versions
            const allVersions = [];
            let page = 1;
            let hasMore = true;

            while (hasMore) {
              const res = await github.rest.packages.listPackageVersionsForPackageByUser({
                package_type: packageType,
                package_name: packageName,
                username: owner,
                per_page: 100,
                page,
              });

              const versions = res.data;
              if (versions.length === 0) {
                hasMore = false;
                break;
              }

              allVersions.push(...versions);

              if (versions.length < 100) {
                hasMore = false;
              } else {
                page++;
              }
            }

            console.log(`当前 GHCR ${packageName} 共有 ${allVersions.length} 个 versions。`);

            if (allVersions.length === 0) {
              console.log('✅ 无 GHCR versions,无需清理。');
              return;
            }

            // 2. 按 created_at 从新到旧排序
            allVersions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // 3. 取要删的 versions(除了最近 KEEP_VERSIONS 个)
            if (allVersions.length <= KEEP_VERSIONS) {
              console.log(`✅ versions 总数未超过 ${KEEP_VERSIONS} 个,无需清理。`);
              return;
            }

            const versionsToDelete = allVersions.slice(KEEP_VERSIONS);
            console.log(`👉 保留最新 ${KEEP_VERSIONS} 个 versions,准备清理 ${versionsToDelete.length} 个老 versions。`);

            // 4. 逐个删
            let totalDeleted = 0;
            let totalBytes = 0;

            for (const ver of versionsToDelete) {
              try {
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: packageType,
                  package_name: packageName,
                  username: owner,
                  version_id: ver.id,
                });
                totalDeleted++;
                // tags 数组在 metadata 里
                const tagList = (ver.metadata && ver.metadata.container && ver.metadata.container.tags) || [];
                const tags = Array.isArray(tagList) ? tagList.join(', ') : 'no-tags';
                console.log(`  🗑️ 删 version ${ver.id}: ${tags}`);
              } catch (err) {
                console.warn(`  ❌ 无法删 version ${ver.id}: ${err.message}`);
              }
            }

            console.log(`\n✨ 清理完成!共删除 ${totalDeleted} 个 GHCR version。`);
            console.log(`💡 提示: latest tag 不在 KEEP 范围(会被覆盖,不会累积)`);
