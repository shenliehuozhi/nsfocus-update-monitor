name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute date tag
        # metadata-action @v5 没有 type=date,改用 env + type=raw 拼日期 tag
        # YYYYMMDDTHHMM (UTC) → 精确到分钟(ISO 8601 风格,用 T 分隔)
        # 用户能看出"这是几号几点发的",latest 兜底指向最新
        id: date_tag
        run: echo "tag_date=$(date -u +%Y%m%dT%H%M)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          # 3 个 tag:
          #   latest                → 永远指向最新
          #   YYYYMMDDTHHMM (UTC)   → 精确到分钟,用户能看出"这是几号几点发的"
          #                            由前面 date_tag step 写到 env.tag_date
          #   sha-<long>            → 精确 commit,可重现部署
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.tag_date }}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # provenance=false:不写 SLSA provenance attestation,镜像 size 减少约 5%,
          # push 速度快 ~20%(不需 in-toto 签名)。Public 仓库不需要 SBOM 强制
          provenance: false
          # sbom=false:不开 SBOM 生成,镜像 size 进一步减少
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,retain-days=7