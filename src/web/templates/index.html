function dataFeedGoPage(p) {
  // Count total rows WITHOUT re-running the full feed build.
  // We stored byKey counts during the last dataBuildFeed call.
  // For simplicity, rebuild just the key statistics: count filtered rows per (ver,pkgtype).
  let totalFiltered = 0;
  const sources = dataFilteredSources();
  const selSid = _dataSelectedSid;
  const selSrc = selSid ? (_dataAll[selSid] || null) : null;
  const isHintClick = !_dataSelectedUrl && (_dataSelectedVerHint || _dataSelectedPkgHint);

  if (selSrc) {
    const byKey = {};
    (selSrc.snapshots || []).forEach(s => {
      if (_dataSelectedUrl && s.source_url !== _dataSelectedUrl) return;
      if (isHintClick) {
        if (_dataSelectedVerHint && (s.version_branch || '') !== _dataSelectedVerHint) return;
        if (_dataSelectedPkgHint && (s.package_type || '') !== _dataSelectedPkgHint) return;
      }
      if (_dataFilters.urgency && (s.urgency !== _dataFilters.urgency || s.status !== 'active')) return;
      const k = (s.version_branch || '?') + '|' + (s.package_type || '?');
      if (!byKey[k]) { byKey[k] = 0; }
      byKey[k]++;
    });
    if (!isHintClick) {
      Object.values(byKey).forEach(c => { totalFiltered += Math.min(c, _feedPkgLimit); });
    } else {
      totalFiltered = Object.values(byKey).reduce((a, b) => a + b, 0);
    }
  } else {
    sources.forEach(([sid, src]) => {
      const byKey = {};
      (src.snapshots || []).forEach(s => {
        if (_dataFilters.urgency && (s.urgency !== _dataFilters.urgency || s.status !== 'active')) return;
        const k = (s.version_branch || '?') + '|' + (s.package_type || '?');
        if (!byKey[k]) byKey[k] = 0;
        byKey[k]++;
      });
      Object.values(byKey).forEach(c => { totalFiltered += Math.min(c, _feedPkgLimit); });
    });
  }

  const totalPages = Math.max(1, Math.ceil(totalFiltered / FEED_PAGE_SIZE));
  _dataFeedPage = Math.min(Math.max(1, p), totalPages);
  dataRenderRight();
}

function dataRightToggleRow(rowId) {
  const t0 = performance.now();
  const rowEl = document.getElementById(rowId);
  if (!rowEl) return;

  // Close any open detail
  const t1 = performance.now();
  const openDetail = document.querySelector('.feed-detail');
  if (openDetail) {
    const prevRow = openDetail.previousElementSibling;
    if (prevRow && prevRow.classList.contains('feed-row')) {
      const arrow = prevRow.querySelector('.feed-arrow');
      if (arrow) arrow.textContent = '▶';
    }
    openDetail.remove();
    const snapId = prevRow ? prevRow.dataset.sid : null;
    if (snapId && _snapDetailCache[snapId]) {
      delete _snapDetailCache[snapId];
    }
  }

  if (rowEl.classList.contains('feed-expanded')) {
    rowEl.classList.remove('feed-expanded');
    const arrow = rowEl.querySelector('.feed-arrow');
    if (arrow) arrow.textContent = '▶';
    console.log('[perf] toggle close:', (performance.now() - t0).toFixed(1) + 'ms');
    return;
  }

  const t2 = performance.now();
  const sid = rowEl.dataset.sid;
  const snapId = rowEl.dataset.id ? parseInt(rowEl.dataset.id) : null;
  if (!sid || !snapId) return;

  const MAP = { sys: '系统', rule: '规则', nti: '威胁情报', av: '病毒库', apprule: '应用规则', url: 'URL库', wcs: '恶意站点', judge: '研判', geo: '地理库', interface: '接口', special: '特殊', other: '其他', merge: '合并', client: '客户端', av_stream: '流式病毒库', test: '测试', engine: '引擎' };
  const src = _dataAll[sid];
  if (!src) return;
  const snaps = src.snapshots || [];
  const snap = snaps.find(s => s.id === snapId);
  if (!snap) return;

  const t3 = performance.now();
  let chainDisplayHtml = '';
  const pt = src.package_type || {};
  const paths = pt.paths || [];
  const entryUrl = src.entry_url || '';
  // Match path by snap.path_id (exact, distinguishes multi-chain shared URLs).
  // Fall back to URL match only for legacy rows that have no path_id.
  let matchedPath = null;
  if (snap.path_id) {
    matchedPath = paths.find(p => p.path_id === snap.path_id);
  }
  if (!matchedPath && snap.source_url) {
    matchedPath = paths.find(p => p.url === snap.source_url);
  }
  if (matchedPath && matchedPath.chain && matchedPath.chain.length > 0) {
    const chain = matchedPath.chain;
    const leafUrl = matchedPath.url || '';
    const cacheKey = sid + '|' + chain.join('/');

    if (!_dataChainPrefixCache[cacheKey]) {
      const prefixSegCount = new Array(chain.length).fill(null);
      paths.forEach(p => {
        if (!p.url || !p.chain) return;
        let sharedLen = 0;
        const minLen = Math.min(p.chain.length, chain.length);
        for (let i = 0; i < minLen; i++) {
          if (p.chain[i] === chain[i]) sharedLen++;
          else break;
        }
        if (sharedLen === 0) return;
        const segs = p.url.split('/').filter(Boolean);
        const leafDepth = p.chain.length;
        for (let d = 1; d <= sharedLen; d++) {
          const segCount = segs.length - (leafDepth - d);
          const effectiveSegs = segCount > 0 ? segCount : 1;
          if (prefixSegCount[d - 1] === null) {
            prefixSegCount[d - 1] = effectiveSegs;
          } else {
            prefixSegCount[d - 1] = Math.min(prefixSegCount[d - 1], effectiveSegs);
          }
        }
      });
      _dataChainPrefixCache[cacheKey] = prefixSegCount;
    }
    const prefixSegCount = _dataChainPrefixCache[cacheKey];

    function findNodeUrl(depth) {
      if (depth === 0) return entryUrl;
      const idx = depth - 1;
      if (idx >= prefixSegCount.length || prefixSegCount[idx] === null) return entryUrl;
      const segCount = prefixSegCount[idx];
      const segs = leafUrl.split('/').filter(Boolean);
      const base = '/' + segs.slice(0, segCount).join('/');
      return base || entryUrl;
    }

    chainDisplayHtml = chain.map((name, i) => {
      const isLast = (i === chain.length - 1);
      if (isLast) {
        const fullUrl = 'https://update.nsfocus.com' + leafUrl;
        return `<a href="${escHtml(fullUrl)}" target="_blank" style="color:var(--primary);text-decoration:underline">${escHtml(name)}</a>`;
      }
      const nodeUrl = findNodeUrl(i + 1);
      const fullNodeUrl = nodeUrl ? ('https://update.nsfocus.com' + nodeUrl) : '';
      if (fullNodeUrl && nodeUrl !== entryUrl) {
        return `<a href="${escHtml(fullNodeUrl)}" target="_blank" style="color:var(--primary);text-decoration:underline">${escHtml(name)}</a>`;
      }
      return escHtml(name);
    }).join(' <span style="color:var(--gray-disabled)">›</span> ');
  }

  const t4 = performance.now();
  rowEl.classList.add('feed-expanded');
  const arrow = rowEl.querySelector('.feed-arrow');
  if (arrow) arrow.textContent = '▼';

  const detailHtml = `<div class="feed-detail" id="snap-detail-${snapId}">
  <div class="detail-inner">
    <span class="data-detail-k">文件名</span><span style="font-size:12.5px">${escHtml(snap.file_name || '')}</span>
    <span class="data-detail-k">版本</span><span style="font-size:12.5px">${escHtml(snap.package_version || '')}</span>
    <span class="data-detail-k">类型</span><span style="font-size:12.5px">${MAP[snap.package_type] || snap.package_type || ''}</span>
    <span class="data-detail-k">紧急度</span><span style="font-size:12.5px"><span class="badge ${snap.urgency === 'critical' ? 'badge-err' : snap.urgency === 'high' ? 'badge-warn' : 'badge-ok'}">${snap.urgency || ''}</span></span>
    <span class="data-detail-k">文件大小</span><span style="font-size:12.5px" id="snap-fs-${snapId}">—</span>
    <span class="data-detail-k">发布时间</span><span style="font-size:12.5px">${fmtTZ(snap.published_at, true)}</span>
    <span class="data-detail-k">首次发现</span><span style="font-size:12.5px">${fmtTZ(snap.first_seen_at, true)}</span>
    <span class="data-detail-k">最近采集</span><span style="font-size:12.5px">${fmtTZ(snap.last_seen_at, true)}</span>
    <span class="data-detail-k">下载地址</span><span style="font-size:12.5px"><a href="${'https://update.nsfocus.com/update/downloads/id/' + (snap.download_id || '')}" target="_blank" style="color:var(--success)">${'https://update.nsfocus.com/update/downloads/id/' + (snap.download_id || '')}</a></span>
    <span class="data-detail-k">发布地址</span><span style="font-size:12.5px"><a href="${'https://update.nsfocus.com' + (snap.source_url || '')}" target="_blank" style="color:var(--primary)">${'https://update.nsfocus.com' + (snap.source_url || '')}</a></span>
    ${chainDisplayHtml ? `<span class="data-detail-k">层级路径</span><span style="font-size:12px;color:var(--primary)">${chainDisplayHtml}</span>` : ''}
    <span class="data-detail-k">MD5</span><span style="font-size:12.5px" id="snap-md5-${snapId}">—</span>
    <span class="data-detail-k">页面哈希</span><span style="font-size:12.5px;word-break:normal;overflow-x:auto" id="snap-ph-${snapId}">—</span>
    <span class="data-detail-k">需重启</span><span style="font-size:12.5px" id="snap-rr-${snapId}">—</span>
    <span class="data-detail-k" style="grid-column:1/3;align-self:start">描述</span><span id="snap-desc-${snapId}" style="grid-column:1/3;background:#fff;border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:block;max-height:150px;overflow-y:auto;white-space:pre-wrap;overflow-wrap:break-word;font-size:12px;color:var(--gray-muted)">—</span>
</div>
</div>`;
  const t5 = performance.now();
  rowEl.insertAdjacentHTML('afterend', detailHtml);
  const t6 = performance.now();

  // Lazy load detail fields: description_raw, md5_hash, page_hash, file_size, restart_required
  // Do NOT cache by snapId — multiple detail rows can share the same snapId (e.g. history list).
  // Check element existence before updating so closed/removed details are safely skipped.
  api(`/snapshot/${snapId}`).then(r => {
    if (r.code !== 0 || !r.data) return;
    const d = r.data;
    const descEl = document.getElementById(`snap-desc-${snapId}`);
    if (descEl) {
      if (d.description_raw) {
        descEl.outerHTML = `<div style="grid-column:1/3;background:#fff;border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:block;max-height:150px;overflow-y:auto;white-space:pre-wrap;overflow-wrap:break-word;font-size:12px;color:var(--gray-muted)">${escHtml(d.description_raw)}</div>`;
      } else {
        descEl.style.display = 'none';
      }
    }
    const md5El = document.getElementById(`snap-md5-${snapId}`);
    if (md5El && d.md5_hash) md5El.textContent = d.md5_hash;
    const phEl = document.getElementById(`snap-ph-${snapId}`);
    if (phEl && d.page_hash) phEl.textContent = d.page_hash;
    const fsEl = document.getElementById(`snap-fs-${snapId}`);
    if (fsEl && d.file_size != null) {
      fsEl.textContent = d.file_size > 1048576
        ? (d.file_size / 1048576).toFixed(1) + ' MB'
        : (d.file_size / 1024).toFixed(0) + ' KB';
    }
    const rrEl = document.getElementById(`snap-rr-${snapId}`);
    if (rrEl && d.restart_required) {
      rrEl.outerHTML = `<span class="data-detail-k">需重启</span><span style="font-size:12.5px">⚠️ 需要重启设备</span>`;
    }
  }).catch(() => {});

  console.log('[perf] toggle open — close:' + (t1-t0).toFixed(1) + 'ms data:' + (t3-t2).toFixed(1) + 'ms chain:' + (t4-t3).toFixed(1) + 'ms html:' + (t5-t4).toFixed(1) + 'ms insert:' + (t6-t5).toFixed(1) + 'ms total:' + (t6-t0).toFixed(1) + 'ms');
}

function dataRightGoto(sid, chainJson) {
  _dataSelectedSid = sid;
  _dataExpanded.add(sid);
  let targetChain = null;
  try { targetChain = JSON.parse(chainJson); } catch(e) { targetChain = []; }
  _dataSelectedChain = targetChain;
  _dataSelectedUrl = null;
  // Derive version & package type hints from the target chain's last node for right-panel filtering.
  // Match the FULL chain against paths to avoid ambiguity when multiple versions
  // share the same leaf name (e.g. several "入侵检测规则升级包" across versions
  // V2.0R00F01 / V2.0R00F05 / V2.0R00F06_CW would otherwise all match by leaf alone).
  const src = _dataAll[sid];
  let verHint = null, pkgHint = null;
  let targetPathId = null;
  if (src && targetChain && targetChain.length > 0) {
    const pt = src.package_type;
    if (pt && pt.paths) {
      const path = pt.paths.find(p =>
        Array.isArray(p.chain) &&
        p.chain.length === targetChain.length &&
        p.chain.every((seg, i) => seg === targetChain[i])
      );
      if (path && path.url) {
        // Backend attaches path_id to each path in /latest/snapshots; use it
        // directly to locate the snapshot row that belongs to *this* chain.
        // Without this, NSFocus's multi-chain-shared-URL structure would resolve
        // to the first matching snap (wrong chain) and feed would show wrong data.
        targetPathId = path.path_id || null;
        const snap = targetPathId
          ? (src.snapshots || []).find(s => s.path_id === targetPathId)
          : null;
        if (snap) {
          verHint = snap.version_branch || null;
          pkgHint = snap.package_type || null;
        }
      }
    }
  }
  _dataSelectedVerHint = verHint;
  _dataSelectedPkgHint = pkgHint;
  _dataSelectedPathId = targetPathId;
  _dataFeedPage = 1;
  // Do NOT call dataRenderLeft() — it rebuilds the DOM and wipes all expanded states.
  // Instead, directly manipulate the existing DOM: expand target card + tree path, then scroll.
  // The event delegation listener on #dataLeft is set up once in dataPage() and persists.
  setTimeout(() => {
    const card = document.getElementById('dpc_' + sid);
    if (!card) {
      // Card not yet in DOM — fall back to dataRenderLeft() for initial render
      dataRenderLeft();
      return;
    }

    // Expand the card body (tree container) via productCardToggle, then expand tree path
    const cardBody = card.querySelector('.card-bd');
    const wasHidden = cardBody && cardBody.style.display === 'none';
    if (wasHidden) {
      // Use the existing productCardToggle to expand the card body cleanly
      const targetId = cardBody.id;
      productCardToggle(targetId);
    }

    // Find the tree node whose data-chain matches targetChain
    const allNodes = card.querySelectorAll('[data-action="treeNode"]');
    let targetNode = null;
    if (targetChain && targetChain.length > 0) {
      allNodes.forEach(n => {
        try {
          const nc = JSON.parse(n.getAttribute('data-chain') || '[]');
          if (JSON.stringify(nc) === JSON.stringify(targetChain)) {
            targetNode = n;
          }
        } catch(e) {}
      });
    }

    if (targetNode) {
      // Expand all ancestor .tree-children so target is visible
      let parent = targetNode.parentElement;
      while (parent && !parent.classList.contains('card-bd')) {
        if (parent.classList.contains('tree-children') && parent.style.display === 'none') {
          treeToggleById(parent.id); // use the named toggle to keep arrow icons in sync
        }
        parent = parent.parentElement;
      }
      // Highlight the target node
      document.querySelectorAll('.tree-node-selected').forEach(el => el.classList.remove('tree-node-selected'));
      targetNode.classList.add('tree-node-selected');
      targetNode.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      // Highlight the parent card
      document.querySelectorAll('.card-selected').forEach(el => el.classList.remove('card-selected'));
      var pc = targetNode.closest('.card');
      if (pc) pc.classList.add('card-selected');
    } else if (card) {
      // No specific node but card found — highlight the card at least
      document.querySelectorAll('.card-selected').forEach(el => el.classList.remove('card-selected'));
      card.classList.add('card-selected');
    }
  }, 50);
  dataRenderRight();
}

function dataRightExpand(btn, sid, ver, pkgType) {

function dataClearFilter() {
  _dataSelectedSid = null;

  dataRenderLeft();
  dataRenderRight();
}

async function dataShowDrill(sid, url, verHint, pkgHint) {
  const src = _dataAll[sid];
  if (!src) return;

  document.getElementById('dataAggView').classList.add('hidden');
  document.getElementById('dataPager').innerHTML = '';

  const MAP = { sys: '系统', rule: '规则', nti: '威胁情报', av: '病毒库', apprule: '应用规则', url: 'URL库', wcs: '恶意站点', judge: '研判', geo: '地理库', interface: '接口', special: '特殊', other: '其他', merge: '合并', client: '客户端', av_stream: '流式病毒库', test: '测试', engine: '引擎' };
  let snaps = src.snapshots || [];

  // Filter by exact URL when provided (leaf node)
  if (url) {
    snaps = snaps.filter(s => s.source_url === url);
  }
  // Filter by hints when provided (intermediate node)
  if (verHint) {
    snaps = snaps.filter(s => (s.version_branch || '') === verHint);
  }
  if (pkgHint) {
    snaps = snaps.filter(s => (s.package_type || '') === pkgHint);
  }

  const byVer = {};
  snaps.forEach(s => {
    const v = s.version_branch || '?';
    if (!byVer[v]) byVer[v] = [];
    byVer[v].push(s);
  });

  const versions = Object.keys(byVer).sort((a, b) => {
    const na = parseFloat(a), nb = parseFloat(b);
    if (!isNaN(na) && !isNaN(nb)) return nb - na;
    return b.localeCompare(a, 'zh');
  });

  let drillHtml = `<div class="data-drill">
    <div class="data-drill-hd">
      <button class="btn btn-xs btn-outline" onclick="dataBackToAgg()">← 返回列表</button>
      <span class="data-drill-title">📦 ${src.display_name || src.name}</span>
      <span style="color:var(--muted);font-size:12px;margin-left:12px">${snaps.length} 条记录 · ${versions.length} 个版本</span>
    </div>
    <div class="data-drill-body">`;

  versions.forEach(ver => {
    const verSnaps = byVer[ver].sort((a, b) => (b.last_seen_at || '').localeCompare(a.last_seen_at || ''));
    const isHighlight = ver === verHint;

    const hasRb = verSnaps.some(s => s.status === 'withdrawn');
    const hasNew = verSnaps.some(s => s.status === 'active' && !s.last_delivered_at);
    const latestCollected = verSnaps[0] ? fmtTZ(verSnaps[0].last_seen_at, true) : '—';
    const hasCritical = verSnaps.some(s => s.urgency === 'critical' && s.status === 'active');

    const verFlags = [];
    if (hasCritical) verFlags.push('<span class="badge badge-err" style="font-size:10px">🔴critical</span>');
    if (hasRb) verFlags.push('<span style="color:var(--danger);font-size:11px">含撤回</span>');
    if (hasNew) verFlags.push('<span style="color:var(--primary);font-size:11px">有未推送</span>');

    const byType = {};
    verSnaps.forEach(s => {
      const t = s.package_type || '?';
      if (!byType[t]) byType[t] = [];
      byType[t].push(s);
    });

    const typeKeys = Object.keys(byType).sort();
    const verKey = sid + '_' + ver;
    // Highlighted version: open by default
    const verBodyClass = isHighlight ? 'data-ver-body' : 'data-ver-body hidden';

    drillHtml += `<div class="data-ver-block ${isHighlight ? 'data-ver-highlight' : ''}" id="dvb_anchor_${escHtml(verKey)}">
      <div class="data-ver-hd" onclick="dataToggleVer(this, '${escHtml(verKey)}')">
        <span class="data-prod-arrow">${isHighlight ? '&#9660;' : '&#9658;'}</span>
        <span class="data-ver-label">${ver}</span>
        <span style="color:var(--muted);font-size:11px;margin-left:8px">${verSnaps.length}条 / ${typeKeys.length}种类型</span>
        <div style="display:flex;gap:6px;align-items:center;margin-left:auto">${verFlags.join('')}</div>
        <span style="color:var(--muted);font-size:11px;margin-left:8px">采集 ${latestCollected}</span>
      </div>
      <div class="${verBodyClass}" id="dvb_${escHtml(verKey)}">`;

    typeKeys.forEach(pkgType => {
      const typeSnaps = byType[pkgType].sort((a, b) => (b.published_at || '').localeCompare(a.published_at || ''));
      const latest = typeSnaps[0];
      const historyCount = typeSnaps.length - 1;
      const typeLabel = MAP[pkgType] || pkgType || '';
      const isLatestPkg = historyCount > 0; // multiple packages exist, this one is the latest by published_at
      const sz = latest.file_size > 1048576 ? (latest.file_size / 1048576).toFixed(1) + 'M' : (latest.file_size / 1024).toFixed(0) + 'K';
      const urg = latest.urgency === 'critical' ? 'badge-err' : latest.urgency === 'high' ? 'badge-warn' : 'badge-ok';
      const isRb = latest.status === 'withdrawn';
      const isNewPkg = latest.status === 'active' && !latest.last_delivered_at;
      const histKey = verKey + '_' + pkgType;

      drillHtml += `<div class="data-type-row ${isRb ? 'data-type-rollback' : ''}">
        <div class="data-type-main" onclick="dataToggleSnapDetail(this)">
          ${isNewPkg ? '<span class="data-pill-new-dot" style="margin-right:4px"></span>' : ''}
          ${isLatestPkg ? '<span class="badge badge-blue" style="font-size:10px;margin-right:4px">最新</span>' : ''}
          <span class="data-type-label">${typeLabel}</span>
          <span class="mono" style="color:var(--primary);font-size:12px">${(latest.file_name || '').substring(0, 35)}</span>
          <span style="color:var(--muted);font-size:11px">${fmtTZ(latest.published_at)}</span>
          <span class="badge ${urg}" style="font-size:10px">${latest.urgency || ''}</span>
          ${latest.last_delivered_at ? '<span style="font-size:11px;color:var(--success)" title="已推送">✅</span>' :
            (latest.status === 'active' ? '<span style="font-size:11px;color:var(--muted)" title="未推送">○</span>' : '')}
          <button class="btn btn-xs btn-success" style="margin-left:auto" onclick="event.stopPropagation();showPushModal(${latest.id},'${esc(src.name)}','${esc(ver)}','${esc(pkgType)}')">推送</button>
          ${historyCount > 0 ? `<span class="data-history-toggle" onclick="event.stopPropagation();dataToggleHistory(this,'${escHtml(histKey)}')">+${historyCount} 条历史 ▼</span>` : ''}
        </div>
        <div class="data-snap-detail hidden">${dataSnapDetailHtml(latest, MAP)}</div>
        ${historyCount > 0 ? `<div class="data-history hidden" id="dh_${escHtml(histKey)}">
          ${typeSnaps.slice(1).map(s => {
            const sz2 = s.file_size > 1048576 ? (s.file_size / 1048576).toFixed(1) + 'M' : (s.file_size / 1024).toFixed(0) + 'K';
            const urg2 = s.urgency === 'critical' ? 'badge-err' : s.urgency === 'high' ? 'badge-warn' : 'badge-ok';
            const isRb2 = s.status === 'withdrawn';
            return `<div class="data-hist-row ${isRb2 ? 'data-type-rollback' : ''}" onclick="this.classList.toggle('data-hist-expanded')">
              <span style="color:var(--muted);font-size:11px;width:130px;flex-shrink:0">${fmtTZ(s.published_at, true)}</span>
              <span class="mono" style="color:var(--primary);font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(s.file_name || '').substring(0, 30)}</span>
              <span class="badge ${urg2}" style="font-size:10px">${s.urgency || ''}</span>
              ${s.last_delivered_at ? '<span style="font-size:11px;color:var(--success)">✅</span>' : '<span style="font-size:11px;color:var(--muted)">○</span>'}
              <button class="btn btn-xs btn-success" style="margin-left:4px" onclick="event.stopPropagation();showPushModal(${s.id},'${esc(src.name)}','${esc(ver)}','${esc(pkgType)}')">推送</button>
              <div class="data-snap-detail hidden">${dataSnapDetailHtml(s, MAP)}</div>
            </div>`;
          }).join('')}
        </div>` : ''}
      </div>`;
    });

    drillHtml += `</div></div>`;
  });

  drillHtml += `</div></div>`;
  document.getElementById('dataDrillView').innerHTML = drillHtml;
  document.getElementById('dataDrillView').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'instant' });
  // Scroll to highlighted version block if one was specified
  if (verHint) {
    const anchor = document.getElementById('dvb_anchor_' + verHint.replace(/\\/g, '\\\\'));
    if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function onCustomerCheck(cb){
  const id=parseInt(cb.dataset.custid);
  const email=cb.dataset.email;
  if(cb.checked){ _pushSelectedCustomers.add(id+'|'+email); }
  else{ _pushSelectedCustomers.delete(id+'|'+email); }
  updatePushConfirmState();
}

function onBotChannelCheck(rb){
  _pushBotChannelId=parseInt(rb.value);
  updatePushConfirmState();
}

function updatePushConfirmState(){
  const btn=document.getElementById('pushConfirmBtn');
  if(!btn) return;
  let ready=false;
  if(_pushTab==='email'){
    let hasRecipients=false;
    if(_pushRecipientMode==='customer'){
      hasRecipients=_pushSelectedCustomers.size>0;
    }else{
      const emails=_pushManualEmail.split(/[,\n]/).map(e=>e.trim()).filter(Boolean);
      const re=/^[^@\s]+@[^@\s]+\.[^@\s]+$/;
      hasRecipients=emails.length>0 && emails.every(e=>re.test(e));
    }
    ready=hasRecipients && _pushChannelId>0;
  }else{
    ready=_pushBotChannelId>0;
  }
  btn.disabled=!ready;
}

async function confirmPush(){
  const btn=document.getElementById('pushConfirmBtn');
  btn.disabled=true;btn.textContent='推送中...';
  try{
    let r;
    if(_pushTab==='email'){
      if(!_pushChannelId)return toast('请选择 SMTP 渠道','error');
      let recipients=[];
      let customerIds = [];
      if (_pushRecipientMode === 'customer') {
        _pushSelectedCustomers.forEach(item => {
            const parts = item.split('|');
            if (parts.length === 2) {
                recipients.push(parts[1]);
                customerIds.push(parseInt(parts[0]));
            }
        });
        if(!recipients.length)return toast('请至少选择一个客户','error');
      }else{
        recipients=_pushManualEmail.split(/[,\n]/).map(e=>e.trim()).filter(Boolean);
        if(!recipients.length)return toast('请输入邮箱','error');
        try{localStorage.setItem('pushModalLastManualEmail', _pushManualEmail);}catch(e){}
      }
      const firstCustId = customerIds.length > 0 ? customerIds[0] : null;
      r=await api('/history/'+_pushSid+'/email-push',{method:'POST',body:JSON.stringify({channel_id:_pushChannelId, recipients: recipients, customer_id: firstCustId})});
    }else{
      if(!_pushBotChannelId)return toast('请选择渠道','error');
      r=await api('/history/'+_pushSid+'/push',{method:'POST',body:JSON.stringify({mode:'channel', target_id:_pushBotChannelId})});
    }
    if(r.code===0){
      showPushResult(r.data||{}, true);
      closePushModal();
    }else if(r.code===42900){
      let sec=r.data?.retry_after||600;toast(r.message,'error');startBanCountdown(sec);
    }else{
      if(r.data){ showPushResult(r.data, false); }
      else{ toast(r.message||'推送失败','error'); }
      btn.disabled=false;btn.textContent='确认推送';
    }
  }catch(e){toast('推送失败','error');btn.disabled=false;btn.textContent='确认推送';}
}

// Issue #6: structured push result toast with per-channel status
function showPushResult(data, success){
  const results = data.results || [];
  if(!results.length){
    toast(data.message || (success ? '已推送' : '推送失败'), success ? 'success' : 'error');
    return;
  }
  // Build HTML list
  const lines = results.map(r => {
    const ok = r.success;
    const icon = ok ? '✓' : '✗';
    const color = ok ? 'var(--success)' : 'var(--danger)';
    const logBtn = (!ok && r.log_path)
      ? ` <a href="#" onclick="showPushLogByPath(${JSON.stringify(r.log_path)},${JSON.stringify(r.channel||'')});return false;" style="color:var(--primary);font-size:11px;margin-left:6px">📋 日志</a>`
      : '';
    return `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:12px;color:#ffffff">
      <span style="font-weight:600">${icon}</span>
      <span>${escHtml(r.channel||'')}</span>
      ${r.error ? `<span style="color:rgba(255,255,255,.7);font-size:11px">${escHtml(r.error)}</span>` : ''}
      ${logBtn}
    </div>`;
  }).join('');
  const head = success
    ? `<div style="font-weight:700;color:#ffffff;margin-bottom:4px">推送完成</div>`
    : `<div style="font-weight:700;color:#ffffff;margin-bottom:4px">推送失败</div>`;
  showRichToast(head + lines, success ? 'success' : 'error', 8000);
}

// Rich HTML toast (replaces text-only toast for structured results).
// Inline styles fully override the global .toast class because CSS class
// rules like `white-space:nowrap; overflow:hidden; max-width:90vw` would
// otherwise chop off the multi-line push result content (the "推送完成"
// header and the per-channel list rows). We re-center using left:50% +
// transform:translateX(-50%) since the .toast class only provides centering
// for single-line text and our HTML has multiple lines.
function showRichToast(html, type, durationMs){
  const e=document.createElement('div');
  e.className=`toast toast-${type}`;
  e.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:500;padding:12px 18px;border-radius:8px;z-index:99999;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:fadeDown .2s ease;white-space:normal;max-width:520px;min-width:240px;overflow:visible;text-align:left;line-height:1.5';
  e.innerHTML=html;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(), durationMs||4000);
}
function startBanCountdown(seconds){
  let btn=document.getElementById('pushConfirmBtn');if(!btn)return;
  btn.disabled=true;
  function tick(){let m=Math.floor(seconds/60),s=seconds%60;btn.textContent=`已禁用 ${m}:${String(s).padStart(2,'0')}`;if(seconds<=0){btn.disabled=false;btn.textContent='确认推送';if(_banTimer){clearInterval(_banTimer);_banTimer=null;}return;}seconds--;}
  tick();_banTimer=setInterval(tick,1000);
}

async function resendTargeted(sid,cid,custid,btn){
  await confirmAct('确认重新推送到该客户？', async ()=>{
    // 推送期间:当前按钮变 "⏳ 推送中..." 并 disable;同 snap 其他按钮变灰色 disable
    // 但保留 "📤 重推" 文本,避免让用户以为那几行也在被推送
    // 用 [data-resend-sid] 属性选,history() 重渲染后属性消失 → finally 兜底
    const btns = document.querySelectorAll(`button[data-resend-sid="${sid}"]`);
    btns.forEach(b => {
      b.disabled = true;
      if (b === btn) {
        b.textContent = '⏳ 推送中...';
      } else {
        b.classList.add('btn-locked');
        // 保留原 textContent ("📤 重推"),不改
      }
    });
    try {
      const r = await api('/history/'+sid+'/resend-targeted',{method:'POST',body:JSON.stringify({channel_id:cid,customer_id:custid})});
      toast(r.code===0?'已推送':r.message||'失败',r.code===0?'success':'error');
      // 推送成功后刷新历史列表,显示新生成的 delivery_log 行
      await history();
    } finally {
      // history() 重渲染后原按钮对象已失效,query 重新选
      document.querySelectorAll(`button[data-resend-sid="${sid}"]`).forEach(b => {
        b.disabled = false;
        b.textContent = '📤 重推';
        b.classList.remove('btn-locked');
      });
    }
  }, '📤', '确认推送');
}

// formatDiscPhase(state) — 统一 4 处 phase 文案(banner / modal / confirm)。
// 后端并发跑 Stage 2,progress 是"已完成数",running_products 是当前并发做的产品名列表。
// 输出示例:
//   scanning_products      → "🔍 扫描产品列表…"
//   discovering_pkg_types  → "📦 发现包类型 (5/73) · 正在并发:A, B, C"
//   done                   → "✅ 发现完成"
//   error                  → "❌ 发现出错"
// 不含 ETA — ETA 由调用方决定是否拼接。
function formatDiscPhase(state){
  const base={
    'scanning_products':'🔍 扫描产品列表…',
    'discovering_pkg_types':'',
    'done':'✅ 发现完成',
    'error':'❌ 发现出错',
  }[state.phase]||state.phase||'';
  if(state.phase==='discovering_pkg_types' && state.total){
    const prog=state.progress||0;
    let txt=`📦 发现包类型 (${prog}/${state.total})`;
    const running=state.running_products||[];
    if(running.length>0){
      // 截断显示前 3 个,过长省略
      const shown=running.length<=3?running:running.slice(0,3);
      const suffix=running.length>3?` 等 ${running.length} 个`:'';
      txt+=` · 正在并发:${shown.join(', ')}${suffix}`;
    }
    return txt;
  }
  return base;
}

async function confirmAddSes(){
  const v=document.getElementById('addSesCookie').value.trim();
  if(!v)return toast('请输入 PHPSESSID','error');
  const p=window._sesPurpose||'collect',m=window._sesMode||'standard';
  const btn=document.getElementById('addSesConfirm');
  btn.disabled=true;btn.textContent='验证中...';
  const r=await api('/sessions',{method:'POST',body:JSON.stringify({cookie_value:v,purpose:p,collect_mode:m})});
  btn.disabled=false;btn.textContent='验证并添加';
  if(r.code===0){
    document.getElementById('addSesModal')?.remove();
    toast(r.data?.message||'添加成功','success');
    sessions();
  }else{
    toast(r.message,'error');
  }
}

async function showHbHistory(sid){

  let rows=history.map(h=>{
    const stMap={'正常':'ok','过期':'err','污染':'warn','错误':'err','ok':'ok','expired':'err'};
    const labelMap={'正常':'正常','过期':'过期','污染':'污染','错误':'错误','ok':'正常','expired':'过期'};
    const stColor=stMap[h.status]||'warn';

    return `<tr><td style="font-size:11px">${fmtTZ(h.created_at,true)||h.created_at||''}</td><td><span class="badge badge-${stColor}">${label}</span></td><td>${h.latency_ms||0}ms</td><td style="font-size:11px">${h.error_msg||h.error_message||'—'}</td></tr>`;
  }).join('');
  document.getElementById('hbModal').innerHTML=`

function onEmailTmplChange(){
  const k=document.getElementById('chtmpl')?.value;
  if(!k) return;
  const p=EMAIL_PROVIDERS[k];
  if(!p) return;
  // Autofill host/port, but only if those fields are empty or still match a
  // previous template's defaults — never clobber the user's manual edits.
  const sh=document.getElementById('sh');
  const sp=document.getElementById('sp');
  if(sh && (sh.value==='' || Object.values(EMAIL_PROVIDERS).some(x=>x.host===sh.value))){
    sh.value=p.host;
  }
  if(sp){
    sp.value=p.port;
  }
  // SSL is the default encryption for all built-in templates
  const senc=document.getElementById('senc');
  if(senc){ senc.value='ssl'; }
  // Update user input placeholder to suggest the right format per provider
  const su=document.getElementById('su');
  if(su && p.user_ph && !su.value){
    su.placeholder=p.user_ph;
  }
  const hint=document.getElementById('emailTmplHint');
  if(hint) hint.textContent=p.hint||'';
}

// Switch port when encryption mode changes
function onEmailEncChange(){
  const enc=document.getElementById('senc')?.value;
  const sp=document.getElementById('sp');
  if(!enc || !sp) return;
  if(enc==='ssl'){ sp.value=465; }
  else if(enc==='starttls'){ sp.value=587; }
}

// Detect when user manually edits the SMTP host and sync the template dropdown
function _onEmailHostChange(){
  const host=document.getElementById('sh')?.value||'';
  const matched=_matchEmailProvider(host);
  const sel=document.getElementById('chtmpl');
  if(sel && sel.value!==matched){
    sel.value=matched;
    const p=EMAIL_PROVIDERS[matched];
    const su=document.getElementById('su');
    if(su && p?.user_ph && !su.value){ su.placeholder=p.user_ph; }
    const hint=document.getElementById('emailTmplHint');
    if(hint) hint.textContent=p?.hint||'';
  }
}

    document.getElementById('chn').value=c.name||'';
    document.getElementById('cht').value=c.type||'wecom';
    chTypeCh();


    setTimeout(()=>{
      if(c.type==='email'){
        document.getElementById('sh').value=(c.config||{}).smtp_host||'';
        document.getElementById('sp').value=(c.config||{}).smtp_port||465;
        // smtp_encryption: new field. Fall back to port-based inference for
        // legacy channel configs (port 465 → ssl, else → starttls).
        let enc=(c.config||{}).smtp_encryption;
        if(!enc){
          enc=((c.config||{}).smtp_port===465) ? 'ssl' : 'starttls';
        }
        const senc=document.getElementById('senc');
        if(senc){ senc.value=enc; }
        document.getElementById('su').value=(c.config||{}).smtp_user||'';

        document.getElementById('seh').value=c.email_hourly_limit||0;

        // what the user actually configured, even if the host differs.
        const tmpl=_matchEmailProvider((c.config||{}).smtp_host||'');
        const tmplSel=document.getElementById('chtmpl');
        if(tmplSel){ tmplSel.value=tmpl; }
        // Apply template's user placeholder (only when current user field is empty)
        const su=document.getElementById('su');
        if(su && !su.value && EMAIL_PROVIDERS[tmpl]?.user_ph){
          su.placeholder=EMAIL_PROVIDERS[tmpl].user_ph;
        }
        const hint=document.getElementById('emailTmplHint');
        if(hint){ hint.textContent=EMAIL_PROVIDERS[tmpl]?.hint||''; }
        // Bind host → template sync (in case user manually edits host later)
        const sh=document.getElementById('sh');
        if(sh && !sh.dataset.bound){ sh.dataset.bound='1'; sh.addEventListener('input',_onEmailHostChange); }
      }else{
        document.getElementById('cw').value=_maskWebhook((c.config||{}).webhook_url||'');
        document.getElementById('cs').value='';
      }
    },50);
  }else{
    chTypeCh();
    // Bind host → template sync for new channels too
    setTimeout(()=>{
      const sh=document.getElementById('sh');
      if(sh && !sh.dataset.bound){ sh.dataset.bound='1'; sh.addEventListener('input',_onEmailHostChange); }
    },50);
  }
}
async function saveCh(){
  const t=document.getElementById('cht').value,n=document.getElementById('chn').value.trim();
  if(!n){toast('请输入渠道名称','error');return}
  let c={},eh=0,ed=0;
  if(t==='email'){
    const pw=document.getElementById('sw')?.value||'';
    c={
      smtp_host:document.getElementById('sh')?.value||'',
      smtp_port:parseInt(document.getElementById('sp')?.value||'465'),
      smtp_encryption:document.getElementById('senc')?.value||'ssl',
      smtp_user:document.getElementById('su')?.value||'',
      smtp_password:pw||(_origChConfig.smtp_password||''),
      from_name:document.getElementById('sf')?.value||'绿盟升级通知',
    };
    if(c.smtp_encryption!=='ssl' && c.smtp_encryption!=='starttls'){
      toast('加密方式仅支持 SSL 或 STARTTLS','error');return;
    }
    eh=parseInt(document.getElementById('seh')?.value)||0;
    ed=parseInt(document.getElementById('sed')?.value)||0;
    // Recipients no longer configured at channel level — they're set on
    // subscription rules (customer_emails) or specified per manual push.
    // Strip any legacy to_list so the channel config reflects the new model.
    if(!editingChId){ c.to_list=[]; }
    if(!c.smtp_host||!c.smtp_user){toast('请填写 SMTP 服务器和用户','error');return}
    if(!c.smtp_user.includes('@')){toast('用户名必须是完整邮箱地址(含 @domain 后缀),如 user@163.com','error');return}
  }else{
    const wu=document.getElementById('cw')?.value||'';
    if(wu&&_origChConfig.webhook_url&&wu===_maskWebhook(_origChConfig.webhook_url))wu=_origChConfig.webhook_url;
    c={webhook_url:wu||(_origChConfig.webhook_url||''),secret:document.getElementById('cs')?.value||(_origChConfig.secret||'')}
  }
  let r;
  if(editingChId){r=await api('/channels/'+editingChId,{method:'PUT',body:JSON.stringify({name:n,config:c,email_hourly_limit:eh,email_daily_limit:ed})})}
  else{r=await api('/channels',{method:'POST',body:JSON.stringify({name:n,type:t,config:c,email_hourly_limit:eh,email_daily_limit:ed})})}
  if(r.code===0){toast(editingChId?'已更新':'已添加');editingChId=0;document.getElementById('chModalWrap')?.remove();channels();}
  else toast(r.message,'error')
}

function onCProdChange(el){

    const existingSpecific=[...document.querySelectorAll('#cprods .cp2')].some(s=>s.value&&s.value!==''&&s!==el);

    // 清空其他行
    const rows=document.querySelectorAll('#cprods > div');
    rows.forEach(r=>{const s=r.querySelector('.cp2');if(s&&s!==el)s.value='';});
  }else{
    // 选具体产品：清除其他行的"全部产品"
    const rows=document.querySelectorAll('#cprods > div');
    rows.forEach(r=>{const s=r.querySelector('.cp2');if(s&&s.value===''&&s!==el)s.value='';});
  }
}

function _ruleTemplateValueForChannel(r,cid){
  if(!r)return '';
  if(r.template&&typeof r.template==='object')return r.template[cid]||r.template[String(cid)]||'';
  if(typeof r.template==='string')return r.template;
  return '';
}
function _channelByIdFromList(channels,cid){

function templateForRuleChannel(r,chRow,channels){
  const cid=typeof chRow==='object'&&chRow?chRow.channel_id:chRow;
  const channel=_channelByIdFromList(channels,cid);
  const chType=channel.type||(chRow&&chRow.channel_type)||'';
  if(chType==='email')return {type:chType,template:'',html:'<span style="font-size:11px;color:var(--muted)">邮件 HTML</span>'};
  const rcTpl=typeof chRow==='object'&&chRow?(chRow.template||''):'';
  let tpl=rcTpl||_ruleTemplateValueForChannel(r,cid)||CHAN_DEFAULT_TPL[chType]||'full';
  if(chType==='feishu'&&tpl!=='feishu_full')tpl='feishu_full';
  if(!TPL_META[tpl])tpl=CHAN_DEFAULT_TPL[chType]||'full';
  return {type:chType,template:tpl,html:tplBadgeHtml(tpl)};
}
function renderRuleTemplateSummary(r,channels){
  const rows=(r.channels||[]).filter(ch=>typeof ch==='object'?ch&&ch.channel_id:ch);
  if(!rows.length){

    return tpl?tplBadgeHtml(TPL_META[tpl]?tpl:'full'):'<span style="color:var(--muted)">—</span>';
  }
  return rows.map(ch=>{
    const cid=typeof ch==='object'&&ch?ch.channel_id:ch;

  }).join('');

// 链选择器：节点点击 toggle 选中（全局函数，供 inline onclick 调用）
// nodeEl: 被点击的 tree-node div 元素
function csTreeNodeClick(nodeEl) {
  const chain = JSON.parse(nodeEl.getAttribute('data-chain') || '[]');
  const url = nodeEl.getAttribute('data-url') || '';
  const isLeafNode = nodeEl.getAttribute('data-is-leaf') === '1';
  const match = isLeafNode ? 'leaf' : 'subtree';
  const chainKey = JSON.stringify(chain);

  // 冲突检测：检查新 chain 与已选项是否有父子重叠
  for (const existing of window._condChains) {
    const existKey = JSON.stringify(existing.chain);
    if (existKey === chainKey) continue; // 取消选择不触发冲突
    // 新 chain 是否包含已选 chain（选了父，但子已存在）
    if (chain.length > existing.chain.length &&
        JSON.stringify(chain.slice(0, existing.chain.length)) === existKey) {
      nodeEl.setAttribute('data-conflict', '1');
      setTimeout(() => nodeEl.removeAttribute('data-conflict'), 2000);
      return;
    }
    // 已选 chain 是否包含新 chain（选了子，但父已存在）
    if (existing.chain.length > chain.length &&
        JSON.stringify(existing.chain.slice(0, chain.length)) === chainKey) {
      nodeEl.setAttribute('data-conflict', '1');
      setTimeout(() => nodeEl.removeAttribute('data-conflict'), 2000);
      return;
    }
  }

  const idx = window._condChains.findIndex(c => JSON.stringify(c.chain) === chainKey);
  if (idx >= 0) {
    window._condChains.splice(idx, 1);
    nodeEl.setAttribute('data-sel', '0');
    nodeEl.style.background = '';
  } else {
    window._condChains.push({ chain, match });
    nodeEl.setAttribute('data-sel', '1');
    nodeEl.style.background = 'var(--primary-light)';
  }
  const rightDiv = document.getElementById('chainSelRight');
  if (rightDiv) {
    rightDiv.innerHTML = `<div style="font-weight:600;font-size:13px;margin-bottom:8px">已选路径（${window._condChains.length}）</div>` + renderChainSelList(window._condChains);
  }
}

// 渲染链选择树（复用 buildDataTreeHtml 的树结构逻辑，节点点击 toggle 选中）
function buildChainSelectTree(pt, snapshotsMap, MAP, verTypeMap, alias, sid, selectedSet) {
  const paths = pt.paths || [];
  if (paths.length === 0) return '';

  // 构建树结构（同 buildDataTreeHtml）
  const root = {};
  paths.forEach((p, pathIdx) => {
    const chain = p.chain || [];
    if (chain.length < 2) return;
    let node = root;
    let accChain = [];
    chain.forEach((name, idx) => {
      if (!node.__children) node.__children = {};
      if (!node.__children[name]) node.__children[name] = {
        __children: {}, __isPkg: false, __pathId: '', __chain: [], __pathIdx: -1
      };
      node = node.__children[name];
      node.__chain = accChain.concat([name]);
      node.__pathIdx = pathIdx;
      if (idx === chain.length - 1) {
        node.__isPkg = true;
        node.__pathId = p.url || '';
      }
      accChain = node.__chain;
    });
  });

  function renderNode(node, name, depth) {
    const indent = depth * 16;
    const children = node.__children ? Object.entries(node.__children) : [];
    const hasChildren = children.length > 0;
    const isPkg = node.__isPkg;
    const chainJson = JSON.stringify(node.__chain || []).replace(/"/g, '&quot;');
    const nodeUrl = node.__pathId || '';
    const chainKey = JSON.stringify(node.__chain);
    const isSelected = selectedSet.has(chainKey);

    const icon = isPkg ? '&#128196;' : (hasChildren ? '&#128193;' : '&#128196;');
    const label = isPkg ? name : (MAP[name] || name);
    const childCount = hasChildren ? ` <span style="color:var(--gray-disabled);font-size:11px">(${children.length})</span>` : '';
    const selClass = isSelected ? ' style="background:var(--primary-light);border-radius:4px"' : '';
    const childDivId = hasChildren ? ('cst_' + sid + '_' + depth + '_' + name.replace(/\W/g, '_')) : null;
    const arrow = hasChildren
      ? `<span onclick="csTreeToggleById('${childDivId}', this); event.stopPropagation();" style="cursor:pointer;color:var(--gray-disabled);font-size:13px;user-select:none;flex-shrink:0;margin-right:4px">&#9658;</span>`
      : `<span style="width:13px;flex-shrink:0;margin-right:4px"></span>`;

    const isLeafNode = !hasChildren;
    const leafAttr = ' data-is-leaf="' + (isLeafNode ? '1' : '0') + '"';
    let html = `<div class="tree-node"${leafAttr} data-chain="${chainJson}" data-url="${nodeUrl}" onclick="csTreeNodeClick(this); event.stopPropagation();" style="padding-left:${indent}px;display:flex;align-items:center;padding-top:4px;padding-bottom:4px;min-height:28px;cursor:pointer"${selClass}>`;
    html += arrow;
    html += `<span style="font-size:13px;color:var(--gray-muted);flex-shrink:0">${icon} ${escHtml(label)}${childCount}</span>`;
    html += `</div>`;

    if (hasChildren) {
      html += `<div id="${childDivId}" class="tree-children" data-target="${childDivId}" style="display:none">`;
      children.forEach(([childName, childNode]) => { html += renderNode(childNode, childName, depth + 1); });
      html += `</div>`;
    }
    return html;
  }

  let html = '';
  const rootChildren = root.__children ? Object.entries(root.__children).sort(([a], [b]) => {
    const aV = /\d/.test(a); const bV = /\d/.test(b);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    return a.localeCompare(b, 'zh');
  }) : [];
  // 产品名作为可折叠分组头
  const prodLabel = `<div style="font-weight:700;font-size:13px;color:#1e40af;padding:6px 4px 4px;border-bottom:1px solid var(--gray-border);margin-bottom:4px">${escHtml(alias || String(sid))}</div>`;
  // 始终从真实根节点开始渲染，保持完整的链层级深度
  html += prodLabel;
  rootChildren.forEach(([name, node]) => { html += renderNode(node, name, 0); });
  return html;
}

// 确认链选择：将选中节点转为条件条目
function confirmChainSelection() {

  document.getElementById('chainSelModal').remove();

// 渲染已选路径列表（在链选择器右侧面板）
function renderChainSelList(chains) {
  if (!chains || chains.length === 0) {
    return '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">未选择路径</div>';
  }
  return chains.map((c, i) => {
    const pathStr = c.chain.join(' › ');
    const isLeaf = c.match !== 'subtree';
    const staleBadge = isChainStale(c.chain, c.match) ? chainWarnBadge(c.chain, c.match) : '';
    const matchHtml = isLeaf
      ? `<span style="font-size:10px;padding:2px 6px;background:var(--primary-light);color:#1e40af;border-radius:8px;font-weight:600">leaf（仅当前节点）</span>`
      : `<span style="font-size:10px;padding:2px 6px;background:var(--warn-light);color:#92400e;border-radius:8px;font-weight:600">sub（包含子节点）</span>`;
    return `<div style="display:flex;align-items:center;gap:6px;padding:6px 4px;border-bottom:1px solid var(--gray-bg);font-size:12px;flex-wrap:wrap">
      <span style="flex:1;min-width:0;color:var(--gray-muted);word-break:break-all">${escHtml(pathStr)}</span>
      ${matchHtml}${staleBadge}
      <button onclick="removeChainCond(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:0 2px">×</button>
    </div>`;
  }).join('');
}

// 移除单个路径条件
function removeChainCond(idx) {
  const removed = window._condChains.splice(idx, 1);
  if (removed.length) {
    const chain = removed[0].chain;
    const chainKey = JSON.stringify(chain);
    // C2-1: 同步清理 _csSelectedSet，避免树节点状态残留
    window._csSelectedSet.delete(chainKey);
    // 取消树的该节点高亮
    const safeChainKey = chainKey.replace(/"/g, '&quot;');
    const node = document.querySelector('.tree-node[data-chain="' + safeChainKey + '"]');
    if (node) { node.setAttribute('data-sel', '0'); node.style.background = ''; }
  }
  renderCondPills();
  // 同时更新右侧面板
  const rightDiv = document.getElementById('chainSelRight');
  if (rightDiv) {
    rightDiv.innerHTML = `<div style="font-weight:600;font-size:13px;margin-bottom:8px">已选路径（${window._condChains.length}）</div>` + renderChainSelList(window._condChains);
  }
}

// 渲染订阅条件区的路径标签（在主表单的 rconds div 中）
function renderCondPills() {
  const container = document.getElementById('rconds');
  if (!container) return;
  const chains = window._condChains || [];
  const empty = document.getElementById('rcondsEmpty');
  if (chains.length === 0) {
    if (empty) empty.style.display = '';
    container.querySelectorAll('.cond-pill').forEach(el => el.remove());
    return;
  }
  if (empty) empty.style.display = 'none';
  // 保留 empty div，删掉所有 pill
  container.querySelectorAll('.cond-pill').forEach(el => el.remove());
  chains.forEach((c, i) => {
    const pathStr = c.chain.join(' › ');
    const isLeaf = c.match !== 'subtree';
    const matchLabel = isLeaf ? 'leaf' : 'sub';
    const staleBadge = isChainStale(c.chain, c.match) ? chainWarnBadge(c.chain, c.match) : '';
    const pill = document.createElement('div');
    pill.className = 'cond-pill';
    pill.style = 'display:inline-flex;align-items:center;gap:6px;padding:4px 8px;background:var(--primary-light);border:1px solid var(--primary-light);border-radius:20px;font-size:12px;margin:0 4px 4px 0';
    pill.innerHTML = `${staleBadge}<span style="color:#1e40af;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(pathStr)}">${escHtml(pathStr)}</span>
      <span style="background:${isLeaf ? 'var(--primary-light)' : 'var(--warn-light)'};color:${isLeaf ? '#1e40af' : '#92400e'};font-size:10px;padding:1px 5px;border-radius:8px;font-weight:600">${matchLabel}</span>
      <button onclick="removeCondPill(${i})" style="background:none;border:none;color:var(--gray-disabled);cursor:pointer;font-size:14px;line-height:1;padding:0">×</button>`;
    container.appendChild(pill);
  });
}

// 移除主表单中的路径标签
function removeCondPill(idx) {
  window._condChains.splice(idx, 1);
  renderCondPills();
}

function renderChanTags(){

  if(!robotEl||!emailEl)return;

  // 按渠道类型分流:robot(企微/钉钉/飞书/apprise) → 上方,email → 下方
  const robotChans=sel.map(cid=>chData.find(x=>x.id===cid)).filter(c=>c&&c.type!=='email');

  // 计数提示
  const rc=document.getElementById('robotCount');if(rc)rc.textContent=robotChans.length?`(已选 ${robotChans.length} 个)`:'';
  const ec=document.getElementById('emailCount');if(ec)ec.textContent=emailChans.length?`(已选 ${emailChans.length} 个)`:'';

  const tagHtml=(c)=>{
    const isEmail=c.type==='email';
    const bg=isEmail?'var(--warn-light)':'var(--primary-light)';
    const bd=isEmail?'#fbbf24':'var(--primary-light)';
    const fg=isEmail?'#92400e':'#1e40af';
    const opts=getTplOptsForChannel(c.type);
    // email 行: 4 列 (渠道名 | 收件人 | 附件大小 | ×),无模板列
    // feishu 行: 4 列 (渠道名 | 模板 | ×),select 只 1 个 D 选项 (feishu.py 走 _build_post,4 模板不生效,固定 D)
    // 其他机器人 (wecom/dingtalk/apprise) 行: 4 列 (渠道名 | 模板 | ×),正常 3 模板
    if (isEmail) {
      // 2026-07-11: per-channel 客户邮箱 + 附件大小 (rule_channels 表新字段)
      // email 渠道走 _format_html_body 全量 HTML,不走 A/B/C/D 模板 → 不显示「模板」列
      return `<div style="display:grid;grid-template-columns:1fr 2fr 1fr auto;align-items:center;gap:8px;padding:6px 10px;background:${bg};border:1px solid ${bd};border-radius:8px;font-size:12px;color:${fg}">
        <span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(c.name)} #${c.id}">${escHtml(c.name)} <span style="opacity:0.6">(${escHtml(c.type)})</span> <span style="opacity:0.5;font-family:monospace">#${c.id}</span></span>
        <input data-cid="${c.id}" data-field="customer_emails" placeholder="${emailPlaceholder()}" value="${emailDefaultValue()}" onchange="onChanFieldChange(${c.id}, 'customer_emails', this.value)" style="font-size:12px;padding:4px 6px;border-radius:4px;border:1px solid ${bd};background:#fff;color:${fg}">
        <input data-cid="${c.id}" data-field="attachment_max_mb" type="number" min="0" placeholder="${attPlaceholder()}" value="${attDefaultValue()}" onchange="onChanFieldChange(${c.id}, 'attachment_max_mb', this.value)" style="font-size:12px;padding:4px 6px;border-radius:4px;border:1px solid ${bd};background:#fff;color:${fg};width:100%">
        <button onclick="removeChanTag(${c.id})" title="移除渠道" style="background:none;border:none;color:inherit;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;opacity:0.7">×</button>
      </div>`;
    }
    return `<div style="display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:6px 10px;background:${bg};border:1px solid ${bd};border-radius:8px;font-size:12px;color:${fg}"><span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(c.name)} #${c.id}">${escHtml(c.name)} <span style="opacity:0.6">(${escHtml(c.type)})</span> <span style="opacity:0.5;font-family:monospace">#${c.id}</span></span><span style="font-size:11px;opacity:0.75">模板</span><select data-cid="${c.id}" data-field="template" onchange="onChanFieldChange(${c.id}, 'template', this.value)" style="font-size:12px;padding:2px 6px;border-radius:4px;border:1px solid ${bd};background:#fff;color:${fg};min-width:140px">${opts}</select><button onclick="removeChanTag(${c.id})" title="移除渠道" style="background:none;border:none;color:inherit;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;opacity:0.7">×</button></div>`;
  };

  robotEl.innerHTML=robotChans.length?robotChans.map(tagHtml).join(''):'<span style="color:var(--muted);font-size:12px">未添加机器人渠道</span>';
  emailEl.innerHTML=emailChans.length?emailChans.map(tagHtml).join(''):'<span style="color:var(--muted);font-size:12px">未添加邮箱渠道</span>';

// window._chanCfg = {<channel_id>: {template, customer_emails, attachment_max_mb, extras}}
function getChanField(cid, field){
  const cfg=window._chanCfg||{};
  return (cfg[cid]||{})[field]||'';
}
function onChanFieldChange(cid, field, val){
  window._chanCfg=window._chanCfg||{};
  window._chanCfg[cid]=window._chanCfg[cid]||{};
  window._chanCfg[cid][field]=val;
  // 兼容: 模板字段同步到 window._chanTpls (老的全局 template dict)
  if (field==='template') {
    window._chanTpls=window._chanTpls||{};
    if (val) window._chanTpls[cid]=val;
    else delete window._chanTpls[cid];
  }
}

// 每个渠道类型可选模板子集(2026-07-10 §32.4 渠道矩阵)
// email 渠道不需要模板选择(发邮件不走降级策略),但 UI 仍给"默认"占位,后端走 base 默认
// key:channel.type → value:list of template ids (空字符串表示"使用默认")
const CHAN_TPL_OPTIONS={
  dingtalk:[['full','A · 完整(默认)'],['strip','B · 智能裁剪'],['brief','C · 极简']],
  wecom:   [['full','A · 完整(默认)'],['strip','B · 智能裁剪'],['brief','C · 极简']],
  // 2026-07-11: 飞书渠道固定 D (feishu.py 走 _build_post,不读 _template,A/B/C 无效)
  // 只保留 D 选项,用户看到 select 但只能选 D (跟"无 select"行为一致)
  feishu:  [['feishu_full','D · 飞书全量']],
  apprise: [['full','A · 完整(默认)']],
  email:   [['full','A · 完整(默认)']],
};
// 2026-07-11: select option 悬停说明 (跟 §32.4 弹窗模板说明表格互补)
const TPL_OPTION_TITLE={
  'full':         'A · 完整: 标题+元信息+描述,超 4KB 自动切多段。钉钉/企微默认',
  'strip':        'B · 智能裁剪: 优先完整描述 → 超长剥英文段 → 仍超则只保留 attention 关键行 → 兜底只 head+链接',
  'brief':        'C · 极简: 只 head + 链接,描述完全省略,适合「通知到人即可,详情自己点」的内部群',
  'feishu_full':  'D · 飞书全量: 飞书专属单段展示,放宽到 30KB;飞书默认',
};
const CHAN_DEFAULT_TPL={dingtalk:'full',wecom:'full',feishu:'feishu_full',apprise:'full',email:'full'};
function getTplOptsForChannel(chType){
  const list=CHAN_TPL_OPTIONS[chType]||[['full','A · 完整(默认)']];
  // 飞书固定 D,只 1 个选项 → 不显示 "默认" 那行 (默认就是 D,无意义)
  // 其他渠道 3 选项 → 显示 "默认" 让用户快速回退
  const defaultOpt = chType === 'feishu' ? '' :
    '<option value="">— 默认('+({full:'A',strip:'B',brief:'C',feishu_full:'D'}[CHAN_DEFAULT_TPL[chType]||'full'])+') —</option>';
  return defaultOpt + list.map(([v,l])=>`<option value="${v}" title="${(TPL_OPTION_TITLE[v]||'').replace(/"/g,'&quot;')}">${l}</option>`).join('');
}

  document.body.appendChild(modal);

    //   新规则: 是对象 list {channel_id, customer_emails, attachment_max_mb, template, extras}
    window._selChans=(r.channels||[]).map(ch=>typeof ch==='object'&&ch?ch.channel_id:ch);
    window._chanCfg={};
    window._chanTpls={};
    (r.channels||[]).forEach(ch=>{
      if(typeof ch!=='object'||!ch)return;
      const cid=ch.channel_id;
      window._chanCfg[cid]={
        template: ch.template||'',

    if(saved){
      Object.keys(saved).forEach(k=>{const cid=parseInt(k);window._chanTpls[cid]=saved[k];window._chanCfg[cid]=window._chanCfg[cid]||{};window._chanCfg[cid].template=saved[k];});
    }else if(typeof r.template==='string'&&r.template){
      (r.channels||[]).forEach(ch=>{
        const cid=typeof ch==='object'&&ch?ch.channel_id:ch;
        if(cid&&!window._chanCfg[cid]?.template){

    // mislead users into thinking the field still works.
    let f=r.filter_conditions||{};
    const isAll=!(f.chains||[]).length;
    document.getElementById('rall').checked=isAll;
    document.getElementById('rcondsWrap').style.display=isAll?'none':'';
    if(!isAll){
      const chains = f.chains || [];
      window._condChains = chains.map(c => ({
        chain: c.chain || [],
        match: c.match || 'leaf'
      }));
      renderCondPills();

    document.getElementById('rdl').value=r.delay_days||r.delay_hours||0;document.getElementById('rvu').value=r.valid_until||'';document.getElementById('rdm').value=r.digest_mode||'';
    document.getElementById('rnr').checked=r.notify_rollback===1;

    if(r.digest_mode==='weekly'){setTimeout(()=>{if(document.getElementById('dc-weekday'))document.getElementById('dc-weekday').value=dc.weekday??6;},100);}
    else if(r.digest_mode==='monthly'){setTimeout(()=>{if(document.getElementById('dc-month'))document.getElementById('dc-month').value=dc.month_day||'last';},100);}
    else if(r.digest_mode==='quarterly'){setTimeout(()=>{if(document.getElementById('dc-quarter'))document.getElementById('dc-quarter').value=dc.quarter_day||'last';},100);}
    // 恢复窗口配置（仅汇总模式显示）
    const wc=r.window_config||{};
    const hasWin=!!(wc.days?.length || wc.start || wc.end);
    document.getElementById('rwin').checked=hasWin;
    if(hasWin){setTimeout(()=>{if(wc.days){wc.days.forEach(d=>{const cb=document.querySelector('.win-day[value="'+d+'"]');if(cb)cb.checked=true;});}if(wc.start)document.getElementById('winStart').value=wc.start;if(wc.end)document.getElementById('winEnd').value=wc.end;},100);}
    onWinToggle();
  }else{
    // Reset form for new rule
    document.getElementById('rid').value='';document.getElementById('rnm').value='';document.getElementById('rcust').value='';document.getElementById('rdl').value='0';document.getElementById('rvu').value='';document.getElementById('rdm').value='';document.getElementById('rnr').checked=false;document.getElementById('rall').checked=false;document.getElementById('rcondsWrap').style.display='';document.getElementById('dcfg').classList.add('hidden');document.getElementById('dcfg').innerHTML='';document.getElementById('rwin').checked=false;document.getElementById('winCfg').classList.add('hidden');document.querySelectorAll('.win-day').forEach(c=>c.checked=false);document.getElementById('winStart').value='00:00';document.getElementById('winEnd').value='23:59';window._condChains=[];window._selChans=[];window._chanTpls={};window._chanCfg={};renderCondPills();renderChanTags();onDigestModeChange();onCustChange();

}

function onWinToggle(){

  else{w.classList.add('hidden');}
}
function onDigestModeChange(){
  const m=document.getElementById('rdm').value;
  const d=document.getElementById('dcfg');
  const dw=document.getElementById('delayWrap');
  const wsec=document.getElementById('winSection');
  const wdr=document.getElementById('winDaysRow');
  if(!m){
    // 即时模式：只显示延迟，隐藏窗口策略
    d.classList.add('hidden');
    dw.classList.remove('hidden');
    wsec.classList.add('hidden');
    return;
  }
  // 汇总模式：隐藏延迟，显示窗口策略（只有时间段）
  dw.classList.add('hidden');
  wsec.classList.remove('hidden');
  if(wdr)wdr.style.display='none'; // 汇总模式：隐藏周几（只有时间段）
  d.classList.remove('hidden');
  if(m==='weekly'){
    d.innerHTML=`<label style="font-weight:600;margin-bottom:4px;display:block">⏰ 每周推送日</label><select id="dc-weekday"><option value="0">周一</option><option value="1">周二</option><option value="2">周三</option><option value="3">周四</option><option value="4">周五</option><option value="5">周六</option><option value="6" selected>周日</option></select>`;
  }else if(m==='monthly'){
    d.innerHTML=`<label style="font-weight:600;margin-bottom:4px;display:block">⏰ 每月推送日</label><div style="display:flex;gap:8px;align-items:center"><select id="dc-month"><option value="last" selected>最后一天</option>${Array.from({length:28},(_,i)=>`<option value="${i+1}">${i+1}号</option>`).join('')}</select></div>`;

    d.innerHTML=`<label style="font-weight:600;margin-bottom:4px;display:block">⏰ 每季推送日</label><select id="dc-quarter"><option value="last" selected>季度最后一天</option><option value="first">季度第一天</option></select>`;
  }
}

function validateRuleConf(){
  // 窗口策略：汇总模式下勾选启用时，必须配置时间段
  const enWin=document.getElementById('rwin')?.checked;
  const dm=document.getElementById('rdm').value;
  if(enWin && dm){
    const winStart=document.getElementById('winStart').value;
    const winEnd=document.getElementById('winEnd').value;
    if(!winStart||!winEnd){return {valid:false,message:'窗口策略必须配置时间段',type:'block'};}
  }
  return {valid:true};
}async function saveRule(){
  let id=document.getElementById('rid').value;
  const vc=validateRuleConf();
  if(vc.type==='block'){toast(vc.message,'error');return;}
  let chs=window._selChans||[];
  let cid=parseInt(document.getElementById('rcust').value)||0;
  if(!cid)return toast('请选择关联客户','error');
  const isAll=document.getElementById('rall').checked;
  const fc=isAll?{}:{chains:window._condChains||[]};
  const nrr=document.getElementById('rnr')?.checked?1:0;
  // 2026-07-11: channels 改成对象 list,per-channel 字段走 rule_channels 新列
  //   兼容老数字 list:自动转成 {channel_id: ch}
  const chanCfg=window._chanCfg||{};
  const channels=chs.map(ch=>{
    const channelId=typeof ch==='object'&&ch?ch.channel_id:ch;
    const cfg=chanCfg[channelId]||{};
    return {
      channel_id: channelId,
      customer_id: cid,
      customer_emails: cfg.customer_emails||'',
      attachment_max_mb: parseInt(cfg.attachment_max_mb)||0,
      template: cfg.template||(window._chanTpls||{})[channelId]||feishuDefaultTplForChannelId(channelId),
      extras: cfg.extras||'{}'
    };
  });
  let d={name:document.getElementById('rnm').value,filter_conditions:fc,delay_days:parseInt(document.getElementById('rdl').value)||0,digest_mode:document.getElementById('rdm').value,valid_until:document.getElementById('rvu').value,customer_id:cid,channels:channels,notify_rollback:nrr,template:window._chanTpls||{}};
  const dm=d.digest_mode;
  if(dm){
    let dc={};
    if(dm==='weekly'){const el=document.getElementById('dc-weekday');dc.weekday=el?parseInt(el.value):6;}
    else if(dm==='monthly'){const el=document.getElementById('dc-month');dc.month_day=el?(el.value==='last'?'last':parseInt(el.value)):'last';}
    else if(dm==='quarterly'){const el=document.getElementById('dc-quarter');dc.quarter_day=el?el.value:'last';}
    d.digest_config=dc;
  }
  // 窗口配置：仅汇总模式可配置（勾选启用时）
  if(document.getElementById('rwin')?.checked && dm){
    const start=document.getElementById('winStart').value;
    const end=document.getElementById('winEnd').value;
    d.window_config={start,end}; // 汇总模式：只限制时间段
  }
  let r=id?await api('/subscriptions/'+id,{method:'PUT',body:JSON.stringify(d)}):await api('/subscriptions',{method:'POST',body:JSON.stringify(d)});
  if(r.code===0){toast('已保存');document.getElementById('rModalWrap')?.remove();subscriptions();}else toast(r.message,'error');
}async function delRule(id){await confirmAct('删除此订阅规则？', async ()=>{const r=await api('/subscriptions/'+id,{method:'DELETE'});if(r.code===0){toast('已删除');subscriptions();}else toast(r.message,'error');}, '🗑️', '删除');}

async function history(){
  let days=new URLSearchParams(location.hash.split('?')[1]||'').get('days')||'30';
  const r=await api('/history?limit=200&days='+days);const list=r.data?.items||[];
  // 不再按 minute-level 聚合,每个 delivery 直接一行
  // 渠道类型 → 中文标签 + emoji
  const botTypes = new Set(['wecom','dingtalk','feishu','webhook']);
  let html='';
  list.forEach(h=>{
    let dels=h.deliveries||[];
    if(!dels.length){
      html+=`<tr style="background:var(--gray-bg)"><td>${fmtTZ(h.pushed_at||h.first_seen_at||'',true)}</td><td>—</td><td>${h.product_name||''}</td><td>${typeCN(h.package_type)}</td><td title="${escHtml(h.file_name||'')}" style="max-width:380px"><span style="display:inline-block;padding:1px 6px;background:#fff;color:var(--text);border-radius:4px;font-family:'SF Mono','Fira Code',monospace;font-size:11px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle">${escHtml(h.file_name||'')}</span></td><td><span class="badge badge-${h.urgency==='critical'?'err':h.urgency==='high'?'warn':'ok'}">${h.urgency||''}</span></td><td>—</td><td>—</td><td>—</td></tr>`;
    }else{
      dels.forEach(d=>{
        // 2026-07-11: channel_name 可能含客户名,格式 "<原渠道名>|Nsf0cus|<客户名>"
        // 拆出原渠道名(展示用)和客户名(代替 LEFT JOIN customers 的 d.customer_name)
        const _SEP='|Nsf0cus|';
        let _chanName = d.channel_name || '';
        let _custName = '';
        if (_chanName.includes(_SEP)) {
          const _parts = _chanName.split(_SEP);
          _chanName = _parts[0];
          _custName = _parts.slice(1).join(_SEP);  // 客户名理论上不含分隔符,但 slice(1).join 防止嵌套
        }
        // 渠道列: 机器人显示「<chip 类型> 渠道名」;email 显示「渠道名 (发件邮箱)」
        // 发件邮箱 sender 由 email notifier 写入;老数据/机器人渠道为空时 fallback 到 recipient
        let channelDisp;
        if (botTypes.has(d.channel_type)) {
          channelDisp = `${chTypeChip(d.channel_type, false)} ${escHtml(_chanName||'—')}`;
        } else if (d.channel_type === 'email') {
          let senderEmail = d.sender || d.recipient || '';
          channelDisp = senderEmail ? `${escHtml(_chanName||'—')} (${escHtml(senderEmail)})` : escHtml(_chanName||'—');
        } else {
          channelDisp = escHtml(_chanName) || '—';
        }
        // 收件人:email 渠道显示邮箱;机器人渠道没个人收件人,用 _chanName 替代,跟机器人名一致
        let recipient = d.recipient || _chanName || '—';
        html += `<tr style="background:var(--gray-bg)">
            <td>${fmtTZ(d.sent_at||h.pushed_at||h.first_seen_at||'',true)}</td>
            <td>${_custName||d.customer_name||'—'}</td>
            <td>${h.product_name||''}</td>
            <td>${typeCN(h.package_type)}</td>
            <td title="${escHtml(h.file_name||'')}" style="max-width:380px"><span style="display:inline-block;padding:1px 6px;background:var(--gray-bg);color:var(--text);border-radius:4px;font-family:'SF Mono','Fira Code',monospace;font-size:11px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle">${escHtml(h.file_name||'')}</span></td>
            <td><span class="badge badge-${h.urgency==='critical'?'err':h.urgency==='high'?'warn':'ok'}">${h.urgency||''}</span></td>
            <td>${channelDisp}</td>
            <td title="${escHtml(recipient)}" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${escHtml(recipient)}</td>
            <td><span class="badge ${d.delivery_status==='sent'?'badge-ok':'badge-err'}">${d.delivery_status==='sent'?'✅ 成功':'❌ 失败'}</span></td>
            <td><button class="btn btn-xs btn-primary" data-resend-sid="${h.id}" onclick="resendTargeted(${h.id},${d.channel_id||0},${d.customer_id||0},this)">📤 重推</button></td>
        </tr>`;
      });
    }
  });
  document.getElementById('app').innerHTML=`<div class="card"><div class="card-hd">📜 推送历史 <span style="margin-left:auto;font-size:12px;font-weight:400;color:var(--muted);display:flex;align-items:center;gap:8px"><select onchange="let d=this.value;location.hash='history?days='+d;history()" style="padding:3px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px"><option value="1" ${days==='1'?'selected':''}>近1天</option><option value="3" ${days==='3'?'selected':''}>近3天</option><option value="7" ${days==='7'?'selected':''}>近7天</option><option value="30" ${days==='30'?'selected':''}>近30天</option><option value="90" ${days==='90'?'selected':''}>近90天</option><option value="365" ${days==='365'?'selected':''}>近1年</option><option value="0" ${days==='0'?'selected':''}>全部</option></select><a href="#" onclick="history()">刷新</a><button class="btn btn-xs btn-outline" style="color:var(--danger);border-color:var(--danger)" onclick="confirmClearHistory()">🗑 清空</button></span></div><div class="card-bd pt0"><table><tr><th style="width:140px">时间</th><th>客户</th><th>产品</th><th>类型</th><th>文件名</th><th>紧急度</th><th>渠道</th><th>收件人</th><th>状态</th><th>操作</th></tr>${html||'<tr><td colspan="10" class="empty">暂无推送记录</td></tr>'}</table></div></div>`;
}
async function confirmClearHistory(){
  let days=document.querySelector('#app select')?.value||'30';
  let label=days==='0'?'全部':`最近${days}天之前的`;
  await confirmAct(`⚠️ 确认清空${label}推送历史记录？此操作不可撤销。`, async ()=>{const r=await api('/history?days='+(days==='0'?'':days),{method:'DELETE'});toast(r.message||'已清空',r.code===0?'success':'error');if(r.code===0)history();}, '🗑️', '确认清空', true);
}

function _renderRecentDeliveries(deliveries,range){
  if(!deliveries||!deliveries.length)return '';
  const ranges={1:'1天',7:'7天',30:'1个月',365:'1年'};
  let btns=Object.entries(ranges).map(([v,l])=>`<button class="btn btn-xs ${range===v?'btn-primary':'btn-outline'}" onclick="dashboard('${v}')">${l}</button>`).join('');
  // Aggregate: group by customer+product+type
  let agg={};
  deliveries.forEach(d=>{
    // 2026-07-11: channel_name 可能含客户名, split 出原渠道名再聚合,避免渠道列变长
    let _cn = d.channel_name || '';
    const _idx = _cn.indexOf('|Nsf0cus|');
    if (_idx >= 0) _cn = _cn.substring(0, _idx);
    let key=`${d.customer_name||'—'}|${d.product_name}|${d.package_type}`;
    if(!agg[key])agg[key]={cust:d.customer_name||'—',prod:d.product_name,pkg:d.package_type,channels:new Set(),count:0,last:d.sent_at,status:d.delivery_status};
    agg[key].count++;
    agg[key].channels.add(_cn||d.channel_type);
    if(d.sent_at>agg[key].last)agg[key].last=d.sent_at;
  });
  let rows=Object.values(agg).sort((a,b)=>b.last.localeCompare(a.last)).slice(0,15).map(a=>{
    let stIcon=a.status==='sent'?'✅':'❌';
    return `<tr><td>${a.cust}</td><td>${a.prod}</td><td>${typeCN(a.pkg)}</td><td>${a.count}次</td><td>${[...a.channels].join(', ')}</td><td>${a.last?fmtTZ(a.last,true):''}</td></tr>`;
  }).join('');
  return `<div class="card" style="margin-top:14px"><div class="card-hd">📨 最近推送明细 <span style="margin-left:auto;font-weight:400">${btns}</span></div><div class="card-bd pt0"><table><tr><th>客户</th><th>产品</th><th>类型</th><th>次数</th><th>渠道</th><th>最近</th></tr>${rows||'<tr><td colspan="6" class="empty">暂无</td></tr>'}</table></div></div>`;
}

// 自动发现 banner — 仅在产品管理页面显示，支持手动关闭/重新打开
// 由 products() 和 MutationObserver 触发
let _discObs;
function _initDiscObserver(){
  if(_discObs) return;
  const app=document.getElementById('app');
  if(!app) return;
  _discObs=new MutationObserver(()=>{ _checkDiscBanner(); });
  _discObs.observe(app,{childList:true});
}
function _checkDiscBanner(){
  // 只在产品管理页面处理
  const isProductsPage=document.getElementById('disc-area')||document.querySelector('[data-page="products"]');
  if(!isProductsPage) return;
  // 每次进入产品页都清除隐藏状态，保证切页回来能重新显示
  window._discBannerHidden=false;
  window._discTimer && clearInterval(window._discTimer);
  api('/system/products/discover/status').then(s=>{
    if(s.code===0 && s.data?.active){
      _showDiscBanner(s.data);
    } else if(s.code===0 && s.data?.phase==='done' && (window._discLastDone || s.data.result)){
      // 页面刷新后 window._discLastDone 丢失，优先用 is_stale 标记提示用户
      if(s.data.is_stale){
        // 服务重启恢复：保存结果到内存，按钮变为待确认状态，等用户点击按钮再显示弹窗
        window._pendingDiscResult=s.data.result;
        window._pendingDiscStale=true;
        updateNavPendingBadge();
      } else if(window._discLastDone){
        showDiscoverResult(window._discLastDone);
      }
      window._discLastDone=null;
    }
  });
}
function _hideDiscBanner(){
  clearInterval(window._discTimer);
  const b=document.getElementById('disc-banner');
  if(b) b.remove();
  // 显示一个小悬浮按钮，点击恢复 banner
  if(document.getElementById('disc-mini-btn')) return;
  const mini=document.createElement('div');
  mini.id='disc-mini-btn';
  mini.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#7c3aed);color:#fff;border-radius:24px;padding:8px 16px;box-shadow:0 4px 16px rgba(124,58,237,0.4);z-index:3000;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px';
  mini.innerHTML='<span style="font-size:15px">🔍</span><span>自动发现进行中…</span>';
  mini.onclick=async()=>{
    mini.remove();
    const s=await api('/system/products/discover/status');
    if(s.code===0 && s.data?.active) _showDiscBanner(s.data);
  };
  document.body.appendChild(mini);
}
function _showDiscBanner(state){
  const existing=document.getElementById('disc-banner');
  if(existing) existing.remove();
  // phase 文案统一走 formatDiscPhase(支持并发 running_products 显示)
  const pct=state.phase==='done'?100:
    state.phase==='scanning_products'?5:
    state.phase==='discovering_pkg_types' && state.total?
      5+Math.round((state.progress/state.total)*90):0;
  const banner=document.createElement('div');
  banner.id='disc-banner';
  banner.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#7c3aed);color:#fff;border-radius:10px;padding:10px 20px;box-shadow:0 8px 32px rgba(124,58,237,0.4);z-index:3000;min-width:320px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px';
  banner.innerHTML=`
    <div style="flex:1">
      <div style="font-weight:600;margin-bottom:4px">🔍 自动发现任务进行中</div>
      <div id="disc-banner-phase" style="opacity:0.9;font-size:12px">${formatDiscPhase(state)}</div>
      <div style="margin-top:6px;height:3px;background:rgba(255,255,255,0.25);border-radius:4px">
        <div id="disc-banner-bar" style="height:100%;background:#fff;border-radius:4px;transition:width 0.4s;width:${pct}%"></div>
      </div>
    </div>
    <div onclick="event.stopPropagation();_showDiscLogFloat()" style="background:rgba(255,255,255,0.2);border-radius:6px;padding:4px 10px;font-size:12px;white-space:nowrap">📋 日志</div>
    <div onclick="event.stopPropagation();_reopenDiscModal()" style="background:rgba(255,255,255,0.2);border-radius:6px;padding:4px 10px;font-size:12px;white-space:nowrap">查看</div>
    <div onclick="event.stopPropagation();_cancelDisc()" style="background:rgba(255,255,255,0.25);border-radius:6px;padding:4px 10px;font-size:12px;white-space:nowrap;cursor:pointer" title="停止自动发现(已完成产品丢弃)">⏹ 停止</div>
    <div onclick="event.stopPropagation();_hideDiscBanner()" style="background:rgba(255,255,255,0.15);border-radius:6px;padding:4px 8px;font-size:14px;color:rgba(255,255,255,0.7);cursor:pointer;line-height:1;margin-left:4px" title="关闭">×</div>`;
  banner.onclick=_reopenDiscModal;
  document.body.appendChild(banner);

  // ETA tracking — single timestamp shared with polling closure
  window._discStartTs = Date.now();

  let done=false;
  window._discTimer=setInterval(async()=>{
    if(done) return;
    const s=await api('/system/products/discover/status');
    if(s.code===0){
      const phase=document.getElementById('disc-banner-phase');
      const bar=document.getElementById('disc-banner-bar');
      // Phase text + ETA suffix (estimated time remaining)
      let phaseText = formatDiscPhase(s.data);
      if(s.data.phase==='discovering_pkg_types' && s.data.total && s.data.progress){
        const elapsedSec = (Date.now() - (window._discStartTs||Date.now())) / 1000;
        const ratio = s.data.progress / s.data.total;
        // Skip ETA in first 5s to avoid divide-by-tiny
        if(elapsedSec > 5 && ratio > 0.05){
          const remainSec = Math.round(elapsedSec * (1 - ratio) / ratio);
          if(remainSec > 0 && remainSec < 3600){
            phaseText += ` · 约剩 ${remainSec<60?remainSec+'秒':Math.round(remainSec/60)+'分钟'}`;
          }
        }
      }
      if(phase) phase.textContent=phaseText;
      if(bar){
        const p=s.data.phase==='done'?100:
          s.data.phase==='scanning_products'?5:
          s.data.phase==='discovering_pkg_types' && s.data.total?
            5+Math.round((s.data.progress/s.data.total)*90):0;
        bar.style.width=p+'%';
      }
      // 更新浮窗日志（如果已创建）

      } else if(s.data.phase==='cancelled'){

        const b=document.getElementById('disc-banner');if(b)b.remove();
        const mini=document.getElementById('disc-mini-btn');if(mini)mini.remove();

        const mini=document.getElementById('disc-mini-btn');if(mini)mini.remove();

      if(done){try{localStorage.setItem('nsm_disc_status_update', String(Date.now()));}catch(e){}}
    }
  },2000);
}
