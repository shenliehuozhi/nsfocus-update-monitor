// 从 typesObj.paths 统计所有唯一 type key，用 MAP 翻译显示
// types.types 可能是 raw keys（如 ['sys','rule']）也可能是完整显示名（如 ['WAF V6.0.9系统升级包']）
// 统一策略：统计 paths.types 中所有原始 key，按出现次数排序，MAP 翻译
function _groupPkgTypes(typesObj) {
  const MAP = {sys:'系统',rule:'规则',nti:'威胁情报',av:'病毒库',apprule:'应用规则',url:'URL库',wcs:'恶意站点',judge:'研判',geo:'地理库',interface:'接口',special:'特殊',other:'其他',merge:'合并',client:'客户端',av_stream:'流式病毒库',test:'测试'};
  const {types, paths} = typesObj;
  if (!types || !types.length) return '';

  // 统计 paths.types 中每个 type key 的出现次数
  const cnt = {};
  if (paths && paths.length > 0) {
    paths.forEach(p => { (p.types || []).forEach(t => { cnt[t] = (cnt[t]||0) + 1; }); });
  }

  // 如果 paths.types 全是完整显示名（不在 MAP 中），则统计 types.types 自身
  const hasRawKeys = Object.keys(cnt).some(k => k in MAP);
  if (hasRawKeys) {
    const sorted = Object.keys(cnt).filter(k => k in MAP).sort((a,b) => (cnt[b]||0) - (cnt[a]||0));
    return sorted.map(k => `${MAP[k]||k}(${cnt[k]})`).join(', ');
  }

  // 降级：paths.types 全是完整显示名，直接统计 types.types 各 key 的路径数
  // 同时用完整显示名做 key（取 types.types 本身）
  if (paths && paths.length > 0) {
    const seen = new Set(types);
    const fullCnt = {};
    paths.forEach(p => {
      (p.types || []).forEach(t => {
        if (seen.has(t)) fullCnt[t] = (fullCnt[t]||0) + 1;
      });
    });
    const sorted = [...types].sort((a,b) => (fullCnt[b]||0) - (fullCnt[a]||0));
    return sorted.map(t => `${t}(${fullCnt[t]||0})`).join(', ');
  }

  return types.map(t => MAP[t] || t).join(', ');
}

function fmtPkgTypes(v){
  if(!v) return '';
  let types = v;
  try { types = JSON.parse(v); } catch {}
  if (!types) return '';
  // 新格式: {types:[...], paths:[...], modes:{}}
  if (types.types) return _groupPkgTypes(types);
  // 旧格式: [...]
  if (Array.isArray(types)) return _fmtOldTypes(types);
  return '';
}

// ── 缩写→中文映射（同时支持 raw key 和完整中文名）────────────────────────────
const PKGMAP = {
  // 缩写 key
  sys:'系统', rule:'规则', nti:'威胁情报', av:'病毒库', apprule:'应用规则',
  url:'URL库', wcs:'恶意站点', judge:'研判', geo:'地理库', interface:'接口',
  special:'特殊', other:'其他', merge:'合并', client:'客户端',
  av_stream:'流式病毒库', test:'测试', engine:'引擎',
  // 完整中文名（WAF 等产品的 chain[-1] 格式）
  '系统升级包':'系统', '规则升级包':'规则', '威胁情报升级包':'威胁情报',
  '病毒库升级包':'病毒库', '应用规则库升级包':'应用规则', 'URL分类库升级包':'URL库',
  '恶意站点库升级包':'恶意站点', '研判规则库升级包':'研判', '地理库升级包':'地理库',
  '接口升级包':'接口', '特殊升级包':'特殊', '其他升级包':'其他',
  '合并升级包':'合并', '客户端':'客户端', '流式病毒库升级包':'流式病毒库',
  '测试升级包':'测试', '引擎升级包':'引擎',
};

function _mapType(t) {
  // 先精确匹配
  if (t in PKGMAP) return PKGMAP[t];
  // 后缀匹配（处理 WAF V6.0.9系统升级包 → 系统）
  for (const [suffix, label] of Object.entries(PKGMAP)) {
    if (t.endsWith(suffix)) return label;
  }
  // 前缀+关键词归约（处理 WAF规则包、海光系列 V6.0.9系统升级等）
  if (t.includes('规则')) return '规则';
  if (t.includes('系统升级') || t.endsWith('系统')) return '系统';
  if (t.includes('引擎升级') || t.includes('引擎')) return '引擎';
  if (t.includes('威胁情报')) return '威胁情报';
  if (t.includes('合并升级') || t.includes('合并')) return '合并';
  // 纯版本号类（如 WAF V6.0.3）归为其他
  if (/V?\d+\.\d+/.test(t) && !t.includes('升级')) return '其他';
  return t;
}

// 旧格式 raw key 列表
const _rawKeys = new Set(['sys','rule','nti','av','apprule','url','wcs','judge','geo','interface','special','other','merge','client','av_stream','test','engine']);

// 从 typesObj.paths 归约统计
// 核心：直接从 paths.types 计数，用 PKGMAP 归约分组
function _groupPkgTypes(typesObj) {
  const {types, paths} = typesObj;
  if (!paths || !paths.length) return types ? types.map(_mapType).join(', ') : '';

  // 统计 paths.types 中每个 type 的出现次数
  const cnt = {};
  paths.forEach(p => { (p.types || []).forEach(t => { cnt[t] = (cnt[t]||0) + 1; }); });

  // 判断是 raw key 模式还是完整中文名模式
  const rawKeysInCnt = Object.keys(cnt).filter(k => _rawKeys.has(k));
  if (rawKeysInCnt.length > 0) {
    // raw key 模式（如 sys/rule/nti）
    const sorted = rawKeysInCnt.sort((a,b) => (cnt[b]||0) - (cnt[a]||0));
    return sorted.map(k => `${_mapType(k)}(${cnt[k]})`).join(', ');
  }

  // 完整中文名模式：用 PKGMAP 归约分组
  const merged = {};
  Object.keys(cnt).forEach(t => {
    const base = _mapType(t); // "WAF V6.0.9系统升级包" → "系统"
    merged[base] = (merged[base]||0) + cnt[t];
  });

  const sorted = Object.keys(merged).sort((a,b) => merged[b]-merged[a]);
  return sorted.map(k => `${k}(${merged[k]})`).join(', ');
}

function _fmtOldTypes(arr) {
  return arr.map(t => _mapType(t)).join(', ');
}

// 从 paths 数组构建可折叠目录树 HTML
function buildTreeHtml(pt, MAP) {
  const paths = pt.paths || [];
  if (paths.length === 0) return '<span style="color:var(--gray-disabled)">无路径数据</span>';

  const root = {};
  paths.forEach(p => {
    const chain = p.chain || [];
    if (chain.length === 0) return;
    let node = root;
    chain.forEach((name, idx) => {
      if (!node._children) node._children = {};
      if (!node._children[name]) node._children[name] = { _children: {}, _types: [], _isPkg: false };
      node = node._children[name];
      if (idx === chain.length - 1) { node._isPkg = true; node._types = p.types || []; }
    });
  });

  function renderNode(node, name, depth) {
    const indent = depth * 16;
    const children = node._children ? Object.entries(node._children) : [];
    const hasChildren = children.length > 0;
    const isPkg = node._isPkg;
    const types = node._types || [];

    let html = `<div class="tree-node" style="padding-left:${indent}px;display:flex;align-items:center;gap:4px;padding-top:4px;padding-bottom:4px;min-height:28px">`;

    if (hasChildren) {
      html += `<span class="tree-toggle" onclick="treeToggle(this)" style="cursor:pointer;color:var(--gray-disabled);font-size:14px;margin-right:4px;user-select:none;flex-shrink:0">&#9658;</span>`;
    } else {
      html += `<span style="width:18px;flex-shrink:0"></span>`;
    }

    const icon = isPkg ? '&#128196;' : (hasChildren ? '&#128193;' : '&#128196;');
    const label = MAP[name] || name;
    const childCount = hasChildren ? ` <span style="color:var(--gray-disabled);font-size:11px">(${children.length})</span>` : '';
    html += `<span style="font-size:13px;color:var(--gray-muted);flex-shrink:0">${icon} ${escHtml(label)}${childCount}</span>`;

    if (isPkg && types.length > 0) {
      const badges = types.map(t => `<span style="background:var(--snap-pkg-type-badge);color:var(--snap-pkg-type-color);font-size:10px;padding:1px 6px;border-radius:8px;margin-left:2px;flex-shrink:0">${MAP[t]||escHtml(t)}</span>`).join('');
      html += badges;
      const modeKey = types[0];
      const mode = (pt.modes && pt.modes[modeKey]) || 'auto';
      html += `<select data-type="${escHtml(modeKey)}" onchange="window._ptModes['${escHtml(modeKey)}']=this.value" style="margin-left:auto;flex:0 0 80px;padding:2px 6px;border:1px solid var(--gray-border);border-radius:6px;font-size:11px;cursor:pointer">
        <option value="auto" ${mode==='auto'?'selected':''}>自动</option>
        <option value="full" ${mode==='full'?'selected':''}>全量</option>
        <option value="incremental" ${mode==='incremental'?'selected':''}>增量</option>
      </select>`;
    } else if (!hasChildren) {
      html += `<span style="margin-left:auto;color:var(--gray-disabled);font-size:11px;flex-shrink:0">—</span>`;
    } else {
      html += `<span style="margin-left:auto;color:var(--gray-disabled);font-size:11px;flex-shrink:0">&#9658;</span>`;
    }
    html += `</div>`;

    if (hasChildren) {
      html += `<div class="tree-children" style="display:none">`;
      children.forEach(([childName, childNode]) => { html += renderNode(childNode, childName, depth + 1); });
      html += `</div>`;
    }
    return html;
  }

  let treeHtml = '<div style="font-family:system-ui">';
  const rootChildren = root._children ? Object.entries(root._children).sort(([a],[b]) => {
    const aV = /\d/.test(a); const bV = /\d/.test(b);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    return a.localeCompare(b, 'zh');
  }) : [];
  rootChildren.forEach(([name, node]) => { treeHtml += renderNode(node, name, 0); });
  treeHtml += '</div>';
  return treeHtml;
}

// Build data tree: renders snapshots using paths chain as directory structure.
// snapshotsMap: { "version_branch|short_type": [snapshot, ...], ... }
// MAP: type code -> Chinese label map
// verTypeMap: { "ver|shortType": dispType } for snapshot type display
// alias: product alias to strip from version (e.g., "WAF")
// sid: source id for click delegation
function buildDataTreeHtml(pt, snapshotsMap, MAP, verTypeMap, alias, sid) {
  const paths = pt.paths || [];
  if (paths.length === 0) return '<span style="color:var(--gray-disabled)">无路径数据</span>';

  // Build tree structure from paths
  const root = {};
  paths.forEach((p, pathIdx) => {
    const chain = p.chain || [];
    if (chain.length < 2) return;
    let node = root;
    // Track accumulated chain for intermediate nodes
    let accChain = [];
    chain.forEach((name, idx) => {
      if (!node.__children) node.__children = {};
      if (!node.__children[name]) node.__children[name] = { __children: {}, __isPkg: false, __pkgKey: null, __snapshots: [], __pathId: '', __chain: [], __pathIdx: -1 };
      node = node.__children[name];
      // Set __chain for ALL nodes (not just leaves) so intermediate clicks work
      node.__chain = accChain.concat([name]);
      node.__pathIdx = pathIdx;
      if (idx === chain.length - 1) {
        node.__isPkg = true;
        const rawType = (p.types || [])[0] || '';
        node.__pkgKey = chain[chain.length - 1] || (ver + '|' + rawType);
        node.__pathId = p.url || '';
        // Store the backend-computed path_id on the leaf node so tree clicks can
        // pass it directly to _dataSelectedPathId (avoids the verHint/pkgHint
        // ambiguity when several chains share one URL — see propagateHints).
        if (p.path_id) node.__backendPathId = p.path_id;
      }
      accChain = node.__chain;
    });
  });

  // Attach snapshots to matching leaf nodes
  // snapshotsMap key = source_url (relative path, stripped of BASE_URL)
  // tree node __pathId = p.url (relative path from product management)
  // Direct URL comparison — no version/type matching needed
  Object.entries(snapshotsMap || {}).forEach(([urlKey, snaps]) => {
function attach(node) {
      if (node.__isPkg && node.__pathId) {
        // Normalize both URLs: strip protocol/host, ensure single leading /
        // node.__pathId may or may not have leading /, urlKey may or may not
        // Normalize to: no leading /, no trailing /
        const stripSlashes = s => s.replace(/^\/+|\/+$/g, '');
        const normNode = '/' + stripSlashes(node.__pathId);
        const normKey  = '/' + stripSlashes(urlKey);
        if (normNode === normKey) {
          // Several chains share this URL (NSFocus real structure). Don't
          // `return true` — keep walking so every chain's leaf gets a chance
          // to match. Only attach snaps to the leaf whose __backendPathId is
          // in the snap array; other leaves leave __snapshots as [].
          // Note: with one URL key, attach is called once and walks the tree.
          const leafPid = node.__backendPathId;
          const matchedSnap = leafPid && snaps.find(s => s.path_id === leafPid);
          if (matchedSnap) {
            node.__snapshots = [matchedSnap];
          } else if (!leafPid) {
            // No path_id on the leaf (legacy) — fall back to first matching
            // (ver, pkg) snap in the array.
            const matchedByVer = snaps.find(s => {
              const last2 = (node.__chain || []).slice(-2);
              return last2[0] === s.version_branch && last2[1] === s.package_type;
            });
            node.__snapshots = matchedByVer ? [matchedByVer] : [];
          } else {
            // path_id exists but no snap matches — leave empty (the right
            // panel dataBuildFeed uses snap.path_id to display correctly).
            node.__snapshots = [];
          }
          // Do NOT return — keep walking so sibling leaves can try.
        }
      }
      if (node.__children) {
        for (const [, child] of Object.entries(node.__children)) {
          attach(child);  // no early return — every leaf gets a chance
        }
      }
    }
    attach(root);
  });

  // Phase 2: Propagate version_branch, package_type hints and freshness from leaves up.
  function propagateHints(node) {
    if (node.__isPkg) {
      const snaps = node.__snapshots || [];
      if (snaps.length > 0) {
        const verHint = snaps[0].version_branch || '';
        const pkgHint = snaps[0].package_type || '';
        const now = Date.now();
        const latestPublished = snaps.reduce((max, s) => {
          if (!s.published_at) return max;
          const t = new Date(s.published_at).getTime();
          return t > max ? t : max;
        }, 0);
        let freshness = 'idle';
        if (latestPublished > 0) {
          const days = (now - latestPublished) / 86400000;
          if (days <= 30) freshness = 'new';
          else if (days <= 365) freshness = 'lowfreq';
        }
        node.__freshness = freshness;
        return { ver: verHint, pkg: pkgHint, freshness };
      }
      return null;
    }
    if (!node.__children) return null;
    let verSet = new Set(), pkgSet = new Set();
    let childFreshness = 'idle';
    for (const [, child] of Object.entries(node.__children)) {
      const childHints = propagateHints(child);
      if (!childHints) continue;
      if (childHints.ver) verSet.add(childHints.ver);
      if (childHints.pkg) pkgSet.add(childHints.pkg);
      // Highest priority: new > lowfreq > idle
      if (childHints.freshness === 'new') childFreshness = 'new';
      else if (childHints.freshness === 'lowfreq' && childFreshness !== 'new') childFreshness = 'lowfreq';
    }
    if (verSet.size === 1) node.__verHint = [...verSet][0];
    if (pkgSet.size === 1) node.__pkgHint = [...pkgSet][0];
    node.__freshness = childFreshness;
    return { ver: verSet.size === 1 ? [...verSet][0] : '', pkg: pkgSet.size === 1 ? [...pkgSet][0] : '', freshness: childFreshness };
  }
  propagateHints(root);

  // Render the tree
  function renderNode(node, name, depth) {
    const indent = depth * 16;
    const children = node.__children ? Object.entries(node.__children) : [];
    const hasChildren = children.length > 0;
    const isPkg = node.__isPkg;
    const snaps = node.__snapshots || [];

    // Determine target div to toggle (both empty and non-empty pkg nodes need IDs)
    // Use __pathId (URL) for targetId to ensure uniqueness — same leaf name across different
    // versions (e.g. "引擎升级包" x16) must not share the same ID. __pathId is unique per path.
    // For paths with empty URLs (NF-B/NF-D, etc.), include __pathIdx in the ID to distinguish
    // duplicate chains that share the same empty URL (e.g. NF-B "引擎库升级包" ×3).
    let targetId = null;
    if (isPkg) {
      const rawId = node.__pathId
        ? node.__pathId
        : ('|' + (node.__chain || []).join('|') + '|idx=' + node.__pathIdx);
      targetId = 'pktbl_' + rawId
          .replace(/[^\x00-\x7F]/g, function(m) { return '_' + m.charCodeAt(0).toString(16) + '_'; })
          .replace(/\W/g, '_');
    }

    // Clicking any node: filter right panel to that product/sub-category/version
    // Clicking a leaf node: also expand the corresponding row in the right panel
    // data attributes for event delegation
    const chainJson = JSON.stringify(node.__chain || []).replace(/"/g, '&quot;');
    const nodeUrl = node.__pathId || '';
    const isLeaf = isPkg ? '1' : '0';
    // For leaf nodes, collect snapshot IDs for right-panel expansion
    const leafSnapIds = isPkg ? (snaps.map(s => s.id).join(',')) : '';
    // Hints for filtering: version_branch and package_type shared by all descendants
    const verHint = node.__verHint || '';
    const pkgHint = node.__pkgHint || '';
    // Backend-computed path_id (MD5(BASE_URL+url+chain)[:12]) — preferred over
    // verHint/pkgHint when the URL is shared by multiple chains (NSFocus
    // NSFocus chains can map to the same URL with different ver segments).
    // Empty when this is an intermediate (non-leaf) node or the path has no
    // backend path_id yet.
    const nodePathId = node.__backendPathId || '';

    const icon = isPkg ? '&#128196;' : (hasChildren ? '&#128193;' : '&#128196;');
    const label = isPkg ? name : (MAP[name] || name);
    const childCount = hasChildren ? ` <span style="color:var(--gray-disabled);font-size:11px">(${children.length})</span>` : '';
    const snapCount = isPkg ? (
      snaps.length > 0
        ? ` <span style="background:var(--primary-light);color:var(--primary-text);font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">${snaps.length}包</span>`
        : ` <span style="background:var(--danger-light);color:var(--danger);font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">空</span>`
    ) : '';
    const freshBadge = (node.__freshness === 'new') ? ` <span style="background:var(--success);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">活跃</span>` : (node.__freshness === 'lowfreq' ? ` <span style="background:var(--warn);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">低频</span>` : (node.__freshness === 'idle' ? ` <span style="background:var(--gray-disabled);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">沉寂</span>` : ''));
    // Arrow: toggle children visibility via data-action="treeToggle" (handled by event delegation)
    // Uses a generated children ID stored in data-target on the arrow
    const childDivId = hasChildren ? ('tcd_' + sid + '_' + depth + '_' + name.replace(/\W/g, '_')) : null;
    const arrow = hasChildren || isPkg
      ? `<span onclick="treeToggleById('${childDivId}', this); event.stopPropagation();" style="cursor:pointer;color:var(--gray-disabled);font-size:13px;user-select:none;flex-shrink:0;margin-right:4px">&#9658;</span>`
      : `<span style="width:13px;flex-shrink:0;margin-right:4px"></span>`;
    let html = `<div class="tree-node" data-action="treeNode" data-sid="${sid}" data-chain="${chainJson}" data-url="${nodeUrl}" data-isleaf="${isLeaf}" data-snapids="${leafSnapIds}" data-verhint="${escHtml(verHint)}" data-pkghint="${escHtml(pkgHint)}" data-pathid="${escHtml(nodePathId)}" style="padding-left:${indent}px;display:flex;align-items:center;padding-top:4px;padding-bottom:4px;min-height:28px;cursor:pointer">`;
    html += arrow;
    html += `<span style="font-size:13px;color:var(--gray-muted);flex-shrink:0">${icon} ${escHtml(label)}${childCount}${snapCount}${freshBadge}</span>`;
    html += `</div>`;

    if (hasChildren) {
      html += `<div id="${childDivId}" class="tree-children" data-target="${childDivId}" style="display:none">`;
      children.forEach(([childName, childNode]) => { html += renderNode(childNode, childName, depth + 1); });
      html += `</div>`;
    }

    // Snapshot table for leaf nodes — NO LONGER rendered here.
    // Clicking a leaf node now filters the right panel to that URL and expands the row there.
    // Empty leaves still show the placeholder div so tree height is consistent.
    if (isPkg) {
      if (snaps.length === 0) {
        // Snapshot content is rendered into the right panel on click, not into the tree.
        // Keep a minimal placeholder so tree height is stable — uses a fixed non-conflicting id.
        html += `<div class="tree-children" style="display:none;padding-left:${indent + 16}px;margin-bottom:8px">
          <div style="color:var(--muted);font-size:12px;padding:8px 12px;background:var(--gray-bg);border-radius:4px">
            暂无采集数据<div style="font-size:11px;margin-top:2px">页面可能返回登录页或无数据包</div>
          </div></div>`;
      }
      // When snaps.length > 0: no placeholder div needed — clicking the leaf node
      // directly populates the right panel via dataBuildFeed().
    }

    return html;
  }

  let treeHtml = '<div style="font-family:system-ui">';
  const rootChildren = root.__children ? Object.entries(root.__children).sort(([a],[b]) => {
    const aV = /\d/.test(a); const bV = /\d/.test(b);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    return a.localeCompare(b, 'zh');
  }) : [];
  // Skip the top-level product name node if it's the only child (duplicates card title)
  if (rootChildren.length === 1) {
    const [topName, topNode] = rootChildren[0];
    const topChildren = topNode.__children ? Object.entries(topNode.__children).sort(([a],[b]) => {
      const aV = /\d/.test(a); const bV = /\d/.test(b);
      if (aV && !bV) return -1; if (!aV && bV) return 1;
      return a.localeCompare(b, 'zh');
    }) : [];
    topChildren.forEach(([childName, childNode]) => { treeHtml += renderNode(childNode, childName, 0); });
  } else {
    rootChildren.forEach(([name, node]) => { treeHtml += renderNode(node, name, 0); });
  }
  treeHtml += '</div>';
  return treeHtml;
}

function pkgTableToggle(el) {
  var targetId = el.getAttribute('data-target');
  if (!targetId) return;
  var target = document.getElementById(targetId);
  if (!target) return;
  var isOpen = target.style.display !== 'none';
  target.style.display = isOpen ? 'none' : 'block';
  el.innerHTML = isOpen ? '&#9658;' : '&#9660;';
}

function pkgTableToggleById(targetId) {
  if (!targetId) return;
  var target = document.getElementById(targetId);
  if (!target) return;
  var isOpen = target.style.display !== 'none';
  target.style.display = isOpen ? 'none' : 'block';
  // Also toggle the arrow in the parent tree-node
  var node = target.previousElementSibling;
  if (node && node.classList.contains('tree-node')) {
    var arrow = node.querySelector('.tree-arrow');
    if (arrow) arrow.innerHTML = isOpen ? '&#9658;' : '&#9660;';
  }
}

function treeToggle(el, extraTargetId) {
  var node = el.closest ? el.closest('.tree-node') : el;
  // .tree-children is the next sibling of .tree-node
  var ch = node.nextElementSibling;
  if (!ch || !ch.classList.contains('tree-children')) return;
  var isOpen = ch.style.display !== 'none';
  ch.style.display = isOpen ? 'none' : 'block';
  // Toggle extra target (snapshot table) if provided
  if (extraTargetId) {
    var extra = document.getElementById(extraTargetId);
    if (extra) extra.style.display = isOpen ? 'none' : 'block';
  }
  // Update arrow inside this node
  var arrow = node.querySelector('.tree-arrow');
  if (arrow) arrow.innerHTML = isOpen ? '&#9658;' : '&#9660;';
}

function editPkgType(id){
  const prods=window._allProducts||[];
  const p=prods.find(x=>x.id===id);
  if(!p){toast('产品不存在','error');return;}

  const MAP={sys:'系统',rule:'规则',nti:'威胁情报',av:'病毒库',apprule:'应用规则',url:'URL库',wcs:'恶意站点',judge:'研判',geo:'地理库',interface:'接口',special:'特殊',other:'其他',merge:'合并',client:'客户端',av_stream:'流式病毒库',test:'测试'};

  // 解析 package_type（新格式 {types:[], paths:[], modes:{}} 或旧格式 [...]）
  let pt={types:[], paths:[], modes:{}};
  try{
    if(typeof p.package_type==='string'){
      const parsed=JSON.parse(p.package_type);
      if(parsed.types){pt=parsed;}
      else if(Array.isArray(parsed)){pt.types=parsed; pt.paths=[]; pt.modes={};} // 旧格式
    }
  }catch{}

  // 如果有未确认的包类型变化 → 显示 diff 确认弹窗
  if(p.package_type_changed==1 && p.package_type_discovered){
    let disc={types:[], paths:[], modes:{}};
    try{const r=JSON.parse(p.package_type_discovered);if(r.types){disc=r;}}catch{}
    const currentSet=new Set(pt.types);
    const discSet=new Set(disc.types);
    const added=[...discSet].filter(x=>!currentSet.has(x));
    const removed=[...currentSet].filter(x=>!discSet.has(x));

    let diffRows='';
    if(added.length){
      diffRows+=added.map(t=>`<span style="background:var(--success-light);color:var(--success-text);font-size:12px;padding:2px 8px;border-radius:10px;margin:2px;display:inline-block">+${MAP[t]||t}</span>`).join(' ');
    }
    if(removed.length){
      diffRows+=removed.map(t=>`<span style="background:var(--danger-light);color:var(--danger-text);font-size:12px;padding:2px 8px;border-radius:10px;margin:2px;display:inline-block;text-decoration:line-through">-${MAP[t]||t}</span>`).join(' ');
    }
    if(!added.length && !removed.length){
      diffRows=`<span style="color:var(--gray-disabled);font-size:13px">包类型集合无变化，但采集时检测到差异</span>`;
    }

    // diff 模式下的 modes 编辑
    let modeRows='';
    disc.types.forEach(t=>{
      const label=MAP[t]||t;
      const mode=disc.modes[t]||'auto';
      modeRows+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:#f9fafb;border:1px solid var(--gray-border);margin-bottom:4px">
        <span style="flex:1;font-size:13px;color:var(--gray-disabled)">${label}</span>
        <select data-type="${escHtml(t)}" style="flex:0 0 90px;padding:3px 6px;border:1px solid var(--gray-border);border-radius:6px;font-size:12px;cursor:pointer">
          <option value="auto" ${mode==='auto'?'selected':''}>自动</option>
          <option value="full" ${mode==='full'?'selected':''}>全量</option>
          <option value="incremental" ${mode==='incremental'?'selected':''}>增量</option>
        </select>
      </div>`;
    });

    // 目录树展示 disc.paths（复用新的树形渲染）
    let pathTreeHtml = '';
    if (disc.paths && disc.paths.length) {
      // 用 disc 的 modes 渲染树
      const discPt = { types: disc.types, paths: disc.paths, modes: disc.modes || {} };
      const discTreeHtml = buildTreeHtml(discPt, MAP);
      pathTreeHtml = `<div style="margin-top:12px;font-size:11px;color:var(--gray-muted);margin-bottom:6px">📂 采集到的目录结构</div><div style="border:1px solid var(--gray-border);border-radius:8px;max-height:240px;overflow-y:auto;padding:8px 4px">${discTreeHtml}</div>`;
    }

    // 智能警告
    let rulesWarning='';
    if(removed.length && disc.affected_rules && disc.affected_rules.length){
      const ruleItems=disc.affected_rules.map(r=>
        `<div style="margin-top:4px">
          <span style="color:#7c3aed;font-weight:600">${escHtml(r.name)}</span>
          <span style="color:var(--danger-text);font-size:12px;margin-left:6px">
            ${(r.removed_types||[]).map(t=>MAP[t]||t).join(', ')}
          </span>
        </div>`
      ).join('');
      rulesWarning=`<div style="background:var(--danger-light);border:1px solid #fca5a5;border-radius:8px;padding:14px;margin-top:12px">
        <div style="font-size:12px;color:var(--danger-text);font-weight:600;margin-bottom:6px">⚠️ 以下订阅规则引用了将被删除的包类型，采纳后这些规则对此产品将不再推送：</div>
        ${ruleItems}
      </div>`;
    }

    _showModal('pkgtype');
    modalBody('pkgtype',`<div style="padding:24px;max-height:80vh;overflow-y:auto">
      <div style="font-size:15px;font-weight:600;margin-bottom:16px">⚠️ 包类型检测到变化 <span style="font-weight:400;font-size:12px;color:var(--gray-muted)">「${escHtml(p.name)}」</span></div>
      <div style="background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:14px;margin-bottom:16px">
        <div style="font-size:12px;color:#92400e;font-weight:600;margin-bottom:8px">📊 变更明细</div>
        <div>${diffRows}</div>
      </div>
      ${rulesWarning}
      ${pathTreeHtml}
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="confirmPkgTypeChange(${id},'apply')">✅ 采纳变化</button>
        <button class="btn" onclick="confirmPkgTypeChange(${id},'keep')">保留原样</button>
        <button class="btn" style="margin-left:auto" onclick="closeModal('pkgtype')">取消</button>
      </div>
    </div>`);
    window._ptModes={};
    disc.types.forEach(t=>{ window._ptModes[t]=disc.modes[t]||'auto'; });
    window._ptDiscovered=disc;
    return;
  }

  // ── 正常编辑模式 ────────────────────────────────────────────
  if(pt.types.length===0){
    _showModal('pkgtype');
    modalBody('pkgtype',`<div style="padding:24px">
      <div style="font-size:15px;font-weight:600;margin-bottom:16px">📦 包类型设置 <span style="font-weight:400;font-size:12px;color:var(--gray-muted)">「${escHtml(p.name)}」</span></div>
      <div style="color:var(--gray-disabled);font-size:13px;text-align:center;padding:12px">
        尚未发现包类型，请先对该产品进行<span style="color:#7c3aed;cursor:pointer" onclick="closeModal('pkgtype');refreshPkgType(${id})">全量采集</span>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px">
        <button class="btn" onclick="closeModal('pkgtype')">关闭</button>
      </div>
    </div>`);
    return;
  }

  // 计算每种类型的路径覆盖数
  const pathCount={};
  pt.types.forEach(t=>{ pathCount[t]=0; });
  (pt.paths||[]).forEach(p=>{
    (p.types||[]).forEach(t=>{ if(t in pathCount) pathCount[t]++; });
  });
  const sortedTypes=[...pt.types].sort((a,b)=>(pathCount[b]||0)-(pathCount[a]||0));

  // 构建目录树（使用独立函数）
  const treeHtml = buildTreeHtml(pt, MAP);

    <div style="margin-bottom:14px;font-size:12px;color:#7c3aed;background:#f5f3ff;padding:8px 12px;border-radius:6px">

    </div>
    <div style="border:1px solid var(--gray-border);border-radius:8px;max-height:320px;overflow-y:auto;padding:8px 4px">
      ${treeHtml}
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="savePkgType(${id})">💾 保存</button>
      <button class="btn" onclick="closeModal('pkgtype')">取消</button>
    </div>
  </div>`);

  // 初始化 modes
  window._ptModes = {};

  pt.types.forEach(t => { window._ptModes[t] = pt.modes && pt.modes[t] || 'auto'; });

async function savePkgType(id){
  const modes = window._ptModes || {};
  // types 来自 modes 的 key（由树形控件的 mode selector 更新）
  const types = Object.keys(modes);

  // 构建新格式: {types:[...], paths:[...], modes:{...}}
  const finalModes = {};
  types.forEach(t => {
    const m = modes[t] || 'auto';
    if (m !== 'auto') finalModes[t] = m;
  });
  const pkg_type = { types, paths: window._ptPaths || [], modes: finalModes };

  const r = await api(`/system/products/${id}`,{method:'PUT',body:JSON.stringify({package_type:JSON.stringify(pkg_type)})});
  if(r.code===0){
    toast('包类型已保存','success');
    closeModal('pkgtype');
    await products();
  }else{
    toast(r.message||'保存失败','error');
  }
}

async function confirmPkgTypeChange(id, action){
  if(action==='apply'){
    const selEls=document.querySelectorAll('#pt-type-list select[data-type]');
    const disc=window._ptDiscovered||{types:[],paths:[],modes:{}};
    const updatedModes={};
    selEls.forEach(sel=>{ updatedModes[sel.dataset.type]=sel.value; });
    const finalPkg={types:disc.types, paths:disc.paths||[], modes:updatedModes};
    await api(`/system/products/${id}`,{method:'PUT',body:JSON.stringify({
      package_type:JSON.stringify(finalPkg),
      package_type_discovered:'',
      package_type_changed:0
    })});
    toast('已采纳新包类型','success');
  }else if(action==='keep'){
    await api(`/system/products/${id}`,{method:'PUT',body:JSON.stringify({
      package_type_discovered:'',
      package_type_changed:0
    })});
    toast('已保留原包类型','success');
  }
  closeModal('pkgtype');
  await products();
}

async function refreshPkgType(id){
  // 触发刷新 → POST → SSE 轮询 → 圆形进度环 + 日志浮动窗口
  const btn=document.querySelector(`[onclick="refreshPkgType(${id})"]`);
  if(!btn) return;

  // 触发后台任务
  const r=await api(`/system/products/${id}/refresh-pkg-type`,{method:'POST'});
  if(r.code!==0){
    toast(r.message||'启动失败','error');
    return;
  }

  // 按钮变成进度环
  const progId=`rprog-${id}`;
  btn.style.display='none';
  const ring=document.createElement('span');
  ring.id=progId;
  ring.style.cssText='display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer';
  ring.innerHTML=`<svg width="28" height="28" viewBox="0 0 28 28" onclick="showRefreshLog(${id})"><circle cx="14" cy="14" r="11" fill="none" stroke="var(--gray-border)" stroke-width="2.5"/><circle id="${progId}-arc" cx="14" cy="14" r="11" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="69.1" stroke-dashoffset="69.1" stroke-linecap="round" transform="rotate(-90 14 14)"/><text id="${progId}-txt" x="14" y="19" text-anchor="middle" font-size="9" fill="#7c3aed" font-weight="700">·</text></svg>`;
  btn.parentNode.insertBefore(ring,btn);

  // 预建立日志窗口（隐藏）
  const logId=`rlog-${id}`;
  if(!document.getElementById(logId)){
    const logDiv=_createFloatLog(logId, '📋 包类型刷新日志', {bodyClass: 'log-body'});
    document.body.appendChild(logDiv);
  }

  // 轮询方式获取进度（每 2 秒一次，兼容长任务）
  let done=false;
  let pollTimer=null;
  function updateRing(state){
    if(!state) return;
    const arc=document.getElementById(`${progId}-arc`);
    const txt=document.getElementById(`${progId}-txt`);
    if(arc&&txt){
      // Phase format: 'fetching_home' | 'fetching_ver (3/7)' | 'done' | 'error'
      const rawPhase = state.phase || '';
      let pct = 0;
      const verMatch = rawPhase.match(/fetching_ver \((\d+)\/(\d+)\)/);
      if (verMatch) {
        const cur = parseInt(verMatch[1]);
        const tot = parseInt(verMatch[2]);
        pct = 25 + Math.round((cur / tot) * 70);
      } else if (rawPhase === 'fetching_home') {
        pct = 10;
      } else if (rawPhase === 'done') {
        pct = 100;
      } else if (rawPhase === 'error') {
        pct = 100;
      }
      arc.setAttribute('stroke-dashoffset', 69.1*(1-pct/100));
      txt.textContent = pct === 100 ? (rawPhase === 'error' ? '✗' : '✓') : `${pct}`;
    }
    if(state.log_lines&&state.log_lines.length){
      const win=document.getElementById(logId);
      if(win){
        win.style.display='block';
        win.querySelector('.log-body').innerHTML=state.log_lines.map(l=>`<div style="padding:1px 0;border-bottom:1px solid var(--gray-border)">${escHtml(l)}</div>`).join('');
        win.querySelector('.log-body').scrollTop=win.querySelector('.log-body').scrollHeight;
      }
    }
    if(state.phase==='done'||state.phase==='error'||!state.active){
      done=true;
      if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
      const isError = state.phase==='error';
      // 终态视觉:成功保留绿色 ✓,失败切红色 ✗ + 添加 tooltip
      if(isError && arc && txt){
        arc.setAttribute('stroke', 'var(--danger)');
        txt.setAttribute('fill', 'var(--danger)');
      }
      // 提取最后一条错误日志做 tooltip(失败时);成功时用路径数
      const lastLog = (state.log_lines && state.log_lines.length)
        ? state.log_lines[state.log_lines.length-1] : '';
      ring.title = isError
        ? `✗ 刷新失败:${lastLog||'未知错误'}`
        : `✓ 刷新成功,点击查看日志`;
      // 失败时显示 toast(单行简短提示)
      if(isError){
        toast('包类型刷新失败:'+(lastLog||'未知错误'),'error');
      }
      // 保留 3s 让用户看到结果,然后移除 + 刷新产品表
      setTimeout(async()=>{
        ring.remove();
        btn.style.display='';
        await products();
      },3000);
    }
  }

  // 触发后立即查询一次初始状态，然后每 2 秒轮询
  async function poll(){
    if(done) return;
    const r=await api(`/system/products/${id}/refresh-pkg-status`);
    if(r.code===0){
      updateRing(r.data);
    }
  }

  poll(); // 立即查一次
  pollTimer=setInterval(poll, 2000); // 每 2 秒轮询
  // 最多轮询 120 秒（60次 × 2s），防止无限等待
  setTimeout(()=>{if(!done){done=true;if(pollTimer){clearInterval(pollTimer);}ring.remove();btn.style.display='';}},120000);
}

function filterProducts(){
  const search=(document.getElementById('prod-search')?.value||'').toLowerCase();
  const filter=document.getElementById('prod-filter')?.value||'all';
  const all=window._allProducts||[];
  const filtered=all.filter(p=>{
    const matchSearch=!search || p.name.toLowerCase().includes(search) || (p.display_name||'').toLowerCase().includes(search) || (p.entry_url||'').toLowerCase().includes(search);
    const matchFilter=(filter==='all')||(filter==='enabled'&&p.is_active)||(filter==='disabled'&&!p.is_active);
    return matchSearch&&matchFilter;
  });
  document.getElementById('prod-tbody').innerHTML=_renderProductRows(filtered);
}

// ── 渲染带颜色的日志行(全局,discover 和 confirm 共用)────────────
// 兼容 2 种格式:旧 string(confirm 流程用)+ 新 entry{ts,level,product,msg}(discover 流程用)。
// 按 entry.level 着色,product 标记小角标。fallback 走 emoji 前缀推断(向后兼容 confirm)。
const _LOG_LEVEL_COLOR = {
  info: 'var(--gray-muted)',
  success: 'var(--success-text)',
  warn: '#f59e0b',
  error: 'var(--danger)',
};
function renderLogLine(l){
  // 兼容 entry 对象(后端结构化日志)
  if(l && typeof l === 'object' && 'msg' in l){
    const color = _LOG_LEVEL_COLOR[l.level] || 'var(--gray-muted)';
    const productBadge = l.product
      ? `<span style="background:#7c3aed20;color:#7c3aed;font-size:10px;padding:0 4px;border-radius:4px;margin-left:4px;vertical-align:middle">${escHtml(l.product)}</span>`
      : '';
    const ts = l.ts ? `<span style="color:var(--gray-disabled);font-size:10px;margin-right:4px">${escHtml(l.ts.split('T')[1]?.slice(0,8)||'')}</span>` : '';
    return `<div style="padding:1px 0;border-bottom:1px solid var(--gray-border);color:${color}${l.level==='error'||l.level==='success'?';font-weight:600':''}">${ts}${escHtml(l.msg)}${productBadge}</div>`;
  }
  // 兼容旧 string(confirm 流程暂未结构化)
  const txt = escHtml(String(l));
  if(txt.startsWith('🔍')) return `<div style="padding:1px 0;border-bottom:1px solid var(--gray-border);color:var(--primary)">${txt}</div>`;
  if(txt.startsWith('📦')&&txt.includes('发现包类型')) return `<div style="padding:1px 0;border-bottom:1px solid var(--gray-border);color:#7c3aed;font-weight:600">${txt}</div>`;
  if(txt.startsWith('  →')) return `<div style="padding:1px 0;border-bottom:1px solid var(--gray-border);color:#0891b2">${txt}</div>`;
  if(txt.startsWith('✅')||txt.startsWith('✔')) return `<div style="padding:1px 0;border-bottom:1px solid var(--gray-border);color:var(--success-text);font-weight:600">${txt}</div>`;
  if(txt.startsWith('❌')||txt.startsWith('⚠️')) return `<div style="padding:1px 0;border-bottom:1px solid var(--gray-border);color:var(--danger)">${txt}</div>`;
  if(txt.startsWith('[')) return `<div style="padding:1px 0;border-bottom:1px solid var(--gray-border);color:var(--gray-disabled)">${txt}</div>`;
  return `<div style="padding:1px 0;border-bottom:1px solid var(--gray-border);color:var(--gray-muted)">${txt}</div>`;
}

async function discoverProducts(){
  // 清除隐藏状态，新任务开始
  window._discBannerHidden=false;
  // 跨 tab 同步:监听 storage 事件,其他 tab 状态变化时刷新本 tab 的 UI
  // 单 tab 不会触发 storage 事件,所以不会有重复刷新
  if(!window._discStorageListener){
    window._discStorageListener = true;
    window.addEventListener('storage', e=>{
      if(e.key === 'nsm_disc_status_update' && e.newValue){
        // 其他 tab 状态变化(phase/result),强制刷一次 _checkDiscBanner
        _checkDiscBanner();
      }
    });
  }
  // 记录模态框启动时间(用于 ETA 估算)
  window._discModalStartTs = Date.now();
  // 预建立日志窗口（隐藏，点击按钮显示）
  const discLogId='disc-float-log';
  if(!document.getElementById(discLogId)){
    const logDiv=_createFloatLog(discLogId, '📋 自动发现日志');
    document.body.appendChild(logDiv);
    window.__discLogId=discLogId; // expose globally for confirmDiscoverResult
  }

  _showModal('disc');
  modalBody('disc',`<div style="padding:24px;text-align:center">
    <div class="spin"></div>
    <div id="disc-phase" style="margin-top:12px;color:var(--gray-muted);font-size:14px">正在启动自动发现…</div>
    <div style="margin:12px auto 0;width:80%;max-width:320px;height:6px;background:var(--gray-bg);border-radius:3px;overflow:hidden">
      <div id="disc-modal-bar" style="height:100%;background:#7c3aed;border-radius:3px;transition:width 0.4s;width:0%"></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button onclick="document.getElementById('${discLogId}').style.display='block'" style="background:none;border:1px solid var(--gray-border);border-radius:6px;cursor:pointer;font-size:12px;color:#7c3aed;padding:4px 12px">📋 查看日志</button>
      <button onclick="_cancelDisc()" style="background:none;border:1px solid var(--danger);border-radius:6px;cursor:pointer;font-size:12px;color:var(--danger);padding:4px 12px">⏹ 停止</button>
    </div>
  </div>`);

  const r=await api('/system/products/discover',{method:'POST'});
  if(r.code===409){
    // 已经在运行中——直接拉起进度 UI，不重复启动
    // tab B 重复点按钮时可能 tab A 刚启动后端 _auto_discover_state 还没完全初始化(竞态),
    // 短暂查 status 拿到 active=false → 走"似乎已结束"分支,体验差。最多重试 3 次 200ms 间隔。
    let active=false;
    for(let i=0;i<3 && !active;i++){
      const s=await api('/system/products/discover/status');
      if(s.code===0 && s.data?.active){active=true;break;}
      if(i<2) await new Promise(r=>setTimeout(r,200));
    }
    if(active){
      // 直接进入轮询渲染
    } else {
      modalBody('disc',`<div style="padding:24px;text-align:center">
        <div style="color:#f59e0b;font-size:14px;margin-bottom:8px">⚠️ 上次任务似乎已结束</div>
        <div style="color:var(--gray-muted);font-size:13px">请关闭后重新点击自动发现</div>
        <div style="margin-top:16px"><button class="btn" onclick="closeModal('disc')">关闭</button></div>
      </div>`);
      return;
    }
  } else if(r.code!==0){
    modalBody('disc',`<div style="padding:24px"><div style="color:var(--danger);font-weight:600;margin-bottom:8px">启动失败</div><div style="color:var(--gray-muted);font-size:13px">${escHtml(r.message||'')}</div><div style="margin-top:16px"><button class="btn" onclick="closeModal('disc')">关闭</button></div></div>`);
    return;
  }

  // 2. 轮询进度
  let done=false;
  let pollTimer=null;
  function renderProgress(state){
    const phaseEl=document.getElementById('disc-phase');
    // Phase text + ETA suffix (modal 进度条与 banner 一致)
    let phaseText = formatDiscPhase(state);
    if(state.phase==='discovering_pkg_types' && state.total && state.progress){
      const elapsedSec = (Date.now() - (window._discModalStartTs||Date.now())) / 1000;
      const ratio = state.progress / state.total;
      if(elapsedSec > 5 && ratio > 0.05){
        const remainSec = Math.round(elapsedSec * (1 - ratio) / ratio);
        if(remainSec > 0 && remainSec < 3600){
          phaseText += ` · 约剩 ${remainSec<60?remainSec+'秒':Math.round(remainSec/60)+'分钟'}`;
        }
      }
    }
    if(phaseEl) phaseEl.textContent=phaseText;
    // Progress bar (跟 banner 用同一公式)
    const barEl=document.getElementById('disc-modal-bar');
    if(barEl){
      const p=state.phase==='done'?100:
        state.phase==='scanning_products'?5:
        state.phase==='discovering_pkg_types' && state.total?
          5+Math.round((state.progress/state.total)*90):0;
      barEl.style.width=p+'%';
    }
    // Feed floating log window
    const logBody=document.getElementById(discLogId+'-body');
    if(logBody && state.log_lines?.length){
      logBody.innerHTML=state.log_lines.map(renderLogLine).join('');
      logBody.scrollTop=logBody.scrollHeight;
    }
    return state.phase==='done'||state.phase==='error'||state.phase==='cancelled'||!state.active;
  }

  async function poll(){
    if(done) return;
    const s=await api('/system/products/discover/status');
    if(s.code===0){
      done=renderProgress(s.data);
      if(done){
        clearInterval(pollTimer);
        if(s.data.phase==='done') showDiscoverResult(s.data.result);
        else if(s.data.phase==='cancelled'){toast('自动发现已取消','warn');closeModal('disc');}
      }
    }
  }
  poll();
  pollTimer=setInterval(poll,2000);
  setTimeout(()=>{if(!done){done=true;clearInterval(pollTimer);modalBody('disc',`<div style="padding:24px;text-align:center;color:var(--danger)">发现超时，请重试</div><div style="padding:8px"><button class="btn" onclick="closeModal('disc')">关闭</button></div>`);}},600000);
}

  _showModal('disc');

async function confirmDiscoverResult(){
  const result=window._discoverResult;
  if(!result) return;
  const btn=document.getElementById('disc-confirm-btn');
  const phaseEl=document.getElementById('disc-confirm-phase');
  if(btn){btn.disabled=true;btn.textContent='处理中…';}
  if(phaseEl){phaseEl.style.display='block';phaseEl.textContent='💾 正在启动…';}

  const r=await api('/system/products/discover/confirm',{method:'POST',body:JSON.stringify(result)});
  if(r.code===0){
    // Reuse or create floating log window
    let logId=window.__discLogId||'disc-float-log';
    let logBody=document.getElementById(logId+'-body');
    if(!logBody){
      const logDiv=_createFloatLog(logId, '📋 应用日志');
      document.body.appendChild(logDiv);
      logBody=document.getElementById(logId+'-body');
      window.__discLogId=logId;
    }
    logBody.innerHTML='';
    document.getElementById(logId).style.display='block';

    let done=false;
    let pollTimer=null;
    let pollSSEAbort=null;  // SSE AbortController,失败兜底时主动关 SSE 流

    // 终态收尾(单一收口) — 任何渠道发现 done/error 都走这里,确保按钮文字恢复一致
    function finalize(state){
      done=true;
      if(pollTimer)clearInterval(pollTimer);
      if(pollSSEAbort)pollSSEAbort.abort();
      if(state.phase==='done'){
        const d=state.result||{};
        // 成功 toast 含受影响订阅数(后端 confirm 已算好 affected_subscriptions),
        // 数字本身即告知用户"哪些订阅可能需要复查",不直接跳页避免越界改动订阅管理页。
        const aff=d.affected_subscriptions||[];
        const totalAffCount=aff.reduce((n,x)=>n+(x.count||0),0);
        const affMsg = totalAffCount>0
          ? `,${totalAffCount} 个订阅规则引用了被变更的产品(可能需要复查)`
          : '';
        showRichToast(`已应用:产品新增 ${d.saved?.length||0} 删除 ${d.deleted?.length||0},包类型更新 ${d.pkg_updated?.length||0}${affMsg}`, 'success');
        window._discoverResult=null;
        window._pendingDiscResult=null;
        window._pendingDiscStale=null;
        updateNavPendingBadge();
        closeModal('disc');
        products();
      }else if(state.phase==='error'){
        toast('应用出错: '+((state.error_message && state.error_category!=='session')?(state.error_message):(state.error||'未知错误')),'error');
        if(btn){btn.disabled=false;btn.textContent='💾 确认应用变更';}
      }else{
        // 非 done/error(超时/异常),按钮恢复 + 提示
        toast('应用未完成，请刷新页面查看状态','warn');
        if(btn){btn.disabled=false;btn.textContent='💾 确认应用变更';}
      }
    }

    function renderConfirmProgress(state){
      const phaseNames={
        'applying':'💾 正在应用变更…',
        'updating_pkg':`📦 更新包类型…`,
        'done':'✅ 应用完成',
        'error':'❌ 应用出错',
      };
      const msg=phaseNames[state.phase]||state.phase||'';
      if(phaseEl) phaseEl.textContent=msg;
      if(logBody && state.log_lines?.length){
        logBody.innerHTML=state.log_lines.map(renderLogLine).join('');
        logBody.scrollTop=logBody.scrollHeight;
      }
      return state.phase==='done'||state.phase==='error'||!state.active;
    }

    // HTTP 轮询(主,SSE 是加速器) — fetch 加 timeout,超时即视为本轮失败
    async function pollConfirm(){
      if(done) return;
      try{
        const controller=new AbortController();
        const tid=setTimeout(()=>controller.abort(),8000);
        const s=await api('/system/products/discover/confirm/status',{signal:controller.signal});
        clearTimeout(tid);
        if(s.code===0){
          const isFinal=renderConfirmProgress(s.data);
          if(isFinal)finalize(s.data);
        }
      }catch(e){}
    }
    pollConfirm();  // first poll immediately
    pollTimer=setInterval(pollConfirm, 2000);

    // SSE 流(加速器,失败/超时主动 abort)
    async function pollSSE(){
      if(done) return;
      try{
        pollSSEAbort=new AbortController();
        const h={'Authorization':'Bearer '+T,'Accept':'text/event-stream'};
        const r=await fetch(API+'/system/products/discover/confirm/status',{headers:h,cache:'no-store',signal:pollSSEAbort.signal});
        if(!r.ok){return;}  // fallback HTTP 轮询继续
        const reader=r.body.getReader();
        const dec=new TextDecoder();
        let buf='';
        while(!done){
          const {value, done: eos}=await reader.read();
          if(eos) break;
          buf+=dec.decode(value,{stream:true});
          const lines=buf.split('\n');
          buf=lines.pop()||'';
          for(const line of lines){
            const colonIdx=line.indexOf(':');
            if(colonIdx>=0){
              try{
                const s=JSON.parse(line.slice(colonIdx+1));
                renderConfirmProgress(s);
                if(s.phase==='done'||s.phase==='error'||!s.active){finalize(s);return;}
              }catch(e){}
            }
          }
        }
      }catch(e){}
      // SSE 正常关闭或失败 → 立刻 HTTP 兜底查一次状态,确保不漏掉终态
      if(!done){pollConfirm();}
    }
    setTimeout(pollSSE, 500);

    // 统一 watchdog:5min 后强制兜底查一次 + finalize,避免任一渠道卡住导致按钮永久 disabled
    setTimeout(async ()=>{
      if(done)return;
      try{
        const controller=new AbortController();
        const tid=setTimeout(()=>controller.abort(),5000);
        const s=await api('/system/products/discover/confirm/status',{signal:controller.signal});
        clearTimeout(tid);
        if(s.code===0 && (s.data.phase==='done'||s.data.phase==='error'||!s.data.active)){
          finalize(s.data);
        }else{
          finalize({phase:'unknown'});  // 触发 finalize 的"非 done/error"分支,按钮恢复
        }
      }catch(e){
        finalize({phase:'unknown'});
      }
    },300000);
  }else{
    toast('启动失败: '+r.message,'error');
    if(btn){btn.disabled=false;btn.textContent='💾 确认应用变更';}
    if(phaseEl){phaseEl.style.display='none';}
  }
}

  }

function escHtml(s){

}

async function saveEditRow(id){

  }
}

// ── Manual Collect ──
let _collectPollTimer=null;
let _collectRunning=false;
async function triggerCollect(){
  if(_collectRunning){toast('⚠️ 采集正在进行中，请等待完成后再操作','warn');return;}
  try{
    const sR=await api('/settings/scheduler');
    if(sR.data?.is_running){_collectRunning=true;toast('⚠️ 采集正在进行中，请等待完成后再操作','warn');return;}
  }catch(e){}
  confirmAct('确认立即触发一次增量采集？', startCollect, '🔄', '确认采集', false);
}
async function startCollect(){
  // Immediately show "launching" state on dashboard — user confirmed, request is going out
  const dashTop = document.getElementById('dashRunningBar');
  if(dashTop){dashTop.style.display='block';dashTop.className='collecting-warning';dashTop.innerHTML='<span class="warn-inner">🔄 正在启动增量采集，请稍候...</span>';document.body.classList.add('warning-open');}
  const r=await api('/system/collect',{method:'POST',body:JSON.stringify({mode:'quick'})});
  if(r.code===409){toast('采集正在进行中','warn');location.reload();return;}
  if(r.code!==0){toast(r.message,'error');location.reload();return;}
  _collectRunning=true;
  const runBar=document.getElementById('dashRunningBar');
  if(runBar){runBar.style.display='block';runBar.className='collecting-warning';runBar.innerHTML='<span class="warn-inner">⚠️ 采集中，请勿增删改配置，待完成后再操作 ⚠️</span>';document.body.classList.add('warning-open');}
  if(_collectPollTimer)clearInterval(_collectPollTimer);
  _collectPollTimer=setInterval(pollProgress,2000);
}
function showCollectProgress(){
  // Remove existing modal if any
  const old=document.getElementById('collectModal');if(old)old.remove();
  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div id="collectModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)closeCollectModal()">
      <div class="card" style="width:420px;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()">
        <div class="card-hd">🔄 采集进度 <button class="btn btn-xs btn-outline" style="margin-left:auto" onclick="closeCollectModal()">✕ 关闭</button></div>
        <div class="card-bd" id="collectModalBody">
          <div style="text-align:center;padding:12px 0"><div style="font-size:32px;margin-bottom:8px">⏳</div><p style="font-size:13px">加载进度...</p></div>
        </div>
      </div>
    </div>
  `);
  // Trigger a poll immediately
  pollProgress();
  // Ensure timer is running
  if(!_collectPollTimer)_collectPollTimer=setInterval(pollProgress,2000);
}
function closeCollectModal(){
  const m=document.getElementById('collectModal');if(m)m.remove();
  const runBar=document.getElementById('dashRunningBar');if(runBar)runBar.style.display='none';
  document.body.classList.remove('warning-open');
  if(_collectPollTimer){clearInterval(_collectPollTimer);_collectPollTimer=null;}
}
function pollProgress(){
  const body=document.getElementById('collectModalBody');
  if(!body)return; // Modal closed, stop polling
  // Guard: if no collection is running on backend, clear timer and skip request
  if(!_collectRunning){if(_collectPollTimer){clearInterval(_collectPollTimer);_collectPollTimer=null;}return;}
  api('/system/collect/progress').then(pr=>{
    if(!pr.data){if(body)body.innerHTML='<p style="text-align:center;color:var(--muted)">无法获取进度</p>';return;}
    const p=pr.data.progress||{};
    if(!p.active&&!p.phase){
      body.innerHTML='<p style="text-align:center;color:var(--muted)">当前无采集任务</p><button class="btn btn-sm btn-outline" style="width:100%;margin-top:12px" onclick="closeCollectModal()">关闭</button>';
      _collectRunning=false;
      const runBar=document.getElementById('dashRunningBar');if(runBar)runBar.style.display='none';
      if(_collectPollTimer){clearInterval(_collectPollTimer);_collectPollTimer=null;}
      return;
    }
    let html='';
    if(p.phase==='collecting'){
      const pct=p.products_total?Math.round(p.products_done/p.products_total*100):0;
      html+=`<div style="margin-bottom:12px"><div style="background:var(--gray-border);border-radius:6px;height:8px;overflow:hidden"><div style="background:var(--primary);height:100%;width:${pct}%;transition:width .3s;border-radius:6px"></div></div><div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:center">${p.products_done}/${p.products_total} 产品 (${pct}%)</div></div>`;
      html+=`<div style="font-size:13px;text-align:center;margin-bottom:4px"><strong>📦 ${p.current_product||'...'}</strong></div>`;
      if(p.current_version)html+=`<div style="font-size:11px;color:var(--muted);text-align:center">${p.current_version}</div>`;
      html+=`<div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px">已采集 ${p.items_collected||0} 项</div>`;
      html+=`<button class="btn btn-xs btn-outline" style="margin-top:10px;width:100%" onclick="closeCollectModal()">后台运行</button>`;
    }else if(p.phase==='detecting'){
      html+=`<div style="text-align:center;font-size:32px;margin-bottom:8px">🔍</div><p style="text-align:center;font-size:13px">正在检测变化...</p>`;
    }else if(p.phase==='notifying'){
      html+=`<div style="text-align:center;font-size:32px;margin-bottom:8px">📨</div><p style="text-align:center;font-size:13px">正在推送通知...</p>`;
    }else if(p.phase==='done'){
      const runBar=document.getElementById('dashRunningBar');if(runBar)runBar.style.display='none';
      const ok=p.errors&&p.errors.length>0?'warn':'ok';
      html+=`<div style="text-align:center;font-size:32px;margin-bottom:8px">${ok==='ok'?'✅':'⚠️'}</div>`;
      html+=`<p style="text-align:center;font-size:14px;font-weight:600">采集完成</p>`;
      html+=`<div class="grid2" style="margin-top:10px"><div class="stat green"><div class="num">${p.total_new||0}</div><div class="label">新增</div></div><div class="stat red"><div class="num">${p.total_rollback||0}</div><div class="label">回退</div></div></div>`;
      html+=`<p style="font-size:11px;color:var(--muted);text-align:center;margin-top:6px">耗时 ${p.duration_s||0}秒 · ${p.items_collected||0}项</p>`;
      if(p.errors&&p.errors.length)html+=`<div style="margin-top:8px;font-size:11px;color:var(--danger)">${p.errors.map(e=>'⚠️ '+e).join('<br>')}</div>`;
      html+=`<button class="btn btn-sm btn-primary" style="width:100%;margin-top:12px" onclick="closeCollectModal();dashboard()">刷新仪表盘</button>`;
      _collectRunning=false;
      if(_collectPollTimer){clearInterval(_collectPollTimer);_collectPollTimer=null;}
    }
    if(html)body.innerHTML=html;
  }).catch(()=>{});
}
// ── Dashboard Progress Poll ──
async function pollDashProgress(){
  try{
    const pr=await api('/system/collect/progress');
    if(!pr.data)return;
    const p=pr.data.progress||{};
    const el=document.getElementById('dashProgress');
    const lc=document.getElementById('lastColText');
    if(!el)return;
    if(!p.active||p.phase==='done'){
      el.style.display='none';
      if(p.phase==='done'){
        if(lc)lc.textContent='已完成';
        const runBar=document.getElementById('dashRunningBar');
        if(runBar){runBar.style.display='none';document.body.classList.remove('warning-open');}
        if(window._dashPollTimer){clearInterval(window._dashPollTimer);window._dashPollTimer=null;}
      }
      return;
    }
    el.style.display='inline';
    if(p.phase==='collecting'){
      const pct=p.products_total?Math.round(p.products_done/p.products_total*100):0;
      el.innerHTML=`<span style="background:var(--primary);color:#fff;border-radius:4px;padding:1px 6px;font-size:11px">${pct}%</span> ${p.current_product||''} ${p.products_done}/${p.products_total}`;
    }else if(p.phase==='detecting'){
      el.innerHTML='<span style="background:#f59e0b;color:#fff;border-radius:4px;padding:1px 6px;font-size:11px">检测中</span>';
    }else if(p.phase==='notifying'){
      el.innerHTML='<span style="background:var(--success);color:#fff;border-radius:4px;padding:1px 6px;font-size:11px">推送中</span>';
    }
  }catch(e){}
}

        <div class="form-group" style="margin-bottom:0;min-width:80px"><label>行数</label><select id="logLines"><option value="100">100</option><option value="200" selected>200</option><option value="500">500</option><option value="1000">1000</option></select></div>
        <div class="form-group" style="margin-bottom:0"><label>&nbsp;</label><div style="display:flex;gap:6px"><button class="btn btn-sm btn-primary" onclick="loadLogs()">查询</button><button class="btn btn-sm btn-outline" id="logAutoBtn" onclick="toggleAutoRefresh()">自动刷新</button></div></div>
      </div>
      <div id="logContent" style="background:#0d1117;color:#c9d1d9;border-radius:8px;padding:14px;font:12px/1.6 'SF Mono','Fira Code','Consolas',monospace;max-height:600px;overflow-y:auto;white-space:pre-wrap;word-break:break-all">
        点击「查询」加载日志...
      </div>
    </div></div>`;

  // Load logs immediately
  loadLogs();

async function loadLogs(){
  const f=document.getElementById('logFile')?.value||'app.log';
  const l=document.getElementById('logLevel')?.value||'';
  const n=document.getElementById('logLines')?.value||'200';
  const box=document.getElementById('logContent');
  if(!box)return;
  box.textContent='加载中...';
  try{
    const r=await api(`/system/logs?file=${encodeURIComponent(f)}&lines=${n}${l?'&level='+l:''}`);
    if(r.code===0){
      const lines=r.data.lines||[];
      box.innerHTML=lines.map(l=>{
        let cls='var(--gray-muted)';
        if(l.includes('[ERROR]'))cls='#f85149';
        else if(l.includes('[WARNING]'))cls='#d2991d';
        else if(l.includes('[INFO]'))cls='#7ee787';
        else if(l.includes('[DEBUG]'))cls='var(--gray-muted)';
        return `<span style="color:${cls}">${l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
      }).join('\n');
      if(!lines.length)box.textContent='(无匹配日志)';
    }else{
      box.textContent=r.message||'加载失败';
    }
  }catch(e){box.textContent='加载失败: '+e.message;}
}

function toggleAutoRefresh(){
  const btn=document.getElementById('logAutoBtn');
  if(_logTimer){
    clearInterval(_logTimer);_logTimer=null;
    btn.textContent='自动刷新';btn.classList.remove('btn-success');btn.classList.add('btn-outline');
  }else{
    _logTimer=setInterval(loadLogs,5000);
    btn.textContent='停止刷新';btn.classList.remove('btn-outline');btn.classList.add('btn-success');
  }
}

// 真实 kind 由后端 fetch 返 source_kind 决定 (line 6566 处 _rd.sourceKind = j.data.source_kind)
