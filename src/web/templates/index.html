// 从 paths 数组构建可折叠目录树 HTML
function buildTreeHtml(pt, MAP) {
  const paths = pt.paths || [];
  if (paths.length === 0) return '<span style="color:#9ca3af">无路径数据</span>';

  const root = {};
  paths.forEach(p => {
    const chain = p.chain || [];
    if (chain.length === 0) return;
    let node = root;
    chain.forEach((name, idx) => {
      if (!node._children) node._children = {};
      if (!node._children[name]) node._children[name] = { _children: {}, _types: [], _isPkg: false };
      node = node._children[name];
      if (idx === chain.length - 1) { node._isPkg = true; node._types = p.types || []; }
    });
  });

  function renderNode(node, name, depth) {
    const indent = depth * 16;
    const children = node._children ? Object.entries(node._children) : [];
    const hasChildren = children.length > 0;
    const isPkg = node._isPkg;
    const types = node._types || [];

    let html = `<div class="tree-node" style="padding-left:${indent}px;display:flex;align-items:center;gap:4px;padding-top:4px;padding-bottom:4px;min-height:28px">`;

    if (hasChildren) {
      html += `<span class="tree-toggle" onclick="treeToggle(this)" style="cursor:pointer;color:#94a3b8;font-size:14px;margin-right:4px;user-select:none;flex-shrink:0">&#9658;</span>`;
    } else {
      html += `<span style="width:18px;flex-shrink:0"></span>`;
    }

    const icon = isPkg ? '&#128196;' : (hasChildren ? '&#128193;' : '&#128196;');
    const label = MAP[name] || name;
    const childCount = hasChildren ? ` <span style="color:#94a3b8;font-size:11px">(${children.length})</span>` : '';
    html += `<span style="font-size:13px;color:#334155;flex-shrink:0">${icon} ${escHtml(label)}${childCount}</span>`;

    if (isPkg && types.length > 0) {
      const badges = types.map(t => `<span style="background:#ede9fe;color:#5b21b6;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:2px;flex-shrink:0">${MAP[t]||escHtml(t)}</span>`).join('');
      html += badges;
      const modeKey = types[0];
      const mode = (pt.modes && pt.modes[modeKey]) || 'auto';
      html += `<select data-type="${escHtml(modeKey)}" onchange="window._ptModes['${escHtml(modeKey)}']=this.value" style="margin-left:auto;flex:0 0 80px;padding:2px 6px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;cursor:pointer">
        <option value="auto" ${mode==='auto'?'selected':''}>自动</option>
        <option value="full" ${mode==='full'?'selected':''}>全量</option>
        <option value="incremental" ${mode==='incremental'?'selected':''}>增量</option>
      </select>`;
    } else if (!hasChildren) {
      html += `<span style="margin-left:auto;color:#94a3b8;font-size:11px;flex-shrink:0">—</span>`;
    } else {
      html += `<span style="margin-left:auto;color:#94a3b8;font-size:11px;flex-shrink:0">&#9658;</span>`;
    }
    html += `</div>`;

    if (hasChildren) {
      html += `<div class="tree-children" style="display:none">`;
      children.forEach(([childName, childNode]) => { html += renderNode(childNode, childName, depth + 1); });
      html += `</div>`;
    }
    return html;
  }

  let treeHtml = '<div style="font-family:system-ui">';
  const rootChildren = root._children ? Object.entries(root._children).sort(([a],[b]) => {
    const aV = /\d/.test(a); const bV = /\d/.test(b);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    return a.localeCompare(b, 'zh');
  }) : [];
  rootChildren.forEach(([name, node]) => { treeHtml += renderNode(node, name, 0); });
  treeHtml += '</div>';
  return treeHtml;
}

// Build data tree: renders snapshots using paths chain as directory structure.
// snapshotsMap: { "version_branch|short_type": [snapshot, ...], ... }
// MAP: type code -> Chinese label map
// verTypeMap: { "ver|shortType": dispType } for snapshot type display
// alias: product alias to strip from version (e.g., "WAF")
// sid: source id for click delegation
function buildDataTreeHtml(pt, snapshotsMap, MAP, verTypeMap, alias, sid) {
  const paths = pt.paths || [];
  if (paths.length === 0) return '<span style="color:#9ca3af">无路径数据</span>';

  // Build tree structure from paths
  const root = {};
  paths.forEach((p, pathIdx) => {
    const chain = p.chain || [];
    if (chain.length < 2) return;
    let node = root;
    // Track accumulated chain for intermediate nodes
    let accChain = [];
    chain.forEach((name, idx) => {
      if (!node.__children) node.__children = {};
      if (!node.__children[name]) node.__children[name] = { __children: {}, __isPkg: false, __pkgKey: null, __snapshots: [], __pathId: '', __chain: [], __pathIdx: -1 };
      node = node.__children[name];
      // Set __chain for ALL nodes (not just leaves) so intermediate clicks work
      node.__chain = accChain.concat([name]);
      node.__pathIdx = pathIdx;
      if (idx === chain.length - 1) {
        node.__isPkg = true;
        const rawType = (p.types || [])[0] || '';
        node.__pkgKey = chain[chain.length - 1] || (ver + '|' + rawType);
        node.__pathId = p.url || '';
      }
      accChain = node.__chain;
    });
  });

  // Attach snapshots to matching leaf nodes
  // snapshotsMap key = source_url (relative path, stripped of BASE_URL)
  // tree node __pathId = p.url (relative path from product management)
  // Direct URL comparison — no version/type matching needed
  Object.entries(snapshotsMap || {}).forEach(([urlKey, snaps]) => {
    function attach(node) {
      if (node.__isPkg && node.__pathId) {
        // Normalize both URLs: strip trailing slash, ensure leading /
        const normNode = ('/' + node.__pathId).replace(/\/+$/, '');
        const normKey = ('/' + urlKey).replace(/\/+$/, '');
        if (normNode === normKey) {
          node.__snapshots = snaps;
          return true;
        }
      }
      if (node.__children) {
        for (const [, child] of Object.entries(node.__children)) {
          if (attach(child)) return true;
        }
      }
      return false;
    }
    attach(root);
  });

  // Phase 2: Propagate version_branch, package_type hints and freshness from leaves up.
  function propagateHints(node) {
    if (node.__isPkg) {
      const snaps = node.__snapshots || [];
      if (snaps.length > 0) {
        const verHint = snaps[0].version_branch || '';
        const pkgHint = snaps[0].package_type || '';
        const now = Date.now();
        const latestPublished = snaps.reduce((max, s) => {
          if (!s.published_at) return max;
          const t = new Date(s.published_at).getTime();
          return t > max ? t : max;
        }, 0);
        let freshness = 'idle';
        if (latestPublished > 0) {
          const days = (now - latestPublished) / 86400000;
          if (days <= 30) freshness = 'new';
          else if (days <= 365) freshness = 'lowfreq';
        }
        node.__freshness = freshness;
        return { ver: verHint, pkg: pkgHint, freshness };
      }
      return null;
    }
    if (!node.__children) return null;
    let verSet = new Set(), pkgSet = new Set();
    let childFreshness = 'idle';
    for (const [, child] of Object.entries(node.__children)) {
      const childHints = propagateHints(child);
      if (!childHints) continue;
      if (childHints.ver) verSet.add(childHints.ver);
      if (childHints.pkg) pkgSet.add(childHints.pkg);
      // Highest priority: new > lowfreq > idle
      if (childHints.freshness === 'new') childFreshness = 'new';
      else if (childHints.freshness === 'lowfreq' && childFreshness !== 'new') childFreshness = 'lowfreq';
    }
    if (verSet.size === 1) node.__verHint = [...verSet][0];
    if (pkgSet.size === 1) node.__pkgHint = [...pkgSet][0];
    node.__freshness = childFreshness;
    return { ver: verSet.size === 1 ? [...verSet][0] : '', pkg: pkgSet.size === 1 ? [...pkgSet][0] : '', freshness: childFreshness };
  }
  propagateHints(root);

  // Render the tree
  function renderNode(node, name, depth) {
    const indent = depth * 16;
    const children = node.__children ? Object.entries(node.__children) : [];
    const hasChildren = children.length > 0;
    const isPkg = node.__isPkg;
    const snaps = node.__snapshots || [];

    // Determine target div to toggle (both empty and non-empty pkg nodes need IDs)
    // Use __pathId (URL) for targetId to ensure uniqueness — same leaf name across different
    // versions (e.g. "引擎升级包" x16) must not share the same ID. __pathId is unique per path.
    // For paths with empty URLs (NF-B/NF-D, etc.), include __pathIdx in the ID to distinguish
    // duplicate chains that share the same empty URL (e.g. NF-B "引擎库升级包" ×3).
    let targetId = null;
    if (isPkg) {
      const rawId = node.__pathId
        ? node.__pathId
        : ('|' + (node.__chain || []).join('|') + '|idx=' + node.__pathIdx);
      targetId = 'pktbl_' + rawId
          .replace(/[^\x00-\x7F]/g, function(m) { return '_' + m.charCodeAt(0).toString(16) + '_'; })
          .replace(/\W/g, '_');
    }

    // Clicking any node: filter right panel to that product/sub-category/version
    // Clicking a leaf node: also expand the corresponding row in the right panel
    // data attributes for event delegation
    const chainJson = JSON.stringify(node.__chain || []).replace(/"/g, '&quot;');
    const nodeUrl = node.__pathId || '';
    const isLeaf = isPkg ? '1' : '0';
    // For leaf nodes, collect snapshot IDs for right-panel expansion
    const leafSnapIds = isPkg ? (snaps.map(s => s.id).join(',')) : '';
    // Hints for filtering: version_branch and package_type shared by all descendants
    const verHint = node.__verHint || '';
    const pkgHint = node.__pkgHint || '';

    const icon = isPkg ? '&#128196;' : (hasChildren ? '&#128193;' : '&#128196;');
    const label = isPkg ? name : (MAP[name] || name);
    const childCount = hasChildren ? ` <span style="color:#94a3b8;font-size:11px">(${children.length})</span>` : '';
    const snapCount = isPkg ? (
      snaps.length > 0
        ? ` <span style="background:#dbeafe;color:#1d4ed8;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">${snaps.length}包</span>`
        : ` <span style="background:#fee2e2;color:#dc2626;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">空</span>`
    ) : '';
    const freshBadge = (node.__freshness === 'new') ? ` <span style="background:#0e9f6e;color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">活跃</span>` : (node.__freshness === 'lowfreq' ? ` <span style="background:#e6a700;color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">低频</span>` : (node.__freshness === 'idle' ? ` <span style="background:#9ca3af;color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">沉寂</span>` : ''));
    // Arrow: toggle children visibility via data-action="treeToggle" (handled by event delegation)
    // Uses a generated children ID stored in data-target on the arrow
    const childDivId = hasChildren ? ('tcd_' + sid + '_' + depth + '_' + name.replace(/\W/g, '_')) : null;
    const arrow = hasChildren || isPkg
      ? `<span class="tree-arrow" data-action="treeToggle" data-target="${childDivId}" style="cursor:pointer;color:#94a3b8;font-size:13px;user-select:none;flex-shrink:0;margin-right:4px">&#9658;</span>`
      : `<span style="width:13px;flex-shrink:0;margin-right:4px"></span>`;
    let html = `<div class="tree-node" data-action="treeNode" data-sid="${sid}" data-chain="${chainJson}" data-url="${nodeUrl}" data-isleaf="${isLeaf}" data-snapids="${leafSnapIds}" data-verhint="${escHtml(verHint)}" data-pkghint="${escHtml(pkgHint)}" style="padding-left:${indent}px;display:flex;align-items:center;padding-top:4px;padding-bottom:4px;min-height:28px;cursor:pointer">`;
    html += arrow;
    html += `<span style="font-size:13px;color:#334155;flex-shrink:0">${icon} ${escHtml(label)}${childCount}${snapCount}${freshBadge}</span>`;
    html += `</div>`;

    if (hasChildren) {
      html += `<div id="${childDivId}" class="tree-children" data-target="${childDivId}" style="display:none">`;
      children.forEach(([childName, childNode]) => { html += renderNode(childNode, childName, depth + 1); });
      html += `</div>`;
    }

    // Snapshot table for leaf nodes — NO LONGER rendered here.
    // Clicking a leaf node now filters the right panel to that URL and expands the row there.
    // Empty leaves still show the placeholder div so tree height is consistent.
    if (isPkg) {
      if (snaps.length === 0) {
        // Keep a hidden placeholder div for consistent tree height
        const divId = targetId;
        html += `<div id="${divId}" class="tree-children" data-target="${divId}" style="display:none;padding-left:${indent + 16}px;margin-bottom:8px">
          <div style="color:var(--muted);font-size:12px;padding:8px 12px;background:#fafafa;border-radius:4px">
            暂无采集数据<div style="font-size:11px;margin-top:2px">页面可能返回登录页或无数据包</div>
          </div></div>`;
      } else {
        // Has data: render a placeholder div (hidden) for tree height consistency only
        const divId = targetId;
        html += `<div id="${divId}" class="tree-children" data-target="${divId}" style="display:none;padding-left:${indent + 16}px;margin-bottom:8px"></div>`;
      }
    }

    return html;
  }

  let treeHtml = '<div style="font-family:system-ui">';
  const rootChildren = root.__children ? Object.entries(root.__children).sort(([a],[b]) => {
    const aV = /\d/.test(a); const bV = /\d/.test(b);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    return a.localeCompare(b, 'zh');
  }) : [];
  // Skip the top-level product name node if it's the only child (duplicates card title)
  if (rootChildren.length === 1) {
    const [topName, topNode] = rootChildren[0];
    const topChildren = topNode.__children ? Object.entries(topNode.__children).sort(([a],[b]) => {
      const aV = /\d/.test(a); const bV = /\d/.test(b);
      if (aV && !bV) return -1; if (!aV && bV) return 1;
      return a.localeCompare(b, 'zh');
    }) : [];
    topChildren.forEach(([childName, childNode]) => { treeHtml += renderNode(childNode, childName, 0); });
  } else {
    rootChildren.forEach(([name, node]) => { treeHtml += renderNode(node, name, 0); });
  }
  treeHtml += '</div>';
  return treeHtml;
}

function pkgTableToggle(el) {
  var targetId = el.getAttribute('data-target');
  if (!targetId) return;
  var target = document.getElementById(targetId);
  if (!target) return;
  var isOpen = target.style.display !== 'none';
  target.style.display = isOpen ? 'none' : 'block';
  el.innerHTML = isOpen ? '&#9658;' : '&#9660;';
}

function pkgTableToggleById(targetId) {
  if (!targetId) return;
  var target = document.getElementById(targetId);
  if (!target) return;
  var isOpen = target.style.display !== 'none';
  target.style.display = isOpen ? 'none' : 'block';
  // Also toggle the arrow in the parent tree-node
  var node = target.previousElementSibling;
  if (node && node.classList.contains('tree-node')) {
    var arrow = node.querySelector('.tree-arrow');
    if (arrow) arrow.innerHTML = isOpen ? '&#9658;' : '&#9660;';
  }
}

function treeToggle(el, extraTargetId) {
  var node = el.closest ? el.closest('.tree-node') : el;
  // .tree-children is the next sibling of .tree-node
  var ch = node.nextElementSibling;
  if (!ch || !ch.classList.contains('tree-children')) return;
  var isOpen = ch.style.display !== 'none';
  ch.style.display = isOpen ? 'none' : 'block';
  // Toggle extra target (snapshot table) if provided
  if (extraTargetId) {
    var extra = document.getElementById(extraTargetId);
    if (extra) extra.style.display = isOpen ? 'none' : 'block';
  }
  // Update arrow inside this node
  var arrow = node.querySelector('.tree-arrow');
  if (arrow) arrow.innerHTML = isOpen ? '&#9658;' : '&#9660;';
}

function editPkgType(id){
  const prods=window._allProducts||[];
  const p=prods.find(x=>x.id===id);
  if(!p){toast('产品不存在','error');return;}

  const MAP={sys:'系统',rule:'规则',nti:'威胁情报',av:'病毒库',apprule:'应用规则',url:'URL库',wcs:'恶意站点',judge:'研判',geo:'地理库',interface:'接口',special:'特殊',other:'其他',merge:'合并',client:'客户端',av_stream:'流式病毒库',test:'测试'};

  // 解析 package_type（新格式 {types:[], paths:[], modes:{}} 或旧格式 [...]）
  let pt={types:[], paths:[], modes:{}};
  try{
    if(typeof p.package_type==='string'){
      const parsed=JSON.parse(p.package_type);
      if(parsed.types){pt=parsed;}
      else if(Array.isArray(parsed)){pt.types=parsed; pt.paths=[]; pt.modes={};} // 旧格式
    }
  }catch{}

  // 如果有未确认的包类型变化 → 显示 diff 确认弹窗
  if(p.package_type_changed==1 && p.package_type_discovered){
    let disc={types:[], paths:[], modes:{}};
    try{const r=JSON.parse(p.package_type_discovered);if(r.types){disc=r;}}catch{}
    const currentSet=new Set(pt.types);
    const discSet=new Set(disc.types);
    const added=[...discSet].filter(x=>!currentSet.has(x));
    const removed=[...currentSet].filter(x=>!discSet.has(x));

    let diffRows='';
    if(added.length){
      diffRows+=added.map(t=>`<span style="background:#d1fae5;color:#065f46;font-size:12px;padding:2px 8px;border-radius:10px;margin:2px;display:inline-block">+${MAP[t]||t}</span>`).join(' ');
    }
    if(removed.length){
      diffRows+=removed.map(t=>`<span style="background:#fee2e2;color:#991b1b;font-size:12px;padding:2px 8px;border-radius:10px;margin:2px;display:inline-block;text-decoration:line-through">-${MAP[t]||t}</span>`).join(' ');
    }
    if(!added.length && !removed.length){
      diffRows=`<span style="color:#9ca3af;font-size:13px">包类型集合无变化，但采集时检测到差异</span>`;
    }

    // diff 模式下的 modes 编辑
    let modeRows='';
    disc.types.forEach(t=>{
      const label=MAP[t]||t;
      const mode=disc.modes[t]||'auto';
      modeRows+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:#f9fafb;border:1px solid #e5e7eb;margin-bottom:4px">
        <span style="flex:1;font-size:13px;color:#374151">${label}</span>
        <select data-type="${escHtml(t)}" style="flex:0 0 90px;padding:3px 6px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;cursor:pointer">
          <option value="auto" ${mode==='auto'?'selected':''}>自动</option>
          <option value="full" ${mode==='full'?'selected':''}>全量</option>
          <option value="incremental" ${mode==='incremental'?'selected':''}>增量</option>
        </select>
      </div>`;
    });

    // 目录树展示 disc.paths（复用新的树形渲染）
    let pathTreeHtml = '';

      const ruleItems=disc.affected_rules.map(r=>
        `<div style="margin-top:4px">

      <div style="background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:14px;margin-bottom:16px">

        <button class="btn" onclick="confirmPkgTypeChange(${id},'keep')">保留原样</button>
        <button class="btn" style="margin-left:auto" onclick="closeModal('pkgtype')">取消</button>
      </div>
    </div>`);
    window._ptModes={};
    disc.types.forEach(t=>{ window._ptModes[t]=disc.modes[t]||'auto'; });
    window._ptDiscovered=disc;
    return;
  }

  // ── 正常编辑模式 ────────────────────────────────────────────
  if(pt.types.length===0){
    _showModal('pkgtype');
    modalBody('pkgtype',`<div style="padding:24px">
      <div style="font-size:15px;font-weight:600;margin-bottom:16px">📦 包类型设置 <span style="font-weight:400;font-size:12px;color:#666">「${escHtml(p.name)}」</span></div>

      </div>

      </div>
    </div>`);
    return;
  }

  // 计算每种类型的路径覆盖数
  const pathCount={};
  pt.types.forEach(t=>{ pathCount[t]=0; });
  (pt.paths||[]).forEach(p=>{
    (p.types||[]).forEach(t=>{ if(t in pathCount) pathCount[t]++; });
  });
  const sortedTypes=[...pt.types].sort((a,b)=>(pathCount[b]||0)-(pathCount[a]||0));

  // 构建目录树（使用独立函数）
  const treeHtml = buildTreeHtml(pt, MAP);

  // 弹窗内容：目录树 + mode 选择 + 保存/取消
  _showModal('pkgtype');
  modalBody('pkgtype',`<div style="padding:24px;max-height:80vh;overflow-y:auto">
    <div style="font-size:15px;font-weight:600;margin-bottom:16px">📦 包类型设置 <span style="font-weight:400;font-size:12px;color:#666">「${escHtml(p.name)}」</span></div>

    </div>
    <div style="border:1px solid #e2e8f0;border-radius:8px;max-height:320px;overflow-y:auto;padding:8px 4px">

      <button class="btn" onclick="closeModal('pkgtype')">取消</button>

  // 初始化 modes
  window._ptModes = {};
  window._ptPaths = pt.paths || [];
  pt.types.forEach(t => { window._ptModes[t] = pt.modes && pt.modes[t] || 'auto'; });
}

async function savePkgType(id){
  const modes = window._ptModes || {};
  // types 来自 modes 的 key（由树形控件的 mode selector 更新）
  const types = Object.keys(modes);

  // 构建新格式: {types:[...], paths:[...], modes:{...}}
  const finalModes = {};
  types.forEach(t => {
    const m = modes[t] || 'auto';
    if (m !== 'auto') finalModes[t] = m;
  });
  const pkg_type = { types, paths: window._ptPaths || [], modes: finalModes };

  const r = await api(`/system/products/${id}`,{method:'PUT',body:JSON.stringify({package_type:JSON.stringify(pkg_type)})});
  if(r.code===0){
    toast('包类型已保存','success');
    closeModal('pkgtype');
    await products();
  }else{
    toast(r.message||'保存失败','error');
  }
}

async function confirmPkgTypeChange(id, action){
  if(action==='apply'){
    const selEls=document.querySelectorAll('#pt-type-list select[data-type]');
    const disc=window._ptDiscovered||{types:[],paths:[],modes:{}};
    const updatedModes={};
    selEls.forEach(sel=>{ updatedModes[sel.dataset.type]=sel.value; });
    const finalPkg={types:disc.types, paths:disc.paths||[], modes:updatedModes};
    await api(`/system/products/${id}`,{method:'PUT',body:JSON.stringify({
      package_type:JSON.stringify(finalPkg),
      package_type_discovered:'',
      package_type_changed:0
    })});
    toast('已采纳新包类型','success');
  }else if(action==='keep'){
    await api(`/system/products/${id}`,{method:'PUT',body:JSON.stringify({
      package_type_discovered:'',
      package_type_changed:0
    })});
    toast('已保留原包类型','success');
  }
  closeModal('pkgtype');
  await products();
}

async function refreshPkgType(id){
  // 触发刷新 → POST → SSE 轮询 → 圆形进度环 + 日志浮动窗口
  const btn=document.querySelector(`[onclick="refreshPkgType(${id})"]`);
  if(!btn) return;

  // 触发后台任务
  const r=await api(`/system/products/${id}/refresh-pkg-type`,{method:'POST'});
  if(r.code!==0){
    toast(r.message||'启动失败','error');
    return;
  }

  // 按钮变成进度环
  const progId=`rprog-${id}`;
  btn.style.display='none';
  const ring=document.createElement('span');
  ring.id=progId;
  ring.style.cssText='display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;cursor:pointer';
  ring.innerHTML=`<svg width="28" height="28" viewBox="0 0 28 28" onclick="showRefreshLog(${id})"><circle cx="14" cy="14" r="11" fill="none" stroke="#e5e7eb" stroke-width="2.5"/><circle id="${progId}-arc" cx="14" cy="14" r="11" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="69.1" stroke-dashoffset="69.1" stroke-linecap="round" transform="rotate(-90 14 14)"/><text id="${progId}-txt" x="14" y="19" text-anchor="middle" font-size="9" fill="#7c3aed" font-weight="700">·</text></svg>`;
  btn.parentNode.insertBefore(ring,btn);

  // 预建立日志窗口（隐藏）
  const logId=`rlog-${id}`;
  if(!document.getElementById(logId)){
    const logDiv=document.createElement('div');
    logDiv.id=logId;
    logDiv.style.cssText='position:fixed;bottom:16px;right:16px;width:340px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.15);z-index:2000;display:none';
    logDiv.innerHTML=`<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f1f3f5;font-size:12px;font-weight:600;color:#374151"><span style="flex:1">📋 包类型刷新日志</span><span onclick="document.getElementById('${logId}').style.display='none'" style="cursor:pointer;color:#9ca3af;font-size:16px;line-height:1;margin-left:8px">×</span></div><div class="log-body" style="padding:10px 14px;max-height:180px;overflow-y:auto;background:#fafafa;font-family:monospace;font-size:11px;color:#374151"></div>`;
    document.body.appendChild(logDiv);
  }

  // 轮询方式获取进度（每 2 秒一次，兼容长任务）
  let done=false;
  let pollTimer=null;
  function updateRing(state){
    if(!state) return;
    const arc=document.getElementById(`${progId}-arc`);
    const txt=document.getElementById(`${progId}-txt`);
    if(arc&&txt){
      // Phase format: 'fetching_home' | 'fetching_ver (3/7)' | 'done' | 'error'
      const rawPhase = state.phase || '';
      let pct = 0;
      const verMatch = rawPhase.match(/fetching_ver \((\d+)\/(\d+)\)/);
      if (verMatch) {
        const cur = parseInt(verMatch[1]);
        const tot = parseInt(verMatch[2]);
        pct = 25 + Math.round((cur / tot) * 70);
      } else if (rawPhase === 'fetching_home') {
        pct = 10;
      } else if (rawPhase === 'done') {
        pct = 100;
      } else if (rawPhase === 'error') {
        pct = 100;
      }
      arc.setAttribute('stroke-dashoffset', 69.1*(1-pct/100));
      txt.textContent = pct === 100 ? (rawPhase === 'error' ? '✗' : '✓') : `${pct}`;
    }
    if(state.log_lines&&state.log_lines.length){
      const win=document.getElementById(logId);
      if(win){
        win.style.display='block';
        win.querySelector('.log-body').innerHTML=state.log_lines.map(l=>`<div style="padding:1px 0;border-bottom:1px solid #f1f3f5">${escHtml(l)}</div>`).join('');
        win.querySelector('.log-body').scrollTop=win.querySelector('.log-body').scrollHeight;
      }
    }
    if(state.phase==='done'||state.phase==='error'||!state.active){
      done=true;
      if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
      setTimeout(async()=>{
        ring.remove();
        btn.style.display='';
        await products();
      },1000);
    }
  }

  // 触发后立即查询一次初始状态，然后每 2 秒轮询
  async function poll(){
    if(done) return;
    const r=await api(`/system/products/${id}/refresh-pkg-status`);
    if(r.code===0){
      updateRing(r.data);
    }
  }

  poll(); // 立即查一次
  pollTimer=setInterval(poll, 2000); // 每 2 秒轮询
  // 最多轮询 120 秒（60次 × 2s），防止无限等待
  setTimeout(()=>{if(!done){done=true;if(pollTimer){clearInterval(pollTimer);}ring.remove();btn.style.display='';}},120000);
}

function filterProducts(){
  const search=(document.getElementById('prod-search')?.value||'').toLowerCase();
  const filter=document.getElementById('prod-filter')?.value||'all';
  const all=window._allProducts||[];
  const filtered=all.filter(p=>{
    const matchSearch=!search || p.name.toLowerCase().includes(search) || (p.display_name||'').toLowerCase().includes(search) || (p.entry_url||'').toLowerCase().includes(search);
    const matchFilter=(filter==='all')||(filter==='enabled'&&p.is_active)||(filter==='disabled'&&!p.is_active);
    return matchSearch&&matchFilter;
  });
  document.getElementById('prod-tbody').innerHTML=_renderProductRows(filtered);
}

  // 内存没有，实时查API

async function discoverProducts(){
  // 清除隐藏状态，新任务开始
  window._discBannerHidden=false;
  // 预建立日志窗口（隐藏，点击按钮显示）
  const discLogId='disc-float-log';
  if(!document.getElementById(discLogId)){
    const logDiv=document.createElement('div');
    logDiv.id=discLogId;
    logDiv.style.cssText='position:fixed;bottom:16px;right:16px;width:340px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.15);z-index:9999;display:none';
    logDiv.innerHTML=`<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f1f3f5;font-size:12px;font-weight:600;color:#374151;gap:8px"><span style="flex:1">📋 自动发现日志</span><button onclick="document.getElementById('${discLogId}').style.display='none'" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;padding:0;line-height:1">×</button></div><div id="${discLogId}-body" style="padding:10px 14px;max-height:200px;overflow-y:auto;background:#fafafa;font-family:monospace;font-size:11px;color:#374151"></div>`;
    document.body.appendChild(logDiv);
    window.__discLogId=discLogId; // expose globally for confirmDiscoverResult
  }

  _showModal('disc');
  modalBody('disc',`<div style="padding:24px;text-align:center">
    <div class="spin"></div>
    <div id="disc-phase" style="margin-top:12px;color:#666;font-size:14px">正在启动自动发现…</div>
    <div style="margin-top:10px">
      <button onclick="document.getElementById('${discLogId}').style.display='block'" style="background:none;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;font-size:12px;color:#7c3aed;padding:4px 12px">📋 查看日志</button>
    </div>
  </div>`);

  const r=await api('/system/products/discover',{method:'POST'});
  if(r.code===409){
    // 已经在运行中——直接拉起进度 UI，不重复启动
    const s=await api('/system/products/discover/status');
    if(s.code===0 && s.data?.active){
      // 直接进入轮询渲染
    } else {
      modalBody('disc',`<div style="padding:24px;text-align:center">
        <div style="color:#f59e0b;font-size:14px;margin-bottom:8px">⚠️ 上次任务似乎已结束</div>
        <div style="color:#666;font-size:13px">请关闭后重新点击自动发现</div>
        <div style="margin-top:16px"><button class="btn" onclick="closeModal('disc')">关闭</button></div>
      </div>`);
      return;
    }
  } else if(r.code!==0){
    modalBody('disc',`<div style="padding:24px"><div style="color:#dc2626;font-weight:600;margin-bottom:8px">启动失败</div><div style="color:#666;font-size:13px">${escHtml(r.message||'')}</div><div style="margin-top:16px"><button class="btn" onclick="closeModal('disc')">关闭</button></div></div>`);
    return;
  }

  // 2. 轮询进度
  let done=false;
  let pollTimer=null;
  function renderProgress(state){
    const phaseNames={
      'scanning_products':'🔍 扫描产品列表…',
      'discovering_pkg_types':`📦 发现包类型 (${state.progress||0}/${state.total||0})…`,
      'done':'✅ 发现完成',
      'error':'❌ 发现出错',
    };
    const phaseEl=document.getElementById('disc-phase');
    if(phaseEl) phaseEl.textContent=phaseNames[state.phase]||state.phase||'';
    // Feed floating log window
    const logBody=document.getElementById(discLogId+'-body');
    if(logBody && state.log_lines?.length){
      logBody.innerHTML=state.log_lines.map(renderLogLine).join('');
      logBody.scrollTop=logBody.scrollHeight;
    }
    return state.phase==='done'||state.phase==='error'||!state.active;
  }

  async function poll(){
    if(done) return;
    const s=await api('/system/products/discover/status');
    if(s.code===0){
      done=renderProgress(s.data);
      if(done){
        clearInterval(pollTimer);
        if(s.data.phase==='done') showDiscoverResult(s.data.result);
      }
    }
  }
  poll();
  pollTimer=setInterval(poll,2000);
  setTimeout(()=>{if(!done){done=true;clearInterval(pollTimer);modalBody('disc',`<div style="padding:24px;text-align:center;color:#dc2626">发现超时，请重试</div><div style="padding:8px"><button class="btn" onclick="closeModal('disc')">关闭</button></div>`);}},600000);
}

function showDiscoverResult(result, isStale){
  // 渲染两阶段变更确认
  const prod=result?.products||{};
  const pkgChanges=result?.pkg_changes||{};
  const added=prod.added||[];
  const removed=prod.removed||[];
  const unchanged=prod.unchanged||[];
  const pkgChangedProducts=Object.values(pkgChanges);
  const totalProdChanges=added.length+removed.length;
  const totalPkgChanges=pkgChangedProducts.reduce((n,c)=>n+(c.added_paths?.length||0)+(c.deleted_paths?.length||0)+(c.modified_paths?.length||0),0);

  const staleWarning=isStale?'<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#92400e;display:flex;align-items:center;gap:8px"><span style="font-size:16px">⚠️</span><div><b>发现结果已从临时文件恢复</b>（服务重启前未执行确认），请检查以下变更后点击「确认应用变更」。</div></div>':'';

async function confirmDiscoverResult(){
  const result=window._discoverResult;
  if(!result) return;
  const btn=document.getElementById('disc-confirm-btn');
  const phaseEl=document.getElementById('disc-confirm-phase');
  if(btn){btn.disabled=true;btn.textContent='处理中…';}
  if(phaseEl){phaseEl.style.display='block';phaseEl.textContent='💾 正在启动…';}

  const r=await api('/system/products/discover/confirm',{method:'POST',body:JSON.stringify(result)});
  if(r.code===0){
    // Reuse or create floating log window
    let logId=window.__discLogId||'disc-float-log';
    let logBody=document.getElementById(logId+'-body');
    if(!logBody){
      const logDiv=document.createElement('div');
      logDiv.id=logId;
      logDiv.style.cssText='position:fixed;bottom:16px;right:16px;width:340px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.15);z-index:9999;display:none';
      logDiv.innerHTML=`<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f1f3f5;font-size:12px;font-weight:600;color:#374151;gap:8px"><span style="flex:1">📋 应用日志</span><button onclick="document.getElementById('${logId}').style.display='none'" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;padding:0;line-height:1">×</button></div><div id="${logId}-body" style="padding:10px 14px;max-height:200px;overflow-y:auto;background:#fafafa;font-family:monospace;font-size:11px;color:#374151"></div>`;
      document.body.appendChild(logDiv);
      logBody=document.getElementById(logId+'-body');
      window.__discLogId=logId;
    }
    logBody.innerHTML='';
    document.getElementById(logId).style.display='block';

    let done=false;
    let pollTimer=null;
    function renderConfirmProgress(state){
      const phaseNames={
        'applying':'💾 正在应用变更…',
        'updating_pkg':`📦 更新包类型…`,
        'done':'✅ 应用完成',
        'error':'❌ 应用出错',
      };
      const msg=phaseNames[state.phase]||state.phase||'';
      if(phaseEl) phaseEl.textContent=msg;
      if(logBody && state.log_lines?.length){
        logBody.innerHTML=state.log_lines.map(renderLogLine).join('');
        logBody.scrollTop=logBody.scrollHeight;
      }
      return state.phase==='done'||state.phase==='error'||!state.active;
    }

    async function pollConfirm(){
      if(done) return;
      try{
        const s=await api('/system/products/discover/confirm/status');
        if(s.code===0){
          done=renderConfirmProgress(s.data);
          if(done){
            clearInterval(pollTimer);
            if(s.data.phase==='done'){
              const d=s.data.result||{};
              toast(`已应用：产品新增${d.saved?.length||0} 删除${d.deleted?.length||0}，包类型更新${d.pkg_updated?.length||0}`,'success');
              window._discoverResult=null;
              window._pendingDiscResult=null;
              window._pendingDiscStale=null;
              closeModal('disc');
              await products();
            }else if(s.data.phase==='error'){
              toast('应用出错: '+(s.data.error||'未知错误'),'error');
              if(btn){btn.disabled=false;btn.textContent='💾 确认应用变更';}
            }
          }
        }
      }catch(e){}
    }
    pollConfirm();
    pollTimer=setInterval(pollConfirm,2000);
    setTimeout(()=>{if(!done){done=true;clearInterval(pollTimer);toast('应用超时，请重试','error');if(btn){btn.disabled=false;btn.textContent='💾 确认应用变更';}}},300000);
  }else{
    toast('启动失败: '+r.message,'error');
    if(btn){btn.disabled=false;btn.textContent='💾 确认应用变更';}
    if(phaseEl){phaseEl.style.display='none';}
  }
}

async function saveEditRow(id){
  const entry_url = document.getElementById('ef-url')?.value?.trim() || '';
  if(!entry_url){ toast('URL不能为空','error'); return; }
  if(!entry_url.startsWith('/')){ toast('URL必须以 / 开头','error'); return; }

  const _prods = window._allProducts || [];
  const _p = _prods.find(x => x.id === id);
  const wasManual = _p?.is_manual;
  const oldUrl = _p?.entry_url || '';
  const urlChanged = oldUrl && oldUrl !== entry_url;

  const body = {};
  if(wasManual) body.name = _p.name;
  body.entry_url = entry_url;

  const r = await api(`/system/products/${id}`,{method:'PUT',body:JSON.stringify(body)});
  if(r.code === 0){
    toast('已更新','success');
    _editRowId = null;
    await products();
    if(urlChanged && !confirm('⚠️ 入口URL已变更，是否立即刷新包类型？')) return;
    if(urlChanged) refreshPkgType(id);
  } else {
    toast(r.message || '保存失败','error');
  }
}

          <button class="btn btn-sm btn-outline" style="width:100%;justify-content:center" onclick="closeCollectModal()">取消</button>
        </div>
      </div>
    </div>
  `);
}
function showCollectProgress(){
  // Remove existing modal if any
  const old=document.getElementById('collectModal');if(old)old.remove();
  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div id="collectModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)closeCollectModal()">
      <div class="card" style="width:420px;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()">
        <div class="card-hd">🔄 采集进度 <button class="btn btn-xs btn-outline" style="margin-left:auto" onclick="closeCollectModal()">✕ 关闭</button></div>
        <div class="card-bd" id="collectModalBody">
          <div style="text-align:center;padding:12px 0"><div style="font-size:32px;margin-bottom:8px">⏳</div><p style="font-size:13px">加载进度...</p></div>
        </div>
      </div>
    </div>
  `);
  // Trigger a poll immediately
  pollProgress();
  // Ensure timer is running
  if(!_collectPollTimer)_collectPollTimer=setInterval(pollProgress,2000);
}
function closeCollectModal(){
  const m=document.getElementById('collectModal');if(m)m.remove();
  // Stop the progress poll timer — collection continues in backend
  if(_collectPollTimer){clearInterval(_collectPollTimer);_collectPollTimer=null;}
}
function pollProgress(){
  const body=document.getElementById('collectModalBody');
  if(!body)return; // Modal closed, stop polling
  // Guard: if no collection is running on backend, clear timer and skip request
  if(!_collectRunning){if(_collectPollTimer){clearInterval(_collectPollTimer);_collectPollTimer=null;}return;}
  api('/system/collect/progress').then(pr=>{
    if(!pr.data){if(body)body.innerHTML='<p style="text-align:center;color:var(--muted)">无法获取进度</p>';return;}
    const p=pr.data.progress||{};
    if(!p.active&&!p.phase){
      body.innerHTML='<p style="text-align:center;color:var(--muted)">当前无采集任务</p><button class="btn btn-sm btn-outline" style="width:100%;margin-top:12px" onclick="closeCollectModal()">关闭</button>';
      _collectRunning=false;
      if(_collectPollTimer){clearInterval(_collectPollTimer);_collectPollTimer=null;}
      return;
    }
    let html='';
    if(p.phase==='collecting'){
      const pct=p.products_total?Math.round(p.products_done/p.products_total*100):0;
      html+=`<div style="margin-bottom:12px"><div style="background:#e2e7ee;border-radius:6px;height:8px;overflow:hidden"><div style="background:var(--primary);height:100%;width:${pct}%;transition:width .3s;border-radius:6px"></div></div><div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:center">${p.products_done}/${p.products_total} 产品 (${pct}%)</div></div>`;
      html+=`<div style="font-size:13px;text-align:center;margin-bottom:4px"><strong>📦 ${p.current_product||'...'}</strong></div>`;
      if(p.current_version)html+=`<div style="font-size:11px;color:var(--muted);text-align:center">${p.current_version}</div>`;
      html+=`<div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px">已采集 ${p.items_collected||0} 项</div>`;
      html+=`<button class="btn btn-xs btn-outline" style="margin-top:10px;width:100%" onclick="closeCollectModal()">后台运行</button>`;
    }else if(p.phase==='detecting'){
      html+=`<div style="text-align:center;font-size:32px;margin-bottom:8px">🔍</div><p style="text-align:center;font-size:13px">正在检测变化...</p>`;
    }else if(p.phase==='notifying'){
      html+=`<div style="text-align:center;font-size:32px;margin-bottom:8px">📨</div><p style="text-align:center;font-size:13px">正在推送通知...</p>`;
    }else if(p.phase==='done'){
      const ok=p.errors&&p.errors.length>0?'warn':'ok';
      html+=`<div style="text-align:center;font-size:32px;margin-bottom:8px">${ok==='ok'?'✅':'⚠️'}</div>`;
      html+=`<p style="text-align:center;font-size:14px;font-weight:600">采集完成</p>`;
      html+=`<div class="grid2" style="margin-top:10px"><div class="stat green"><div class="num">${p.total_new||0}</div><div class="label">新增</div></div><div class="stat red"><div class="num">${p.total_rollback||0}</div><div class="label">回退</div></div></div>`;
      html+=`<p style="font-size:11px;color:var(--muted);text-align:center;margin-top:6px">耗时 ${p.duration_s||0}秒 · ${p.items_collected||0}项</p>`;
      if(p.errors&&p.errors.length)html+=`<div style="margin-top:8px;font-size:11px;color:var(--danger)">${p.errors.map(e=>'⚠️ '+e).join('<br>')}</div>`;
      html+=`<button class="btn btn-sm btn-primary" style="width:100%;margin-top:12px" onclick="closeCollectModal();dashboard()">刷新仪表盘</button>`;
      _collectRunning=false;
      if(_collectPollTimer){clearInterval(_collectPollTimer);_collectPollTimer=null;}
    }
    if(html)body.innerHTML=html;
  }).catch(()=>{});
}
async function startCollect(mode){
  const body=document.getElementById('collectModalBody');
  body.innerHTML=`<div style="text-align:center;padding:12px 0"><div style="font-size:32px;margin-bottom:8px">⏳</div><p style="font-size:13px">正在启动${mode==='full'?'全量':'增量'}采集...</p></div>`;
  const r=await api('/system/collect',{method:'POST',body:JSON.stringify({mode})});
  if(r.code===409){body.innerHTML=`<p style="color:var(--danger);text-align:center">采集正在进行中</p><button class="btn btn-sm btn-outline" style="width:100%;margin-top:12px" onclick="closeCollectModal()">关闭</button>`;return;}
  if(r.code!==0){toast(r.message,'error');closeCollectModal();return;}
  _collectRunning=true;
  pollProgress();
  if(_collectPollTimer)clearInterval(_collectPollTimer);
  _collectPollTimer=setInterval(pollProgress,2000);
}

// ── Dashboard Progress Poll ──
async function pollDashProgress(){
  try{
    const pr=await api('/system/collect/progress');
    if(!pr.data)return;
    const p=pr.data.progress||{};
    const el=document.getElementById('dashProgress');
    const lc=document.getElementById('lastColText');
    if(!el)return;
    if(!p.active||p.phase==='done'){
      el.style.display='none';
      if(p.phase==='done'){if(lc)lc.textContent='已完成';if(window._dashPollTimer){clearInterval(window._dashPollTimer);window._dashPollTimer=null;}}
      return;
    }
    el.style.display='inline';
    if(p.phase==='collecting'){
      const pct=p.products_total?Math.round(p.products_done/p.products_total*100):0;
      el.innerHTML=`<span style="background:var(--primary);color:#fff;border-radius:4px;padding:1px 6px;font-size:11px">${pct}%</span> ${p.current_product||''} ${p.products_done}/${p.products_total}`;
    }else if(p.phase==='detecting'){
      el.innerHTML='<span style="background:#f59e0b;color:#fff;border-radius:4px;padding:1px 6px;font-size:11px">检测中</span>';
    }else if(p.phase==='notifying'){
      el.innerHTML='<span style="background:#10b981;color:#fff;border-radius:4px;padding:1px 6px;font-size:11px">推送中</span>';
    }
  }catch(e){}
}

// ── Debug Toggle ──
async function toggleDebug(){
  const lr=await api('/system/log-level');

  const next=cur==='DEBUG'?'INFO':'DEBUG';

// ── System Logs ──
let _logTimer=null;
async function logs(){
  if(_logTimer){clearInterval(_logTimer);_logTimer=null;}

  // Get log files and current level
  const[fR,lR]=await Promise.all([
    api('/system/log-files').catch(()=>({data:{files:[]}})),
    api('/system/log-level').catch(()=>({data:{level:'INFO'}}))
  ]);
  const files=fR.data?.files||[],curLevel=lR.data?.level||'INFO';

  let fOpts=files.map(f=>`<option value="${f.name}">${f.name} (${f.size_human||''})</option>`).join('');
  if(!fOpts)fOpts='<option value="app.log">app.log</option><option value="access.log">access.log</option>';

  document.getElementById('app').innerHTML=`
    <div class="card"><div class="card-hd">📋 系统日志
      <span style="margin-left:auto;font-size:12px;font-weight:400;color:var(--muted)">
        当前级别: <span class="badge badge-${curLevel==='DEBUG'?'warn':'ok'}">${curLevel}</span>
        <button class="btn btn-xs ${curLevel==='DEBUG'?'btn-danger':'btn-outline'}" onclick="toggleDebug()">${curLevel==='DEBUG'?'关闭调试':'开启调试'}</button>
      </span>
    </div><div class="card-bd">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:end;margin-bottom:12px">
        <div class="form-group" style="margin-bottom:0;min-width:180px"><label>日志文件</label><select id="logFile">${fOpts}</select></div>
        <div class="form-group" style="margin-bottom:0;min-width:120px"><label>级别</label><select id="logLevel"><option value="">全部</option><option value="DEBUG">DEBUG</option><option value="INFO" selected>INFO</option><option value="WARNING">WARNING</option><option value="ERROR">ERROR</option></select></div>
        <div class="form-group" style="margin-bottom:0;min-width:80px"><label>行数</label><select id="logLines"><option value="100">100</option><option value="200" selected>200</option><option value="500">500</option><option value="1000">1000</option></select></div>
        <div class="form-group" style="margin-bottom:0"><label>&nbsp;</label><div style="display:flex;gap:6px"><button class="btn btn-sm btn-primary" onclick="loadLogs()">查询</button><button class="btn btn-sm btn-outline" id="logAutoBtn" onclick="toggleAutoRefresh()">自动刷新</button></div></div>
      </div>
      <div id="logContent" style="background:#0d1117;color:#c9d1d9;border-radius:8px;padding:14px;font:12px/1.6 'SF Mono','Fira Code','Consolas',monospace;max-height:600px;overflow-y:auto;white-space:pre-wrap;word-break:break-all">
        点击「查询」加载日志...
      </div>
    </div></div>`;

  // Load logs immediately
  loadLogs();
}

async function loadLogs(){
  const f=document.getElementById('logFile')?.value||'app.log';
  const l=document.getElementById('logLevel')?.value||'';
  const n=document.getElementById('logLines')?.value||'200';
  const box=document.getElementById('logContent');
  if(!box)return;
  box.textContent='加载中...';
  try{
    const r=await api(`/system/logs?file=${encodeURIComponent(f)}&lines=${n}${l?'&level='+l:''}`);
    if(r.code===0){
      const lines=r.data.lines||[];
      box.innerHTML=lines.map(l=>{
        let cls='#8b949e';
        if(l.includes('[ERROR]'))cls='#f85149';
        else if(l.includes('[WARNING]'))cls='#d2991d';
        else if(l.includes('[INFO]'))cls='#7ee787';
        else if(l.includes('[DEBUG]'))cls='#8b949e';
        return `<span style="color:${cls}">${l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
      }).join('\n');
      if(!lines.length)box.textContent='(无匹配日志)';
    }else{
      box.textContent=r.message||'加载失败';
    }
  }catch(e){box.textContent='加载失败: '+e.message;}
}

function toggleAutoRefresh(){
  const btn=document.getElementById('logAutoBtn');
  if(_logTimer){
    clearInterval(_logTimer);_logTimer=null;
    btn.textContent='自动刷新';btn.classList.remove('btn-success');btn.classList.add('btn-outline');
  }else{
    _logTimer=setInterval(loadLogs,5000);
    btn.textContent='停止刷新';btn.classList.remove('btn-outline');btn.classList.add('btn-success');
  }
}

function showPwdModal(){
  let m=document.getElementById('pwdModal');
  if(!m){
    m=document.createElement('div');m.id='pwdModal';
    m.innerHTML=`<div class="modal-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)closePwdModal()"><div class="card" style="width:380px;max-width:90vw"><div class="card-hd">🔒 修改密码</div><div class="card-bd"><div class="form-group"><label>旧密码</label><input id="pwdOld" type="password"></div><div class="form-group"><label>新密码</label><input id="pwdNew" type="password" placeholder="至少4位"></div><div class="form-group"><label>确认新密码</label><input id="pwdConfirm" type="password"></div><div class="flex gap8"><button class="btn btn-primary btn-sm" onclick="doChangePwd()">确认修改</button><button class="btn btn-sm btn-outline" onclick="closePwdModal()">取消</button></div></div></div></div>`;
    document.body.appendChild(m);
  }
  m.style.display='';
  document.getElementById('pwdOld').value='';
  document.getElementById('pwdNew').value='';
  document.getElementById('pwdConfirm').value='';
}
function closePwdModal(){let m=document.getElementById('pwdModal');if(m)m.style.display='none';}
async function doChangePwd(){
  let oldPw=document.getElementById('pwdOld').value,
      newPw=document.getElementById('pwdNew').value,
      cfm=document.getElementById('pwdConfirm').value;
  if(!oldPw||!newPw)return toast('请填写所有字段','error');
  if(newPw.length<4)return toast('新密码至少4位','error');
  if(newPw!==cfm)return toast('两次新密码不一致','error');
  let r=await api('/auth/password',{method:'PUT',body:JSON.stringify({old_password:oldPw,new_password:newPw})});
  if(r.code===0){toast('密码已修改');closePwdModal();}else toast(r.message,'error');
}
function toggleSection(key){
  const body=document.getElementById('sec-body-'+key);
  const icon=document.getElementById('sec-icon-'+key);
  if(!body)return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  icon.textContent=open?'▸':'▾';
}

async function confirmToggleActive(id,active,rowId){
  if(!confirm(active?'确认要禁用该产品吗？':'确认要启用该产品吗？'))return;
  const r=await api(`/system/products/${id}`,{method:'PUT',body:JSON.stringify({is_active:active})});
  if(r.code===0){
    toast(active?'已启用':'已禁用','success');
    // Update row in-place without full refresh
    const row=document.getElementById('pr-'+id);
    if(row){
      row.style.opacity=active?'':'0.6';
      // Update active badge
      const badgeEl=row.querySelector('.active-badge');
      if(badgeEl){badgeEl.textContent=active?'● 启用':'● 禁用';badgeEl.style.color=active?'#16a34a':'#dc2626';}
      // Update checkbox
      const cb=row.querySelector('input[type="checkbox"]');
      if(cb)cb.checked=active;
      // Update action buttons
      const btns=row.querySelectorAll('[data-action]');
      btns.forEach(b=>{const isActionBtn=b.tagName==='BUTTON'&&!b.getAttribute('onclick')?.startsWith('editProduct');b.disabled=!active;b.style.opacity=active?'':'0.35';b.style.cursor=active?'pointer':'not-allowed';});
    }
  }else{
    toast(r.message||'操作失败','error');
  }
}
