      rrEl.outerHTML = `<span class="data-detail-k">需重启</span><span style="font-size:12.5px">⚠️ 需要重启设备</span>`;
    }
  }).catch(() => {});

  console.log('[perf] toggle open — close:' + (t1-t0).toFixed(1) + 'ms data:' + (t3-t2).toFixed(1) + 'ms chain:' + (t4-t3).toFixed(1) + 'ms html:' + (t5-t4).toFixed(1) + 'ms insert:' + (t6-t5).toFixed(1) + 'ms total:' + (t6-t0).toFixed(1) + 'ms');
}

function dataRightGoto(sid, chainJson) {
  _dataSelectedSid = sid;
  _dataExpanded.add(sid);
  let targetChain = null;
  try { targetChain = JSON.parse(chainJson); } catch(e) { targetChain = []; }
  _dataSelectedChain = targetChain;
  _dataSelectedUrl = null;
  // Derive version & package type hints from the target chain's last node for right-panel filtering.
  // Match the FULL chain against paths to avoid ambiguity when multiple versions
  // share the same leaf name (e.g. several "入侵检测规则升级包" across versions
  // V2.0R00F01 / V2.0R00F05 / V2.0R00F06_CW would otherwise all match by leaf alone).
  const src = _dataAll[sid];
  let verHint = null, pkgHint = null;
  let targetPathId = null;
  if (src && targetChain && targetChain.length > 0) {
    const pt = src.package_type;
    if (pt && pt.paths) {
      const path = pt.paths.find(p =>
        Array.isArray(p.chain) &&
        p.chain.length === targetChain.length &&
        p.chain.every((seg, i) => seg === targetChain[i])
      );
      if (path && path.url) {
        // Backend attaches path_id to each path in /latest/snapshots; use it
        // directly to locate the snapshot row that belongs to *this* chain.
        // Without this, NSFocus's multi-chain-shared-URL structure would resolve
        // to the first matching snap (wrong chain) and feed would show wrong data.
        targetPathId = path.path_id || null;
        const snap = targetPathId
          ? (src.snapshots || []).find(s => s.path_id === targetPathId)
          : null;
        if (snap) {
          verHint = snap.version_branch || null;
          pkgHint = snap.package_type || null;
        }
      }
    }
  }
  _dataSelectedVerHint = verHint;
  _dataSelectedPkgHint = pkgHint;
  _dataSelectedPathId = targetPathId;
  _dataFeedPage = 1;
  // Do NOT call dataRenderLeft() — it rebuilds the DOM and wipes all expanded states.
  // Instead, directly manipulate the existing DOM: expand target card + tree path, then scroll.
  // The event delegation listener on #dataLeft is set up once in dataPage() and persists.
  setTimeout(() => {
    const card = document.getElementById('dpc_' + sid);
    if (!card) {
      // Card not yet in DOM — fall back to dataRenderLeft() for initial render
      dataRenderLeft();
      return;
    }

    // Expand the card body (tree container) via productCardToggle, then expand tree path
    const cardBody = card.querySelector('.card-bd');
    const wasHidden = cardBody && cardBody.style.display === 'none';
    if (wasHidden) {
      // Use the existing productCardToggle to expand the card body cleanly
      const targetId = cardBody.id;
      productCardToggle(targetId);
    }

    // Find the tree node whose data-chain matches targetChain
    const allNodes = card.querySelectorAll('[data-action="treeNode"]');
    let targetNode = null;
    if (targetChain && targetChain.length > 0) {
      allNodes.forEach(n => {
        try {
          const nc = JSON.parse(n.getAttribute('data-chain') || '[]');
          if (JSON.stringify(nc) === JSON.stringify(targetChain)) {
            targetNode = n;
          }
        } catch(e) {}
      });
    }

    if (targetNode) {
      // Expand all ancestor .tree-children so target is visible
      let parent = targetNode.parentElement;
      while (parent && !parent.classList.contains('card-bd')) {
        if (parent.classList.contains('tree-children') && parent.style.display === 'none') {
          treeToggleById(parent.id); // use the named toggle to keep arrow icons in sync
        }
        parent = parent.parentElement;
      }
      // Highlight the target node
      document.querySelectorAll('.tree-node-selected').forEach(el => el.classList.remove('tree-node-selected'));
      targetNode.classList.add('tree-node-selected');
      targetNode.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      // Highlight the parent card
      document.querySelectorAll('.card-selected').forEach(el => el.classList.remove('card-selected'));
      var pc = targetNode.closest('.card');
      if (pc) pc.classList.add('card-selected');
    } else if (card) {
      // No specific node but card found — highlight the card at least
      document.querySelectorAll('.card-selected').forEach(el => el.classList.remove('card-selected'));
      card.classList.add('card-selected');
    }
  }, 50);
  dataRenderRight();
}

async function dataShowDrill(sid, url, verHint, pkgHint) {
  const src = _dataAll[sid];
  if (!src) return;

  document.getElementById('dataAggView').classList.add('hidden');
  document.getElementById('dataPager').innerHTML = '';

  const MAP = { sys: '系统', rule: '规则', nti: '威胁情报', av: '病毒库', apprule: '应用规则', url: 'URL库', wcs: '恶意站点', judge: '研判', geo: '地理库', interface: '接口', special: '特殊', other: '其他', merge: '合并', client: '客户端', av_stream: '流式病毒库', test: '测试', engine: '引擎' };
  let snaps = src.snapshots || [];

  // Filter by exact URL when provided (leaf node)
  if (url) {
    snaps = snaps.filter(s => s.source_url === url);
  }
  // Filter by hints when provided (intermediate node)
  if (verHint) {
    snaps = snaps.filter(s => (s.version_branch || '') === verHint);
  }
  if (pkgHint) {
    snaps = snaps.filter(s => (s.package_type || '') === pkgHint);
  }

  const byVer = {};
  snaps.forEach(s => {
    const v = s.version_branch || '?';
    if (!byVer[v]) byVer[v] = [];
    byVer[v].push(s);
  });

  const versions = Object.keys(byVer).sort((a, b) => {
    const na = parseFloat(a), nb = parseFloat(b);
    if (!isNaN(na) && !isNaN(nb)) return nb - na;
    return b.localeCompare(a, 'zh');
  });

  let drillHtml = `<div class="data-drill">
    <div class="data-drill-hd">
      <button class="btn btn-xs btn-outline" onclick="dataBackToAgg()">← 返回列表</button>
      <span class="data-drill-title">📦 ${src.display_name || src.name}</span>
      <span style="color:var(--muted);font-size:12px;margin-left:12px">${snaps.length} 条记录 · ${versions.length} 个版本</span>
    </div>
    <div class="data-drill-body">`;

  versions.forEach(ver => {
    const verSnaps = byVer[ver].sort((a, b) => (b.last_seen_at || '').localeCompare(a.last_seen_at || ''));
    const isHighlight = ver === verHint;

    const hasRb = verSnaps.some(s => s.status === 'rollback');
    const hasNew = verSnaps.some(s => s.status === 'active' && !s.last_delivered_at);
    const latestCollected = verSnaps[0] ? fmtTZ(verSnaps[0].last_seen_at, true) : '—';
    const hasCritical = verSnaps.some(s => s.urgency === 'critical' && s.status === 'active');

    const verFlags = [];
    if (hasCritical) verFlags.push('<span class="badge badge-err" style="font-size:10px">🔴critical</span>');
    if (hasRb) verFlags.push('<span style="color:var(--danger);font-size:11px">含撤回</span>');
    if (hasNew) verFlags.push('<span style="color:var(--primary);font-size:11px">有未推送</span>');

    const byType = {};
    verSnaps.forEach(s => {
      const t = s.package_type || '?';
      if (!byType[t]) byType[t] = [];
      byType[t].push(s);
    });

    const typeKeys = Object.keys(byType).sort();
    const verKey = sid + '_' + ver;
    // Highlighted version: open by default
    const verBodyClass = isHighlight ? 'data-ver-body' : 'data-ver-body hidden';

    drillHtml += `<div class="data-ver-block ${isHighlight ? 'data-ver-highlight' : ''}" id="dvb_anchor_${escHtml(verKey)}">
      <div class="data-ver-hd" onclick="dataToggleVer(this, '${escHtml(verKey)}')">
        <span class="data-prod-arrow">${isHighlight ? '&#9660;' : '&#9658;'}</span>
        <span class="data-ver-label">${ver}</span>
        <span style="color:var(--muted);font-size:11px;margin-left:8px">${verSnaps.length}条 / ${typeKeys.length}种类型</span>
        <div style="display:flex;gap:6px;align-items:center;margin-left:auto">${verFlags.join('')}</div>
        <span style="color:var(--muted);font-size:11px;margin-left:8px">采集 ${latestCollected}</span>
      </div>
      <div class="${verBodyClass}" id="dvb_${escHtml(verKey)}">`;

    typeKeys.forEach(pkgType => {
      const typeSnaps = byType[pkgType].sort((a, b) => (b.published_at || '').localeCompare(a.published_at || ''));
      const latest = typeSnaps[0];
      const historyCount = typeSnaps.length - 1;
      const typeLabel = MAP[pkgType] || pkgType || '';
      const isLatestPkg = historyCount > 0; // multiple packages exist, this one is the latest by published_at
      const sz = latest.file_size > 1048576 ? (latest.file_size / 1048576).toFixed(1) + 'M' : (latest.file_size / 1024).toFixed(0) + 'K';
      const urg = latest.urgency === 'critical' ? 'badge-err' : latest.urgency === 'high' ? 'badge-warn' : 'badge-ok';
      const isRb = latest.status === 'rollback';
      const isNewPkg = latest.status === 'active' && !latest.last_delivered_at;
      const histKey = verKey + '_' + pkgType;

      drillHtml += `<div class="data-type-row ${isRb ? 'data-type-rollback' : ''}">
        <div class="data-type-main" onclick="dataToggleSnapDetail(this)">
          ${isNewPkg ? '<span class="data-pill-new-dot" style="margin-right:4px"></span>' : ''}
          ${isLatestPkg ? '<span class="badge badge-blue" style="font-size:10px;margin-right:4px">最新</span>' : ''}
          <span class="data-type-label">${typeLabel}</span>
          <span class="mono" style="color:var(--primary);font-size:12px">${(latest.file_name || '').substring(0, 35)}</span>
          <span style="color:var(--muted);font-size:11px">${fmtTZ(latest.published_at)}</span>
          <span class="badge ${urg}" style="font-size:10px">${latest.urgency || ''}</span>
          ${latest.last_delivered_at ? '<span style="font-size:11px;color:var(--success)" title="已推送">✅</span>' :
            (latest.status === 'active' ? '<span style="font-size:11px;color:var(--muted)" title="未推送">○</span>' : '')}
          <button class="btn btn-xs btn-success" style="margin-left:auto" onclick="event.stopPropagation();showPushModal(${latest.id},'${esc(src.name)}','${esc(ver)}','${esc(pkgType)}')">推送</button>
          ${historyCount > 0 ? `<span class="data-history-toggle" onclick="event.stopPropagation();dataToggleHistory(this,'${escHtml(histKey)}')">+${historyCount} 条历史 ▼</span>` : ''}
        </div>
        <div class="data-snap-detail hidden">${dataSnapDetailHtml(latest, MAP)}</div>
        ${historyCount > 0 ? `<div class="data-history hidden" id="dh_${escHtml(histKey)}">
          ${typeSnaps.slice(1).map(s => {
            const sz2 = s.file_size > 1048576 ? (s.file_size / 1048576).toFixed(1) + 'M' : (s.file_size / 1024).toFixed(0) + 'K';
            const urg2 = s.urgency === 'critical' ? 'badge-err' : s.urgency === 'high' ? 'badge-warn' : 'badge-ok';
            const isRb2 = s.status === 'rollback';
            return `<div class="data-hist-row ${isRb2 ? 'data-type-rollback' : ''}" onclick="this.classList.toggle('data-hist-expanded')">
              <span style="color:var(--muted);font-size:11px;width:130px;flex-shrink:0">${fmtTZ(s.published_at, true)}</span>
              <span class="mono" style="color:var(--primary);font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(s.file_name || '').substring(0, 30)}</span>
              <span class="badge ${urg2}" style="font-size:10px">${s.urgency || ''}</span>
              ${s.last_delivered_at ? '<span style="font-size:11px;color:var(--success)">✅</span>' : '<span style="font-size:11px;color:var(--muted)">○</span>'}
              <button class="btn btn-xs btn-success" style="margin-left:4px" onclick="event.stopPropagation();showPushModal(${s.id},'${esc(src.name)}','${esc(ver)}','${esc(pkgType)}')">推送</button>
              <div class="data-snap-detail hidden">${dataSnapDetailHtml(s, MAP)}</div>
            </div>`;
          }).join('')}
        </div>` : ''}
      </div>`;
    });

    drillHtml += `</div></div>`;
  });

  drillHtml += `</div></div>`;
  document.getElementById('dataDrillView').innerHTML = drillHtml;
  document.getElementById('dataDrillView').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'instant' });
  // Scroll to highlighted version block if one was specified
  if (verHint) {
    const anchor = document.getElementById('dvb_anchor_' + verHint.replace(/\\/g, '\\\\'));
    if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function switchPushTab(tab){

  const botBtn=document.getElementById('pushTabBotBtn');
  const emailPanel=document.getElementById('pushTabEmail');
  const botPanel=document.getElementById('pushTabBot');

function switchRecipientMode(mode){
  _pushRecipientMode=mode;
  document.getElementById('pushCustomerList').classList.toggle('hidden',mode!=='customer');
  document.getElementById('pushManualInput').classList.toggle('hidden',mode!=='manual');
  if(mode==='manual'){
    const saved=localStorage.getItem('pushModalLastManualEmail')||'';
    const input=document.getElementById('pushEmail');
    if(input && !input.value && saved){ input.value=saved; }
    onPushEmailChange();
  }
  updatePushConfirmState();

function onPushEmailChange(){
  const input=document.getElementById('pushEmail');
  const v=(input?.value||'').trim();
  _pushManualEmail=v;
  const hint=document.getElementById('pushEmailHint');
  if(!v){hint.textContent='';updatePushConfirmState();return;}
  const emails=v.split(/[,\n]/).map(e=>e.trim()).filter(Boolean);
  const re=/^[^@\s]+@[^@\s]+\.[^@\s]+$/;
  const bad=emails.filter(e=>!re.test(e));
  if(bad.length){hint.textContent='⚠️ 格式无效: '+bad.join(', ');hint.style.color='var(--danger)';}
  else{hint.textContent='✅ '+emails.length+' 个邮箱';hint.style.color='var(--success)';}
  updatePushConfirmState();
}

function onCustomerCheck(cb){
  const id=parseInt(cb.dataset.custid);
  const email=cb.dataset.email;
  if(cb.checked){ _pushSelectedCustomers.add(id+'|'+email); }
  else{ _pushSelectedCustomers.delete(id+'|'+email); }
  updatePushConfirmState();
}

function onBotChannelCheck(rb){
  _pushBotChannelId=parseInt(rb.value);
  updatePushConfirmState();
}

function updatePushConfirmState(){
  const btn=document.getElementById('pushConfirmBtn');
  if(!btn) return;
  let ready=false;
  if(_pushTab==='email'){
    let hasRecipients=false;
    if(_pushRecipientMode==='customer'){
      hasRecipients=_pushSelectedCustomers.size>0;
    }else{
      const emails=_pushManualEmail.split(/[,\n]/).map(e=>e.trim()).filter(Boolean);
      const re=/^[^@\s]+@[^@\s]+\.[^@\s]+$/;
      hasRecipients=emails.length>0 && emails.every(e=>re.test(e));
    }
    ready=hasRecipients && _pushChannelId>0;
  }else{
    ready=_pushBotChannelId>0;
  }
  btn.disabled=!ready;
}

async function confirmPush(){
  const btn=document.getElementById('pushConfirmBtn');
  btn.disabled=true;btn.textContent='推送中...';
  try{
    let r;
    if(_pushTab==='email'){
      if(!_pushChannelId)return toast('请选择 SMTP 渠道','error');
      let recipients=[];
      if(_pushRecipientMode==='customer'){
        recipients=Array.from(_pushSelectedCustomers).map(s=>s.split('|')[1]).filter(Boolean);
        if(!recipients.length)return toast('请至少选择一个客户','error');
      }else{
        recipients=_pushManualEmail.split(/[,\n]/).map(e=>e.trim()).filter(Boolean);
        if(!recipients.length)return toast('请输入邮箱','error');
        try{localStorage.setItem('pushModalLastManualEmail', _pushManualEmail);}catch(e){}
      }
      r=await api('/history/'+_pushSid+'/email-push',{method:'POST',body:JSON.stringify({channel_id:_pushChannelId, recipients})});
    }else{
      if(!_pushBotChannelId)return toast('请选择渠道','error');
      r=await api('/history/'+_pushSid+'/push',{method:'POST',body:JSON.stringify({mode:'channel', target_id:_pushBotChannelId})});
    }
    if(r.code===0){
      showPushResult(r.data||{}, true);
      closePushModal();
    }else if(r.code===42900){
      let sec=r.data?.retry_after||600;toast(r.message,'error');startBanCountdown(sec);
    }else{
      if(r.data){ showPushResult(r.data, false); }
      else{ toast(r.message||'推送失败','error'); }
      btn.disabled=false;btn.textContent='确认推送';
    }
  }catch(e){toast('推送失败','error');btn.disabled=false;btn.textContent='确认推送';}
}

// Issue #6: structured push result toast with per-channel status
function showPushResult(data, success){
  const results = data.results || [];
  if(!results.length){
    toast(data.message || (success ? '已推送' : '推送失败'), success ? 'success' : 'error');
    return;
  }
  // Build HTML list
  const lines = results.map(r => {
    const ok = r.success;
    const icon = ok ? '✓' : '✗';
    const color = ok ? 'var(--success)' : 'var(--danger)';
    const logBtn = (!ok && r.log_path)
      ? ` <a href="#" onclick="showPushLogByPath(${JSON.stringify(r.log_path)},${JSON.stringify(r.channel||'')});return false;" style="color:var(--primary);font-size:11px;margin-left:6px">📋 日志</a>`
      : '';
    return `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:12px;color:#ffffff">
      <span style="font-weight:600">${icon}</span>
      <span>${escHtml(r.channel||'')}</span>
      ${r.error ? `<span style="color:rgba(255,255,255,.7);font-size:11px">${escHtml(r.error)}</span>` : ''}
      ${logBtn}
    </div>`;
  }).join('');
  const head = success
    ? `<div style="font-weight:700;color:#ffffff;margin-bottom:4px">推送完成</div>`
    : `<div style="font-weight:700;color:#ffffff;margin-bottom:4px">推送失败</div>`;
  showRichToast(head + lines, success ? 'success' : 'error', 8000);
}

// Rich HTML toast (replaces text-only toast for structured results).
// Inline styles fully override the global .toast class because CSS class
// rules like `white-space:nowrap; overflow:hidden; max-width:90vw` would
// otherwise chop off the multi-line push result content (the "推送完成"
// header and the per-channel list rows). We re-center using left:50% +
// transform:translateX(-50%) since the .toast class only provides centering
// for single-line text and our HTML has multiple lines.
function showRichToast(html, type, durationMs){
  const e=document.createElement('div');
  e.className=`toast toast-${type}`;
  e.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:500;padding:12px 18px;border-radius:8px;z-index:99999;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:fadeDown .2s ease;white-space:normal;max-width:520px;min-width:240px;overflow:visible;text-align:left;line-height:1.5';
  e.innerHTML=html;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(), durationMs||4000);
}
function startBanCountdown(seconds){
  let btn=document.getElementById('pushConfirmBtn');if(!btn)return;
  btn.disabled=true;
  function tick(){let m=Math.floor(seconds/60),s=seconds%60;btn.textContent=`已禁用 ${m}:${String(s).padStart(2,'0')}`;if(seconds<=0){btn.disabled=false;btn.textContent='确认推送';if(_banTimer){clearInterval(_banTimer);_banTimer=null;}return;}seconds--;}
  tick();_banTimer=setInterval(tick,1000);
}

function onEmailTmplChange(){
  const k=document.getElementById('chtmpl')?.value;
  if(!k) return;
  const p=EMAIL_PROVIDERS[k];
  if(!p) return;
  // Autofill host/port, but only if those fields are empty or still match a
  // previous template's defaults — never clobber the user's manual edits.
  const sh=document.getElementById('sh');
  const sp=document.getElementById('sp');
  if(sh && (sh.value==='' || Object.values(EMAIL_PROVIDERS).some(x=>x.host===sh.value))){
    sh.value=p.host;
  }
  if(sp){
    sp.value=p.port;
  }
  // SSL is the default encryption for all built-in templates
  const senc=document.getElementById('senc');
  if(senc){ senc.value='ssl'; }
  // Update user input placeholder to suggest the right format per provider
  const su=document.getElementById('su');
  if(su && p.user_ph && !su.value){
    su.placeholder=p.user_ph;
  }
  const hint=document.getElementById('emailTmplHint');
  if(hint) hint.textContent=p.hint||'';
}

// Switch port when encryption mode changes
function onEmailEncChange(){
  const enc=document.getElementById('senc')?.value;
  const sp=document.getElementById('sp');
  if(!enc || !sp) return;
  if(enc==='ssl'){ sp.value=465; }
  else if(enc==='starttls'){ sp.value=587; }
}

// Detect when user manually edits the SMTP host and sync the template dropdown
function _onEmailHostChange(){
  const host=document.getElementById('sh')?.value||'';
  const matched=_matchEmailProvider(host);
  const sel=document.getElementById('chtmpl');
  if(sel && sel.value!==matched){
    sel.value=matched;
    const p=EMAIL_PROVIDERS[matched];
    const su=document.getElementById('su');
    if(su && p?.user_ph && !su.value){ su.placeholder=p.user_ph; }
    const hint=document.getElementById('emailTmplHint');
    if(hint) hint.textContent=p?.hint||'';
  }
}

        let enc=(c.config||{}).smtp_encryption;

          enc=((c.config||{}).smtp_port===465) ? 'ssl' : 'starttls';

async function saveCh(){
  const t=document.getElementById('cht').value,n=document.getElementById('chn').value.trim();
  if(!n){toast('请输入渠道名称','error');return}
  let c={},eh=0,ed=0;
  if(t==='email'){
    const pw=document.getElementById('sw')?.value||'';
    c={
      smtp_host:document.getElementById('sh')?.value||'',
      smtp_port:parseInt(document.getElementById('sp')?.value||'465'),
      smtp_encryption:document.getElementById('senc')?.value||'ssl',
      smtp_user:document.getElementById('su')?.value||'',
      smtp_password:pw||(_origChConfig.smtp_password||''),
      from_name:document.getElementById('sf')?.value||'绿盟升级通知',
    };
    if(c.smtp_encryption!=='ssl' && c.smtp_encryption!=='starttls'){
      toast('加密方式仅支持 SSL 或 STARTTLS','error');return;
    }
    eh=parseInt(document.getElementById('seh')?.value)||0;
    ed=parseInt(document.getElementById('sed')?.value)||0;
    // Recipients no longer configured at channel level — they're set on
    // subscription rules (customer_emails) or specified per manual push.
    // Strip any legacy to_list so the channel config reflects the new model.
    if(!editingChId){ c.to_list=[]; }
    if(!c.smtp_host||!c.smtp_user){toast('请填写 SMTP 服务器和用户','error');return}
    if(!c.smtp_user.includes('@')){toast('用户名必须是完整邮箱地址(含 @domain 后缀),如 user@163.com','error');return}
  }else{
    const wu=document.getElementById('cw')?.value||'';
    if(wu&&_origChConfig.webhook_url&&wu===_maskWebhook(_origChConfig.webhook_url))wu=_origChConfig.webhook_url;
    c={webhook_url:wu||(_origChConfig.webhook_url||''),secret:document.getElementById('cs')?.value||(_origChConfig.secret||'')}
  }
  let r;
  if(editingChId){r=await api('/channels/'+editingChId,{method:'PUT',body:JSON.stringify({name:n,config:c,email_hourly_limit:eh,email_daily_limit:ed})})}
  else{r=await api('/channels',{method:'POST',body:JSON.stringify({name:n,type:t,config:c,email_hourly_limit:eh,email_daily_limit:ed})})}
  if(r.code===0){toast(editingChId?'已更新':'已添加');editingChId=0;document.getElementById('chModalWrap')?.remove();channels();}
  else toast(r.message,'error')
}

// 链选择器：节点点击 toggle 选中（全局函数，供 inline onclick 调用）
// nodeEl: 被点击的 tree-node div 元素
function csTreeNodeClick(nodeEl) {
  const chain = JSON.parse(nodeEl.getAttribute('data-chain') || '[]');
  const url = nodeEl.getAttribute('data-url') || '';
  const isLeafNode = nodeEl.getAttribute('data-is-leaf') === '1';
  const match = isLeafNode ? 'leaf' : 'subtree';
  const chainKey = JSON.stringify(chain);

  // 冲突检测：检查新 chain 与已选项是否有父子重叠
  for (const existing of window._condChains) {
    const existKey = JSON.stringify(existing.chain);
    if (existKey === chainKey) continue; // 取消选择不触发冲突
    // 新 chain 是否包含已选 chain（选了父，但子已存在）
    if (chain.length > existing.chain.length &&
        JSON.stringify(chain.slice(0, existing.chain.length)) === existKey) {
      nodeEl.setAttribute('data-conflict', '1');
      setTimeout(() => nodeEl.removeAttribute('data-conflict'), 2000);
      return;
    }
    // 已选 chain 是否包含新 chain（选了子，但父已存在）
    if (existing.chain.length > chain.length &&
        JSON.stringify(existing.chain.slice(0, chain.length)) === chainKey) {
      nodeEl.setAttribute('data-conflict', '1');
      setTimeout(() => nodeEl.removeAttribute('data-conflict'), 2000);
      return;
    }
  }

  const idx = window._condChains.findIndex(c => JSON.stringify(c.chain) === chainKey);
  if (idx >= 0) {
    window._condChains.splice(idx, 1);
    nodeEl.setAttribute('data-sel', '0');
    nodeEl.style.background = '';
  } else {
    window._condChains.push({ chain, match });
    nodeEl.setAttribute('data-sel', '1');
    nodeEl.style.background = '#dbeafe';
  }
  const rightDiv = document.getElementById('chainSelRight');
  if (rightDiv) {
    rightDiv.innerHTML = `<div style="font-weight:600;font-size:13px;margin-bottom:8px">已选路径（${window._condChains.length}）</div>` + renderChainSelList(window._condChains);
  }
}

function buildChainSelectTree(pt, snapshotsMap, MAP, verTypeMap, alias, sid, selectedSet) {
  const paths = pt.paths || [];
  if (paths.length === 0) return '';

  // 构建树结构（同 buildDataTreeHtml）
  const root = {};
  paths.forEach((p, pathIdx) => {
    const chain = p.chain || [];
    if (chain.length < 2) return;
    let node = root;
    let accChain = [];
    chain.forEach((name, idx) => {
      if (!node.__children) node.__children = {};
      if (!node.__children[name]) node.__children[name] = {
        __children: {}, __isPkg: false, __pathId: '', __chain: [], __pathIdx: -1
      };
      node = node.__children[name];
      node.__chain = accChain.concat([name]);
      node.__pathIdx = pathIdx;
      if (idx === chain.length - 1) {
        node.__isPkg = true;
        node.__pathId = p.url || '';
      }
      accChain = node.__chain;
    });
  });

  function renderNode(node, name, depth) {
    const indent = depth * 16;
    const children = node.__children ? Object.entries(node.__children) : [];
    const hasChildren = children.length > 0;
    const isPkg = node.__isPkg;
    const chainJson = JSON.stringify(node.__chain || []).replace(/"/g, '&quot;');
    const nodeUrl = node.__pathId || '';
    const chainKey = JSON.stringify(node.__chain);
    const isSelected = selectedSet.has(chainKey);

    const icon = isPkg ? '&#128196;' : (hasChildren ? '&#128193;' : '&#128196;');
    const label = isPkg ? name : (MAP[name] || name);
    const childCount = hasChildren ? ` <span style="color:#94a3b8;font-size:11px">(${children.length})</span>` : '';
    const selClass = isSelected ? ' style="background:#dbeafe;border-radius:4px"' : '';
    const childDivId = hasChildren ? ('cst_' + sid + '_' + depth + '_' + name.replace(/\W/g, '_')) : null;
    const arrow = hasChildren
      ? `<span onclick="csTreeToggleById('${childDivId}', this); event.stopPropagation();" style="cursor:pointer;color:#94a3b8;font-size:13px;user-select:none;flex-shrink:0;margin-right:4px">&#9658;</span>`
      : `<span style="width:13px;flex-shrink:0;margin-right:4px"></span>`;

    const isLeafNode = !hasChildren;
    const leafAttr = ' data-is-leaf="' + (isLeafNode ? '1' : '0') + '"';
    let html = `<div class="tree-node"${leafAttr} data-chain="${chainJson}" data-url="${nodeUrl}" onclick="csTreeNodeClick(this); event.stopPropagation();" style="padding-left:${indent}px;display:flex;align-items:center;padding-top:4px;padding-bottom:4px;min-height:28px;cursor:pointer"${selClass}>`;
    html += arrow;
    html += `<span style="font-size:13px;color:#334155;flex-shrink:0">${icon} ${escHtml(label)}${childCount}</span>`;
    html += `</div>`;

    if (hasChildren) {
      html += `<div id="${childDivId}" class="tree-children" data-target="${childDivId}" style="display:none">`;
      children.forEach(([childName, childNode]) => { html += renderNode(childNode, childName, depth + 1); });
      html += `</div>`;
    }
    return html;
  }

  let html = '';
  const rootChildren = root.__children ? Object.entries(root.__children).sort(([a], [b]) => {
    const aV = /\d/.test(a); const bV = /\d/.test(b);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    return a.localeCompare(b, 'zh');
  }) : [];
  // 产品名作为可折叠分组头
  const prodLabel = `<div style="font-weight:700;font-size:13px;color:#1e40af;padding:6px 4px 4px;border-bottom:1px solid #e2e8f0;margin-bottom:4px">${escHtml(alias || String(sid))}</div>`;
  // 始终从真实根节点开始渲染，保持完整的链层级深度
  html += prodLabel;
  rootChildren.forEach(([name, node]) => { html += renderNode(node, name, 0); });
  return html;
}

// 事件委托：链选择器树节点点击
document.addEventListener('click', function(e) {
  // 链选择器模态框内的树节点点击
  const csNode = e.target.closest('[data-action="csTreeNode"]');
  if (csNode) {
    const chainStr = csNode.getAttribute('data-chain');
    const isLeaf = csNode.getAttribute('data-isleaf') === '1';
    const chain = JSON.parse(chainStr || '[]');
    const isSelected = csNode.getAttribute('data-sel') === '1';
    // Toggle: 选中→取消，取消→选中
    const newSel = isSelected ? '0' : '1';
    csNode.setAttribute('data-sel', newSel);
    csNode.style.background = newSel === '1' ? '#dbeafe' : '';
    // 更新选中集合（用 Set 存 chain JSON 字符串）
    if (!window._csSelectedSet) window._csSelectedSet = new Set();
    if (newSel === '1') {
      window._csSelectedSet.add(chainStr);
    } else {
      window._csSelectedSet.delete(chainStr);
    }
    e.stopPropagation();
    return;
  }
  // 链选择器模态框内的折叠箭头点击
  const csToggle = e.target.closest('[data-action="csTreeToggle"]');
  if (csToggle) {
    const targetId = csToggle.getAttribute('data-target');
    const children = document.getElementById(targetId);
    if (children) {
      const hidden = children.style.display === 'none' || children.style.display === '';
      children.style.display = hidden ? 'block' : 'none';
      csToggle.innerHTML = hidden ? '&#9660;' : '&#9658;';
    }
    return;
  }
});

// 渲染已选路径列表（在链选择器右侧面板）
function renderChainSelList(chains) {
  if (!chains || chains.length === 0) {
    return '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">未选择路径</div>';
  }
  return chains.map((c, i) => {
    const pathStr = c.chain.join(' › ');
    const isLeaf = c.match !== 'subtree';
    const matchHtml = isLeaf
      ? `<span style="font-size:10px;padding:2px 6px;background:#dbeafe;color:#1e40af;border-radius:8px;font-weight:600">leaf（仅当前节点）</span>`
      : `<span style="font-size:10px;padding:2px 6px;background:#fef3c7;color:#92400e;border-radius:8px;font-weight:600">sub（包含子节点）</span>`;
    return `<div style="display:flex;align-items:center;gap:6px;padding:6px 4px;border-bottom:1px solid #f0f0f0;font-size:12px;flex-wrap:wrap">
      <span style="flex:1;min-width:0;color:#334155;word-break:break-all">${escHtml(pathStr)}</span>
      ${matchHtml}
      <button onclick="removeChainCond(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:0 2px">×</button>
    </div>`;
  }).join('');
}

// 移除单个路径条件
function removeChainCond(idx) {
  const removed = window._condChains.splice(idx, 1);
  if (removed.length) {
    const chain = removed[0].chain;
    const chainKey = JSON.stringify(chain);
    // C2-1: 同步清理 _csSelectedSet，避免树节点状态残留
    window._csSelectedSet.delete(chainKey);
    // 取消树的该节点高亮
    const safeChainKey = chainKey.replace(/"/g, '&quot;');
    const node = document.querySelector('.tree-node[data-chain="' + safeChainKey + '"]');
    if (node) { node.setAttribute('data-sel', '0'); node.style.background = ''; }
  }
  renderCondPills();
  // 同时更新右侧面板
  const rightDiv = document.getElementById('chainSelRight');
  if (rightDiv) {
    rightDiv.innerHTML = `<div style="font-weight:600;font-size:13px;margin-bottom:8px">已选路径（${window._condChains.length}）</div>` + renderChainSelList(window._condChains);
  }
}

// 渲染订阅条件区的路径标签（在主表单的 rconds div 中）
function renderCondPills() {
  const container = document.getElementById('rconds');
  if (!container) return;
  const chains = window._condChains || [];
  const empty = document.getElementById('rcondsEmpty');
  if (chains.length === 0) {
    if (empty) empty.style.display = '';
    container.querySelectorAll('.cond-pill').forEach(el => el.remove());
    return;
  }
  if (empty) empty.style.display = 'none';
  // 保留 empty div，删掉所有 pill
  container.querySelectorAll('.cond-pill').forEach(el => el.remove());
  chains.forEach((c, i) => {
    const pathStr = c.chain.join(' › ');
    const isLeaf = c.match !== 'subtree';
    const matchLabel = isLeaf ? 'leaf' : 'sub';
    const pill = document.createElement('div');
    pill.className = 'cond-pill';
    pill.style = 'display:inline-flex;align-items:center;gap:6px;padding:4px 8px;background:#e8f0fe;border:1px solid #c2d8fc;border-radius:20px;font-size:12px;margin:0 4px 4px 0';
    pill.innerHTML = `<span style="color:#1e40af;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(pathStr)}">${escHtml(pathStr)}</span>
      <span style="background:${isLeaf ? '#dbeafe' : '#fef3c7'};color:${isLeaf ? '#1e40af' : '#92400e'};font-size:10px;padding:1px 5px;border-radius:8px;font-weight:600">${matchLabel}</span>
      <button onclick="removeCondPill(${i})" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;line-height:1;padding:0">×</button>`;
    container.appendChild(pill);
  });
}

function validateRuleConf(){
  // 窗口策略：汇总模式下勾选启用时，必须配置时间段
  const enWin=document.getElementById('rwin')?.checked;
  const dm=document.getElementById('rdm').value;
  if(enWin && dm){
    const winStart=document.getElementById('winStart').value;
    const winEnd=document.getElementById('winEnd').value;
    if(!winStart||!winEnd){return {valid:false,message:'窗口策略必须配置时间段',type:'block'};}
  }
  return {valid:true};
}async function saveRule(){
  let id=document.getElementById('rid').value;
  const vc=validateRuleConf();
  if(vc.type==='block'){toast(vc.message,'error');return;}
  let chs=window._selChans||[];
  let cid=parseInt(document.getElementById('rcust').value)||0;
  if(!cid)return toast('请选择关联客户','error');
  const isAll=document.getElementById('rall').checked;
  const fc=isAll?{}:{chains:window._condChains||[]};
  const emails=document.getElementById('remails')?.value.trim()||'';
  const attMb=parseInt(document.getElementById('ratt')?.value)||0;
  const nrr=document.getElementById('rnr')?.checked?1:0;
  let d={name:document.getElementById('rnm').value,filter_conditions:fc,delay_days:parseInt(document.getElementById('rdl').value)||0,digest_mode:document.getElementById('rdm').value,valid_until:document.getElementById('rvu').value,customer_id:cid,channels:chs,notify_rollback:nrr,customer_emails:emails,attachment_max_mb:attMb};
  const dm=d.digest_mode;
  if(dm){
    let dc={};
    if(dm==='weekly'){const el=document.getElementById('dc-weekday');dc.weekday=el?parseInt(el.value):6;}
    else if(dm==='monthly'){const el=document.getElementById('dc-month');dc.month_day=el?(el.value==='last'?'last':parseInt(el.value)):'last';}
    else if(dm==='quarterly'){const el=document.getElementById('dc-quarter');dc.quarter_day=el?el.value:'last';}
    d.digest_config=dc;
  }
  // 窗口配置：仅汇总模式可配置（勾选启用时）
  if(document.getElementById('rwin')?.checked && dm){
    const start=document.getElementById('winStart').value;
    const end=document.getElementById('winEnd').value;
    d.window_config={start,end}; // 汇总模式：只限制时间段
  }
  let r=id?await api('/subscriptions/'+id,{method:'PUT',body:JSON.stringify(d)}):await api('/subscriptions',{method:'POST',body:JSON.stringify(d)});
  if(r.code===0){toast('已保存');document.getElementById('rModalWrap')?.remove();subscriptions();}else toast(r.message,'error');
}async function delRule(id){await confirmAct('删除此订阅规则？', async ()=>{const r=await api('/subscriptions/'+id,{method:'DELETE'});if(r.code===0){toast('已删除');subscriptions();}else toast(r.message,'error');}, '🗑️', '删除');}

async function history(){

  const r=await api('/history?limit=200&days='+days);const list=r.data?.items||[];
  // Group by time batch (minute-level) for aggregation
  let batches={};
  list.forEach(h=>{
    let dels=h.deliveries||[];
    let batchKey=fmtTZ(h.pushed_at||h.first_seen_at||'',true);
    if(!batches[batchKey])batches[batchKey]={time:batchKey,packages:[],customers:new Set(),channels:new Set(),totalOk:0,totalFail:0};
    let b=batches[batchKey];
    b.packages.push(h);
    dels.forEach(d=>{
      if(d.customer_name)b.customers.add(d.customer_name);
      if(d.channel_name)b.channels.add(d.channel_name);

      <td>${custList}</td>
      <td></td>
    </tr>`;

      let dels=h.deliveries||[];

        html+=`<tr style="background:#f8f8f8"><td></td><td>—</td><td>${h.product_name||''}</td><td>${h.version_branch||''}</td><td>${typeCN(h.package_type)}</td><td class="mono">${(h.file_name||'').substring(0,30)}</td><td class="mono">${(h.package_version||'').substring(0,15)}</td><td><span class="badge badge-${h.urgency==='critical'?'err':h.urgency==='high'?'warn':'ok'}">${h.urgency||''}</span></td><td>—</td><td>—</td></tr>`;
      }else{
        dels.forEach(d=>{
          html+=`<tr style="background:#f8f8f8">
            <td></td>
            <td>${d.customer_name||'—'}</td>
            <td>${h.product_name||''}</td>
            <td>${h.version_branch||''}</td>
            <td>${typeCN(h.package_type)}</td>
            <td class="mono">${(h.file_name||'').substring(0,30)}</td>
            <td class="mono">${(h.package_version||'').substring(0,15)}</td>
            <td><span class="badge badge-${h.urgency==='critical'?'err':h.urgency==='high'?'warn':'ok'}">${h.urgency||''}</span></td>
            <td>${d.customer_name||'—'} ${d.delivery_status==='sent'?'✅':'❌'}</td>
            <td>${d.channel_id?`<button class="btn btn-xs btn-outline" onclick="resendTargeted(${h.id},${d.channel_id},${d.customer_id||0})">重推</button>`:''}</td>
          </tr>`;
        });

  });
  document.getElementById('app').innerHTML=`<div class="card"><div class="card-hd">📜 推送历史 <span style="margin-left:auto;font-size:12px;font-weight:400;color:var(--muted);display:flex;align-items:center;gap:8px"><select onchange="let d=this.value;location.hash='history?days='+d;history()" style="padding:3px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px"><option value="1" ${days==='1'?'selected':''}>近1天</option><option value="3" ${days==='3'?'selected':''}>近3天</option><option value="7" ${days==='7'?'selected':''}>近7天</option><option value="30" ${days==='30'?'selected':''}>近30天</option><option value="90" ${days==='90'?'selected':''}>近90天</option><option value="365" ${days==='365'?'selected':''}>近1年</option><option value="0" ${days==='0'?'selected':''}>全部</option></select><a href="#" onclick="history()">刷新</a><a href="#" onclick="let all=document.querySelectorAll('#app tbody');let vis=all[0]?.classList.contains('hidden');all.forEach(t=>vis?t.classList.remove('hidden'):t.classList.add('hidden'));document.querySelectorAll('.arrow').forEach(a=>a.textContent=vis?'▼':'▶');return false">全部展开/折叠</a><button class="btn btn-xs btn-outline" style="color:var(--danger);border-color:var(--danger)" onclick="confirmClearHistory()">🗑 清空</button></span></div><div class="card-bd pt0"><table><tr><th style="width:140px">时间</th><th>客户</th><th>产品</th><th>版本</th><th>类型</th><th>文件名</th><th>包版本</th><th>紧急度</th><th>客户</th><th>操作</th></tr>${html||'<tr><td colspan="10" class="empty">暂无推送记录</td></tr>'}</table></div></div>`;}

function _renderRecentDeliveries(deliveries,range){
  if(!deliveries||!deliveries.length)return '';
  const ranges={1:'1天',7:'7天',30:'1个月',365:'1年'};
  let btns=Object.entries(ranges).map(([v,l])=>`<button class="btn btn-xs ${range===v?'btn-primary':'btn-outline'}" onclick="dashboard('${v}')">${l}</button>`).join('');
  // Aggregate: group by customer+product+type
  let agg={};
  deliveries.forEach(d=>{
    let key=`${d.customer_name||'—'}|${d.product_name}|${d.package_type}`;
    if(!agg[key])agg[key]={cust:d.customer_name||'—',prod:d.product_name,pkg:d.package_type,channels:new Set(),count:0,last:d.sent_at,status:d.delivery_status};
    agg[key].count++;
    agg[key].channels.add(d.channel_name||d.channel_type);
    if(d.sent_at>agg[key].last)agg[key].last=d.sent_at;
  });
  let rows=Object.values(agg).sort((a,b)=>b.last.localeCompare(a.last)).slice(0,15).map(a=>{
    let stIcon=a.status==='sent'?'✅':'❌';
    return `<tr><td>${a.cust}</td><td>${a.prod}</td><td>${typeCN(a.pkg)}</td><td>${a.count}次</td><td>${[...a.channels].join(', ')}</td><td>${a.last?fmtTZ(a.last,true):''}</td></tr>`;
  }).join('');
  return `<div class="card" style="margin-top:14px"><div class="card-hd">📨 最近推送明细 <span style="margin-left:auto;font-weight:400">${btns}</span></div><div class="card-bd pt0"><table><tr><th>客户</th><th>产品</th><th>类型</th><th>次数</th><th>渠道</th><th>最近</th></tr>${rows||'<tr><td colspan="6" class="empty">暂无</td></tr>'}</table></div></div>`;
}

// 自动发现 banner — 仅在产品管理页面显示，支持手动关闭/重新打开
// 由 products() 和 MutationObserver 触发
let _discObs;
function _initDiscObserver(){
  if(_discObs) return;
  const app=document.getElementById('app');
  if(!app) return;
  _discObs=new MutationObserver(()=>{ _checkDiscBanner(); });
  _discObs.observe(app,{childList:true});
}
function _checkDiscBanner(){
  // 只在产品管理页面处理
  const isProductsPage=document.getElementById('disc-area')||document.querySelector('[data-page="products"]');
  if(!isProductsPage) return;
  // 每次进入产品页都清除隐藏状态，保证切页回来能重新显示
  window._discBannerHidden=false;
  window._discTimer && clearInterval(window._discTimer);
  api('/system/products/discover/status').then(s=>{
    if(s.code===0 && s.data?.active){
      _showDiscBanner(s.data);
    } else if(s.code===0 && s.data?.phase==='done' && (window._discLastDone || s.data.result)){
      // 页面刷新后 window._discLastDone 丢失，优先用 is_stale 标记提示用户
      if(s.data.is_stale){
        // 服务重启恢复：保存结果到内存，按钮变为待确认状态，等用户点击按钮再显示弹窗
        window._pendingDiscResult=s.data.result;
        window._pendingDiscStale=true;
      } else if(window._discLastDone){
        showDiscoverResult(window._discLastDone);
      }
      window._discLastDone=null;
    }
  });
}
function _hideDiscBanner(){
  clearInterval(window._discTimer);
  const b=document.getElementById('disc-banner');
  if(b) b.remove();
  // 显示一个小悬浮按钮，点击恢复 banner
  if(document.getElementById('disc-mini-btn')) return;
  const mini=document.createElement('div');
  mini.id='disc-mini-btn';
  mini.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border-radius:24px;padding:8px 16px;box-shadow:0 4px 16px rgba(124,58,237,0.4);z-index:3000;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px';
  mini.innerHTML='<span style="font-size:15px">🔍</span><span>自动发现进行中…</span>';
  mini.onclick=async()=>{
    mini.remove();
    const s=await api('/system/products/discover/status');
    if(s.code===0 && s.data?.active) _showDiscBanner(s.data);
  };
  document.body.appendChild(mini);
}
function _showDiscBanner(state){
  const existing=document.getElementById('disc-banner');
  if(existing) existing.remove();
  const phaseNames={
    'scanning_products':'🔍 扫描产品列表…',
    'discovering_pkg_types':`📦 发现包类型 (${state.progress||0}/${state.total||0})…`,
    'done':'✅ 发现完成',
    'error':'❌ 发现出错',
  };
  const pct=state.phase==='scanning_products'?30:
    state.phase==='discovering_pkg_types' && state.total?
      Math.round((state.progress/state.total)*65)+30:0;
  const banner=document.createElement('div');
  banner.id='disc-banner';
  banner.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border-radius:10px;padding:10px 20px;box-shadow:0 8px 32px rgba(124,58,237,0.4);z-index:3000;min-width:320px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px';
  banner.innerHTML=`
    <div style="flex:1">
      <div style="font-weight:600;margin-bottom:4px">🔍 自动发现任务进行中</div>
      <div id="disc-banner-phase" style="opacity:0.9;font-size:12px">${phaseNames[state.phase]||state.phase||''}</div>
      <div style="margin-top:6px;height:3px;background:rgba(255,255,255,0.25);border-radius:2px">
        <div id="disc-banner-bar" style="height:100%;background:#fff;border-radius:2px;transition:width 0.4s;width:${pct}%"></div>
      </div>
    </div>
    <div onclick="event.stopPropagation();_showDiscLogFloat()" style="background:rgba(255,255,255,0.2);border-radius:6px;padding:4px 10px;font-size:12px;white-space:nowrap">📋 日志</div>
    <div onclick="event.stopPropagation();_reopenDiscModal()" style="background:rgba(255,255,255,0.2);border-radius:6px;padding:4px 10px;font-size:12px;white-space:nowrap">查看</div>
    <div onclick="event.stopPropagation();_hideDiscBanner()" style="background:rgba(255,255,255,0.15);border-radius:6px;padding:4px 8px;font-size:14px;color:rgba(255,255,255,0.7);cursor:pointer;line-height:1;margin-left:4px" title="关闭">×</div>`;
  banner.onclick=_reopenDiscModal;
  document.body.appendChild(banner);

  let done=false;
  window._discTimer=setInterval(async()=>{
    if(done) return;
    const s=await api('/system/products/discover/status');
    if(s.code===0){
      const phase=document.getElementById('disc-banner-phase');
      const bar=document.getElementById('disc-banner-bar');
      if(phase) phase.textContent=phaseNames[s.data.phase]||s.data.phase||'';
      if(bar){
        const p=s.data.phase==='scanning_products'?30:
          s.data.phase==='discovering_pkg_types' && s.data.total?
            Math.round((s.data.progress/s.data.total)*65)+30:100;
        bar.style.width=p+'%';
      }
      // 更新浮窗日志（如果已创建）
      const discLogId=window.__discLogId||'disc-float-log';
      const logBody=document.getElementById(discLogId+'-body');
      if(logBody && s.data.log_lines?.length){
        const renderLogLine=l=>{
          const txt=escHtml(l);
          if(l.startsWith('🔍')) return `<div style="padding:1px 0;border-bottom:1px solid #f1f3f5;color:#4f46e5">${txt}</div>`;
          if(l.startsWith('📦')&&l.includes('发现包类型')) return `<div style="padding:1px 0;border-bottom:1px solid #f1f3f5;color:#7c3aed;font-weight:600">${txt}</div>`;
          if(l.startsWith('  →')) return `<div style="padding:1px 0;border-bottom:1px solid #f1f3f5;color:#0891b2">${txt}</div>`;
          if(l.startsWith('✅')||l.startsWith('✔')) return `<div style="padding:1px 0;border-bottom:1px solid #f1f3f5;color:#16a34a;font-weight:600">${txt}</div>`;
          if(l.startsWith('❌')||l.startsWith('⚠️')) return `<div style="padding:1px 0;border-bottom:1px solid #f1f3f5;color:#dc2626">${txt}</div>`;
          if(l.startsWith('[')) return `<div style="padding:1px 0;border-bottom:1px solid #f1f3f5;color:#374151">${txt}</div>`;
          return `<div style="padding:1px 0;border-bottom:1px solid #f1f3f5;color:#6b7280">${txt}</div>`;
        };
        logBody.innerHTML=s.data.log_lines.map(renderLogLine).join('');
        logBody.scrollTop=logBody.scrollHeight;
      }
      if(s.data.phase==='done'){
        done=true;clearInterval(window._discTimer);
        const banner=document.getElementById('disc-banner');
        if(banner){banner.querySelector('#disc-banner-phase').textContent='✅ 发现完成 — 点击查看结果';banner.querySelector('#disc-banner-bar').style.width='100%';banner.style.background='linear-gradient(135deg,#16a34a,#15803d)';}
        window._discLastDone=s.data.result;
        const mini=document.getElementById('disc-mini-btn');if(mini)mini.remove();
        setTimeout(()=>{const b=document.getElementById('disc-banner');if(b)b.remove();_reopenDiscModal();},500);
      } else if(s.data.phase==='error'){
        done=true;clearInterval(window._discTimer);
        toast('自动发现失败: '+(s.data.result?.error||''),'error');
        const b=document.getElementById('disc-banner');if(b)b.remove();
        const mini=document.getElementById('disc-mini-btn');if(mini)mini.remove();
      }
    }
  },2000);
}

      _showModal('disc');

      const logId=window.__discLogId||'disc-float-log';
      modalBody('disc',`<div style="padding:24px;text-align:center;position:relative">
        <div style="position:absolute;top:12px;right:16px;cursor:pointer;font-size:20px;color:#9ca3af;line-height:1" onclick="closeModal('disc')">×</div>

        ${s.data.phase==='done'?'<div style="margin-top:12px"><button class="btn btn-primary" onclick="closeModal(\'disc\');showDiscoverResult(window._discLastDone||{}, !!s.data.is_stale)">查看结果</button></div>':''}
      </div>`);
      if(s.data.phase==='done'&&s.data.result){
        setTimeout(()=>showDiscoverResult(s.data.result, !!s.data.is_stale),100);
      }
    }
  });
}

// 从 typesObj.paths 统计所有唯一 type key，用 MAP 翻译显示
// types.types 可能是 raw keys（如 ['sys','rule']）也可能是完整显示名（如 ['WAF V6.0.9系统升级包']）
// 统一策略：统计 paths.types 中所有原始 key，按出现次数排序，MAP 翻译
function _groupPkgTypes(typesObj) {
  const MAP = {sys:'系统',rule:'规则',nti:'威胁情报',av:'病毒库',apprule:'应用规则',url:'URL库',wcs:'恶意站点',judge:'研判',geo:'地理库',interface:'接口',special:'特殊',other:'其他',merge:'合并',client:'客户端',av_stream:'流式病毒库',test:'测试'};
  const {types, paths} = typesObj;
  if (!types || !types.length) return '';

  // 统计 paths.types 中每个 type key 的出现次数
  const cnt = {};
  if (paths && paths.length > 0) {
    paths.forEach(p => { (p.types || []).forEach(t => { cnt[t] = (cnt[t]||0) + 1; }); });
  }

  // 如果 paths.types 全是完整显示名（不在 MAP 中），则统计 types.types 自身
  const hasRawKeys = Object.keys(cnt).some(k => k in MAP);
  if (hasRawKeys) {
    const sorted = Object.keys(cnt).filter(k => k in MAP).sort((a,b) => (cnt[b]||0) - (cnt[a]||0));
    return sorted.map(k => `${MAP[k]||k}(${cnt[k]})`).join(', ');
  }

  // 降级：paths.types 全是完整显示名，直接统计 types.types 各 key 的路径数
  // 同时用完整显示名做 key（取 types.types 本身）
  if (paths && paths.length > 0) {
    const seen = new Set(types);
    const fullCnt = {};
    paths.forEach(p => {
      (p.types || []).forEach(t => {
        if (seen.has(t)) fullCnt[t] = (fullCnt[t]||0) + 1;
      });
    });
    const sorted = [...types].sort((a,b) => (fullCnt[b]||0) - (fullCnt[a]||0));
    return sorted.map(t => `${t}(${fullCnt[t]||0})`).join(', ');
  }

  return types.map(t => MAP[t] || t).join(', ');
}

function fmtPkgTypes(v){
  if(!v) return '';
  let types = v;
  try { types = JSON.parse(v); } catch {}
  if (!types) return '';
  // 新格式: {types:[...], paths:[...], modes:{}}
  if (types.types) return _groupPkgTypes(types);
  // 旧格式: [...]
  if (Array.isArray(types)) return _fmtOldTypes(types);
  return '';
}

// ── 缩写→中文映射（同时支持 raw key 和完整中文名）────────────────────────────
const PKGMAP = {
  // 缩写 key
  sys:'系统', rule:'规则', nti:'威胁情报', av:'病毒库', apprule:'应用规则',
  url:'URL库', wcs:'恶意站点', judge:'研判', geo:'地理库', interface:'接口',
  special:'特殊', other:'其他', merge:'合并', client:'客户端',
  av_stream:'流式病毒库', test:'测试', engine:'引擎',
  // 完整中文名（WAF 等产品的 chain[-1] 格式）
  '系统升级包':'系统', '规则升级包':'规则', '威胁情报升级包':'威胁情报',
  '病毒库升级包':'病毒库', '应用规则库升级包':'应用规则', 'URL分类库升级包':'URL库',
  '恶意站点库升级包':'恶意站点', '研判规则库升级包':'研判', '地理库升级包':'地理库',
  '接口升级包':'接口', '特殊升级包':'特殊', '其他升级包':'其他',
  '合并升级包':'合并', '客户端':'客户端', '流式病毒库升级包':'流式病毒库',
  '测试升级包':'测试', '引擎升级包':'引擎',
};

function _mapType(t) {
  // 先精确匹配
  if (t in PKGMAP) return PKGMAP[t];
  // 后缀匹配（处理 WAF V6.0.9系统升级包 → 系统）
  for (const [suffix, label] of Object.entries(PKGMAP)) {
    if (t.endsWith(suffix)) return label;
  }
  // 前缀+关键词归约（处理 WAF规则包、海光系列 V6.0.9系统升级等）
  if (t.includes('规则')) return '规则';
  if (t.includes('系统升级') || t.endsWith('系统')) return '系统';
  if (t.includes('引擎升级') || t.includes('引擎')) return '引擎';
  if (t.includes('威胁情报')) return '威胁情报';
  if (t.includes('合并升级') || t.includes('合并')) return '合并';
  // 纯版本号类（如 WAF V6.0.3）归为其他
  if (/V?\d+\.\d+/.test(t) && !t.includes('升级')) return '其他';
  return t;
}

// 旧格式 raw key 列表
const _rawKeys = new Set(['sys','rule','nti','av','apprule','url','wcs','judge','geo','interface','special','other','merge','client','av_stream','test','engine']);

// 从 typesObj.paths 归约统计
// 核心：直接从 paths.types 计数，用 PKGMAP 归约分组
function _groupPkgTypes(typesObj) {
  const {types, paths} = typesObj;
  if (!paths || !paths.length) return types ? types.map(_mapType).join(', ') : '';

  // 统计 paths.types 中每个 type 的出现次数
  const cnt = {};
  paths.forEach(p => { (p.types || []).forEach(t => { cnt[t] = (cnt[t]||0) + 1; }); });

  // 判断是 raw key 模式还是完整中文名模式
  const rawKeysInCnt = Object.keys(cnt).filter(k => _rawKeys.has(k));
  if (rawKeysInCnt.length > 0) {
    // raw key 模式（如 sys/rule/nti）
    const sorted = rawKeysInCnt.sort((a,b) => (cnt[b]||0) - (cnt[a]||0));
    return sorted.map(k => `${_mapType(k)}(${cnt[k]})`).join(', ');
  }

  // 完整中文名模式：用 PKGMAP 归约分组
  const merged = {};
  Object.keys(cnt).forEach(t => {
    const base = _mapType(t); // "WAF V6.0.9系统升级包" → "系统"
    merged[base] = (merged[base]||0) + cnt[t];
  });

  const sorted = Object.keys(merged).sort((a,b) => merged[b]-merged[a]);
  return sorted.map(k => `${k}(${merged[k]})`).join(', ');
}

function _fmtOldTypes(arr) {
  return arr.map(t => _mapType(t)).join(', ');
}

// 从 paths 数组构建可折叠目录树 HTML
function buildTreeHtml(pt, MAP) {
  const paths = pt.paths || [];
  if (paths.length === 0) return '<span style="color:#9ca3af">无路径数据</span>';

  const root = {};
  paths.forEach(p => {
    const chain = p.chain || [];
    if (chain.length === 0) return;
    let node = root;
    chain.forEach((name, idx) => {
      if (!node._children) node._children = {};
      if (!node._children[name]) node._children[name] = { _children: {}, _types: [], _isPkg: false };
      node = node._children[name];
      if (idx === chain.length - 1) { node._isPkg = true; node._types = p.types || []; }
    });
  });

  function renderNode(node, name, depth) {
    const indent = depth * 16;
    const children = node._children ? Object.entries(node._children) : [];
    const hasChildren = children.length > 0;
    const isPkg = node._isPkg;
    const types = node._types || [];

    let html = `<div class="tree-node" style="padding-left:${indent}px;display:flex;align-items:center;gap:4px;padding-top:4px;padding-bottom:4px;min-height:28px">`;

    if (hasChildren) {
      html += `<span class="tree-toggle" onclick="treeToggle(this)" style="cursor:pointer;color:#94a3b8;font-size:14px;margin-right:4px;user-select:none;flex-shrink:0">&#9658;</span>`;
    } else {
      html += `<span style="width:18px;flex-shrink:0"></span>`;
    }

    const icon = isPkg ? '&#128196;' : (hasChildren ? '&#128193;' : '&#128196;');
    const label = MAP[name] || name;
    const childCount = hasChildren ? ` <span style="color:#94a3b8;font-size:11px">(${children.length})</span>` : '';
    html += `<span style="font-size:13px;color:#334155;flex-shrink:0">${icon} ${escHtml(label)}${childCount}</span>`;

    if (isPkg && types.length > 0) {
      const badges = types.map(t => `<span style="background:#ede9fe;color:#5b21b6;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:2px;flex-shrink:0">${MAP[t]||escHtml(t)}</span>`).join('');
      html += badges;
      const modeKey = types[0];
      const mode = (pt.modes && pt.modes[modeKey]) || 'auto';
      html += `<select data-type="${escHtml(modeKey)}" onchange="window._ptModes['${escHtml(modeKey)}']=this.value" style="margin-left:auto;flex:0 0 80px;padding:2px 6px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;cursor:pointer">
        <option value="auto" ${mode==='auto'?'selected':''}>自动</option>
        <option value="full" ${mode==='full'?'selected':''}>全量</option>
        <option value="incremental" ${mode==='incremental'?'selected':''}>增量</option>
      </select>`;
    } else if (!hasChildren) {
      html += `<span style="margin-left:auto;color:#94a3b8;font-size:11px;flex-shrink:0">—</span>`;
    } else {
      html += `<span style="margin-left:auto;color:#94a3b8;font-size:11px;flex-shrink:0">&#9658;</span>`;
    }
    html += `</div>`;

    if (hasChildren) {
      html += `<div class="tree-children" style="display:none">`;
      children.forEach(([childName, childNode]) => { html += renderNode(childNode, childName, depth + 1); });
      html += `</div>`;
    }
    return html;
  }

  let treeHtml = '<div style="font-family:system-ui">';
  const rootChildren = root._children ? Object.entries(root._children).sort(([a],[b]) => {
    const aV = /\d/.test(a); const bV = /\d/.test(b);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    return a.localeCompare(b, 'zh');
  }) : [];
  rootChildren.forEach(([name, node]) => { treeHtml += renderNode(node, name, 0); });
  treeHtml += '</div>';
  return treeHtml;
}

// Build data tree: renders snapshots using paths chain as directory structure.
// snapshotsMap: { "version_branch|short_type": [snapshot, ...], ... }
// MAP: type code -> Chinese label map
// verTypeMap: { "ver|shortType": dispType } for snapshot type display
// alias: product alias to strip from version (e.g., "WAF")
// sid: source id for click delegation
function buildDataTreeHtml(pt, snapshotsMap, MAP, verTypeMap, alias, sid) {
  const paths = pt.paths || [];
  if (paths.length === 0) return '<span style="color:#9ca3af">无路径数据</span>';

  // Build tree structure from paths
  const root = {};
  paths.forEach((p, pathIdx) => {
    const chain = p.chain || [];
    if (chain.length < 2) return;
    let node = root;
    // Track accumulated chain for intermediate nodes
    let accChain = [];
    chain.forEach((name, idx) => {
      if (!node.__children) node.__children = {};
      if (!node.__children[name]) node.__children[name] = { __children: {}, __isPkg: false, __pkgKey: null, __snapshots: [], __pathId: '', __chain: [], __pathIdx: -1 };
      node = node.__children[name];
      // Set __chain for ALL nodes (not just leaves) so intermediate clicks work
      node.__chain = accChain.concat([name]);
      node.__pathIdx = pathIdx;
      if (idx === chain.length - 1) {
        node.__isPkg = true;
        const rawType = (p.types || [])[0] || '';
        node.__pkgKey = chain[chain.length - 1] || (ver + '|' + rawType);
        node.__pathId = p.url || '';
        // Store the backend-computed path_id on the leaf node so tree clicks can
        // pass it directly to _dataSelectedPathId (avoids the verHint/pkgHint
        // ambiguity when several chains share one URL — see propagateHints).
        if (p.path_id) node.__backendPathId = p.path_id;
      }
      accChain = node.__chain;
    });
  });

  // Attach snapshots to matching leaf nodes
  // snapshotsMap key = source_url (relative path, stripped of BASE_URL)
  // tree node __pathId = p.url (relative path from product management)
  // Direct URL comparison — no version/type matching needed
  Object.entries(snapshotsMap || {}).forEach(([urlKey, snaps]) => {
function attach(node) {
      if (node.__isPkg && node.__pathId) {
        // Normalize both URLs: strip protocol/host, ensure single leading /
        // node.__pathId may or may not have leading /, urlKey may or may not
        // Normalize to: no leading /, no trailing /
        const stripSlashes = s => s.replace(/^\/+|\/+$/g, '');
        const normNode = '/' + stripSlashes(node.__pathId);
        const normKey  = '/' + stripSlashes(urlKey);
        if (normNode === normKey) {
          // Several chains share this URL (NSFocus real structure). Don't
          // `return true` — keep walking so every chain's leaf gets a chance
          // to match. Only attach snaps to the leaf whose __backendPathId is
          // in the snap array; other leaves leave __snapshots as [].
          // Note: with one URL key, attach is called once and walks the tree.
          const leafPid = node.__backendPathId;
          const matchedSnap = leafPid && snaps.find(s => s.path_id === leafPid);
          if (matchedSnap) {
            node.__snapshots = [matchedSnap];
          } else if (!leafPid) {
            // No path_id on the leaf (legacy) — fall back to first matching
            // (ver, pkg) snap in the array.
            const matchedByVer = snaps.find(s => {
              const last2 = (node.__chain || []).slice(-2);
              return last2[0] === s.version_branch && last2[1] === s.package_type;
            });
            node.__snapshots = matchedByVer ? [matchedByVer] : [];
          } else {
            // path_id exists but no snap matches — leave empty (the right
            // panel dataBuildFeed uses snap.path_id to display correctly).
            node.__snapshots = [];
          }
          // Do NOT return — keep walking so sibling leaves can try.
        }
      }
      if (node.__children) {
        for (const [, child] of Object.entries(node.__children)) {
          attach(child);  // no early return — every leaf gets a chance
        }
      }
    }
    attach(root);
  });

  // Phase 2: Propagate version_branch, package_type hints and freshness from leaves up.
  function propagateHints(node) {
    if (node.__isPkg) {
      const snaps = node.__snapshots || [];
      if (snaps.length > 0) {
        const verHint = snaps[0].version_branch || '';
        const pkgHint = snaps[0].package_type || '';
        const now = Date.now();
        const latestPublished = snaps.reduce((max, s) => {
          if (!s.published_at) return max;
          const t = new Date(s.published_at).getTime();
          return t > max ? t : max;
        }, 0);
        let freshness = 'idle';
        if (latestPublished > 0) {
          const days = (now - latestPublished) / 86400000;
          if (days <= 30) freshness = 'new';
          else if (days <= 365) freshness = 'lowfreq';
        }
        node.__freshness = freshness;
        return { ver: verHint, pkg: pkgHint, freshness };
      }
      return null;
    }
    if (!node.__children) return null;
    let verSet = new Set(), pkgSet = new Set();
    let childFreshness = 'idle';
    for (const [, child] of Object.entries(node.__children)) {
      const childHints = propagateHints(child);
      if (!childHints) continue;
      if (childHints.ver) verSet.add(childHints.ver);
      if (childHints.pkg) pkgSet.add(childHints.pkg);
      // Highest priority: new > lowfreq > idle
      if (childHints.freshness === 'new') childFreshness = 'new';
      else if (childHints.freshness === 'lowfreq' && childFreshness !== 'new') childFreshness = 'lowfreq';
    }
    if (verSet.size === 1) node.__verHint = [...verSet][0];
    if (pkgSet.size === 1) node.__pkgHint = [...pkgSet][0];
    node.__freshness = childFreshness;
    return { ver: verSet.size === 1 ? [...verSet][0] : '', pkg: pkgSet.size === 1 ? [...pkgSet][0] : '', freshness: childFreshness };
  }
  propagateHints(root);

  // Render the tree
  function renderNode(node, name, depth) {
    const indent = depth * 16;
    const children = node.__children ? Object.entries(node.__children) : [];
    const hasChildren = children.length > 0;
    const isPkg = node.__isPkg;
    const snaps = node.__snapshots || [];

    // Determine target div to toggle (both empty and non-empty pkg nodes need IDs)
    // Use __pathId (URL) for targetId to ensure uniqueness — same leaf name across different
    // versions (e.g. "引擎升级包" x16) must not share the same ID. __pathId is unique per path.
    // For paths with empty URLs (NF-B/NF-D, etc.), include __pathIdx in the ID to distinguish
    // duplicate chains that share the same empty URL (e.g. NF-B "引擎库升级包" ×3).
    let targetId = null;
    if (isPkg) {
      const rawId = node.__pathId
        ? node.__pathId
        : ('|' + (node.__chain || []).join('|') + '|idx=' + node.__pathIdx);
      targetId = 'pktbl_' + rawId
          .replace(/[^\x00-\x7F]/g, function(m) { return '_' + m.charCodeAt(0).toString(16) + '_'; })
          .replace(/\W/g, '_');
    }

    // Clicking any node: filter right panel to that product/sub-category/version
    // Clicking a leaf node: also expand the corresponding row in the right panel
    // data attributes for event delegation
    const chainJson = JSON.stringify(node.__chain || []).replace(/"/g, '&quot;');
    const nodeUrl = node.__pathId || '';
    const isLeaf = isPkg ? '1' : '0';
    // For leaf nodes, collect snapshot IDs for right-panel expansion
    const leafSnapIds = isPkg ? (snaps.map(s => s.id).join(',')) : '';
    // Hints for filtering: version_branch and package_type shared by all descendants
    const verHint = node.__verHint || '';
    const pkgHint = node.__pkgHint || '';
    // Backend-computed path_id (MD5(BASE_URL+url+chain)[:12]) — preferred over
    // verHint/pkgHint when the URL is shared by multiple chains (NSFocus
    // NSFocus chains can map to the same URL with different ver segments).
    // Empty when this is an intermediate (non-leaf) node or the path has no
    // backend path_id yet.
    const nodePathId = node.__backendPathId || '';

    const icon = isPkg ? '&#128196;' : (hasChildren ? '&#128193;' : '&#128196;');
    const label = isPkg ? name : (MAP[name] || name);
    const childCount = hasChildren ? ` <span style="color:#94a3b8;font-size:11px">(${children.length})</span>` : '';
    const snapCount = isPkg ? (
      snaps.length > 0
        ? ` <span style="background:#dbeafe;color:#1d4ed8;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">${snaps.length}包</span>`
        : ` <span style="background:#fee2e2;color:#dc2626;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">空</span>`
    ) : '';
    const freshBadge = (node.__freshness === 'new') ? ` <span style="background:#0e9f6e;color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">活跃</span>` : (node.__freshness === 'lowfreq' ? ` <span style="background:#e6a700;color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">低频</span>` : (node.__freshness === 'idle' ? ` <span style="background:#9ca3af;color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:2px">沉寂</span>` : ''));
    // Arrow: toggle children visibility via data-action="treeToggle" (handled by event delegation)
    // Uses a generated children ID stored in data-target on the arrow
    const childDivId = hasChildren ? ('tcd_' + sid + '_' + depth + '_' + name.replace(/\W/g, '_')) : null;
    const arrow = hasChildren || isPkg
      ? `<span onclick="treeToggleById('${childDivId}', this); event.stopPropagation();" style="cursor:pointer;color:#94a3b8;font-size:13px;user-select:none;flex-shrink:0;margin-right:4px">&#9658;</span>`
      : `<span style="width:13px;flex-shrink:0;margin-right:4px"></span>`;
    let html = `<div class="tree-node" data-action="treeNode" data-sid="${sid}" data-chain="${chainJson}" data-url="${nodeUrl}" data-isleaf="${isLeaf}" data-snapids="${leafSnapIds}" data-verhint="${escHtml(verHint)}" data-pkghint="${escHtml(pkgHint)}" data-pathid="${escHtml(nodePathId)}" style="padding-left:${indent}px;display:flex;align-items:center;padding-top:4px;padding-bottom:4px;min-height:28px;cursor:pointer">`;
    html += arrow;
    html += `<span style="font-size:13px;color:#334155;flex-shrink:0">${icon} ${escHtml(label)}${childCount}${snapCount}${freshBadge}</span>`;
    html += `</div>`;

    if (hasChildren) {
      html += `<div id="${childDivId}" class="tree-children" data-target="${childDivId}" style="display:none">`;
      children.forEach(([childName, childNode]) => { html += renderNode(childNode, childName, depth + 1); });
      html += `</div>`;
    }

    // Snapshot table for leaf nodes — NO LONGER rendered here.
    // Clicking a leaf node now filters the right panel to that URL and expands the row there.
    // Empty leaves still show the placeholder div so tree height is consistent.
    if (isPkg) {
      if (snaps.length === 0) {
        // Snapshot content is rendered into the right panel on click, not into the tree.
        // Keep a minimal placeholder so tree height is stable — uses a fixed non-conflicting id.
        html += `<div class="tree-children" style="display:none;padding-left:${indent + 16}px;margin-bottom:8px">
          <div style="color:var(--muted);font-size:12px;padding:8px 12px;background:#fafafa;border-radius:4px">
            暂无采集数据<div style="font-size:11px;margin-top:2px">页面可能返回登录页或无数据包</div>
          </div></div>`;
      }
      // When snaps.length > 0: no placeholder div needed — clicking the leaf node
      // directly populates the right panel via dataBuildFeed().
    }

    return html;
  }

  let treeHtml = '<div style="font-family:system-ui">';
  const rootChildren = root.__children ? Object.entries(root.__children).sort(([a],[b]) => {
    const aV = /\d/.test(a); const bV = /\d/.test(b);
    if (aV && !bV) return -1; if (!aV && bV) return 1;
    return a.localeCompare(b, 'zh');
  }) : [];
  // Skip the top-level product name node if it's the only child (duplicates card title)
  if (rootChildren.length === 1) {
    const [topName, topNode] = rootChildren[0];
    const topChildren = topNode.__children ? Object.entries(topNode.__children).sort(([a],[b]) => {
      const aV = /\d/.test(a); const bV = /\d/.test(b);
      if (aV && !bV) return -1; if (!aV && bV) return 1;
      return a.localeCompare(b, 'zh');
    }) : [];
    topChildren.forEach(([childName, childNode]) => { treeHtml += renderNode(childNode, childName, 0); });
  } else {
    rootChildren.forEach(([name, node]) => { treeHtml += renderNode(node, name, 0); });
  }
  treeHtml += '</div>';
  return treeHtml;
}

function pkgTableToggle(el) {
  var targetId = el.getAttribute('data-target');
  if (!targetId) return;
  var target = document.getElementById(targetId);
  if (!target) return;
  var isOpen = target.style.display !== 'none';
  target.style.display = isOpen ? 'none' : 'block';
  el.innerHTML = isOpen ? '&#9658;' : '&#9660;';
}

function pkgTableToggleById(targetId) {
  if (!targetId) return;
  var target = document.getElementById(targetId);
  if (!target) return;
  var isOpen = target.style.display !== 'none';
  target.style.display = isOpen ? 'none' : 'block';
  // Also toggle the arrow in the parent tree-node
  var node = target.previousElementSibling;
  if (node && node.classList.contains('tree-node')) {
    var arrow = node.querySelector('.tree-arrow');
    if (arrow) arrow.innerHTML = isOpen ? '&#9658;' : '&#9660;';
  }
}

function treeToggle(el, extraTargetId) {
  var node = el.closest ? el.closest('.tree-node') : el;
  // .tree-children is the next sibling of .tree-node
  var ch = node.nextElementSibling;
  if (!ch || !ch.classList.contains('tree-children')) return;
  var isOpen = ch.style.display !== 'none';
  ch.style.display = isOpen ? 'none' : 'block';
  // Toggle extra target (snapshot table) if provided
  if (extraTargetId) {
    var extra = document.getElementById(extraTargetId);
    if (extra) extra.style.display = isOpen ? 'none' : 'block';
  }
  // Update arrow inside this node
  var arrow = node.querySelector('.tree-arrow');
  if (arrow) arrow.innerHTML = isOpen ? '&#9658;' : '&#9660;';
}

function editPkgType(id){
  const prods=window._allProducts||[];
  const p=prods.find(x=>x.id===id);
  if(!p){toast('产品不存在','error');return;}

  const MAP={sys:'系统',rule:'规则',nti:'威胁情报',av:'病毒库',apprule:'应用规则',url:'URL库',wcs:'恶意站点',judge:'研判',geo:'地理库',interface:'接口',special:'特殊',other:'其他',merge:'合并',client:'客户端',av_stream:'流式病毒库',test:'测试'};

  // 解析 package_type（新格式 {types:[], paths:[], modes:{}} 或旧格式 [...]）
  let pt={types:[], paths:[], modes:{}};
  try{
    if(typeof p.package_type==='string'){
      const parsed=JSON.parse(p.package_type);
      if(parsed.types){pt=parsed;}
      else if(Array.isArray(parsed)){pt.types=parsed; pt.paths=[]; pt.modes={};} // 旧格式
    }
  }catch{}

  // 如果有未确认的包类型变化 → 显示 diff 确认弹窗
  if(p.package_type_changed==1 && p.package_type_discovered){
    let disc={types:[], paths:[], modes:{}};
    try{const r=JSON.parse(p.package_type_discovered);if(r.types){disc=r;}}catch{}
    const currentSet=new Set(pt.types);
    const discSet=new Set(disc.types);
    const added=[...discSet].filter(x=>!currentSet.has(x));
    const removed=[...currentSet].filter(x=>!discSet.has(x));

    let diffRows='';
    if(added.length){
      diffRows+=added.map(t=>`<span style="background:#d1fae5;color:#065f46;font-size:12px;padding:2px 8px;border-radius:10px;margin:2px;display:inline-block">+${MAP[t]||t}</span>`).join(' ');
    }
    if(removed.length){
      diffRows+=removed.map(t=>`<span style="background:#fee2e2;color:#991b1b;font-size:12px;padding:2px 8px;border-radius:10px;margin:2px;display:inline-block;text-decoration:line-through">-${MAP[t]||t}</span>`).join(' ');
    }
    if(!added.length && !removed.length){
      diffRows=`<span style="color:#9ca3af;font-size:13px">包类型集合无变化，但采集时检测到差异</span>`;
    }

    // diff 模式下的 modes 编辑
    let modeRows='';
    disc.types.forEach(t=>{
      const label=MAP[t]||t;
      const mode=disc.modes[t]||'auto';
      modeRows+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:#f9fafb;border:1px solid #e5e7eb;margin-bottom:4px">
        <span style="flex:1;font-size:13px;color:#374151">${label}</span>
        <select data-type="${escHtml(t)}" style="flex:0 0 90px;padding:3px 6px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;cursor:pointer">
          <option value="auto" ${mode==='auto'?'selected':''}>自动</option>
          <option value="full" ${mode==='full'?'selected':''}>全量</option>
          <option value="incremental" ${mode==='incremental'?'selected':''}>增量</option>
        </select>
      </div>`;
    });

    // 目录树展示 disc.paths（复用新的树形渲染）
    let pathTreeHtml = '';
    if (disc.paths && disc.paths.length) {
      // 用 disc 的 modes 渲染树
      const discPt = { types: disc.types, paths: disc.paths, modes: disc.modes || {} };
      const discTreeHtml = buildTreeHtml(discPt, MAP);
      pathTreeHtml = `<div style="margin-top:12px;font-size:11px;color:#64748b;margin-bottom:6px">📂 采集到的目录结构</div><div style="border:1px solid #e2e8f0;border-radius:8px;max-height:240px;overflow-y:auto;padding:8px 4px">${discTreeHtml}</div>`;
    }

    // 智能警告
    let rulesWarning='';
    if(removed.length && disc.affected_rules && disc.affected_rules.length){
      const ruleItems=disc.affected_rules.map(r=>
        `<div style="margin-top:4px">
          <span style="color:#7c3aed;font-weight:600">${escHtml(r.name)}</span>
          <span style="color:#991b1b;font-size:12px;margin-left:6px">
            ${(r.removed_types||[]).map(t=>MAP[t]||t).join(', ')}
          </span>
        </div>`
      ).join('');
      rulesWarning=`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:14px;margin-top:12px">
        <div style="font-size:12px;color:#991b1b;font-weight:600;margin-bottom:6px">⚠️ 以下订阅规则引用了将被删除的包类型，采纳后这些规则对此产品将不再推送：</div>
        ${ruleItems}
      </div>`;
    }

    _showModal('pkgtype');
    modalBody('pkgtype',`<div style="padding:24px;max-height:80vh;overflow-y:auto">
      <div style="font-size:15px;font-weight:600;margin-bottom:16px">⚠️ 包类型检测到变化 <span style="font-weight:400;font-size:12px;color:#666">「${escHtml(p.name)}」</span></div>
      <div style="background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:14px;margin-bottom:16px">
        <div style="font-size:12px;color:#92400e;font-weight:600;margin-bottom:8px">📊 变更明细</div>
        <div>${diffRows}</div>
      </div>
      ${rulesWarning}
      ${pathTreeHtml}
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="confirmPkgTypeChange(${id},'apply')">✅ 采纳变化</button>
        <button class="btn" onclick="confirmPkgTypeChange(${id},'keep')">保留原样</button>
        <button class="btn" style="margin-left:auto" onclick="closeModal('pkgtype')">取消</button>
      </div>
    </div>`);
    window._ptModes={};
    disc.types.forEach(t=>{ window._ptModes[t]=disc.modes[t]||'auto'; });
    window._ptDiscovered=disc;
    return;
  }

  // ── 正常编辑模式 ────────────────────────────────────────────
  if(pt.types.length===0){
    _showModal('pkgtype');
    modalBody('pkgtype',`<div style="padding:24px">
      <div style="font-size:15px;font-weight:600;margin-bottom:16px">📦 包类型设置 <span style="font-weight:400;font-size:12px;color:#666">「${escHtml(p.name)}」</span></div>
      <div style="color:#9ca3af;font-size:13px;text-align:center;padding:12px">
        尚未发现包类型，请先对该产品进行<span style="color:#7c3aed;cursor:pointer" onclick="closeModal('pkgtype');refreshPkgType(${id})">全量采集</span>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px">
        <button class="btn" onclick="closeModal('pkgtype')">关闭</button>
      </div>
    </div>`);
    return;
  }

  // 计算每种类型的路径覆盖数
  const pathCount={};
  pt.types.forEach(t=>{ pathCount[t]=0; });
  (pt.paths||[]).forEach(p=>{
    (p.types||[]).forEach(t=>{ if(t in pathCount) pathCount[t]++; });
  });
  const sortedTypes=[...pt.types].sort((a,b)=>(pathCount[b]||0)-(pathCount[a]||0));

  // 构建目录树（使用独立函数）
  const treeHtml = buildTreeHtml(pt, MAP);

  // 弹窗内容：目录树 + mode 选择 + 保存/取消
  _showModal('pkgtype');
  modalBody('pkgtype',`<div style="padding:24px;max-height:80vh;overflow-y:auto">
    <div style="font-size:15px;font-weight:600;margin-bottom:16px">📦 包类型设置 <span style="font-weight:400;font-size:12px;color:#666">「${escHtml(p.name)}」</span></div>
    <div style="margin-bottom:14px;font-size:12px;color:#7c3aed;background:#f5f3ff;padding:8px 12px;border-radius:6px">
      共 ${pt.types.length} 种包类型，${(pt.paths||[]).length} 条路径
    </div>
    <div style="border:1px solid #e2e8f0;border-radius:8px;max-height:320px;overflow-y:auto;padding:8px 4px">
      ${treeHtml}
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" onclick="savePkgType(${id})">💾 保存</button>
      <button class="btn" onclick="closeModal('pkgtype')">取消</button>
    </div>
  </div>`);

  // 初始化 modes
  window._ptModes = {};
  window._ptPaths = pt.paths || [];
  pt.types.forEach(t => { window._ptModes[t] = pt.modes && pt.modes[t] || 'auto'; });
}
